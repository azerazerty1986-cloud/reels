<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدير المتكامل - واجهة احترافية</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== خلفية المدير المتحركة ===== */
        .manager-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1f 100%);
            overflow: hidden;
        }

        /* نجوم متحركة */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* أشعة ذهبية */
        .golden-rays {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 215, 0, 0.15), transparent 50%);
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* خطوط ذهبية */
        .gold-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255, 215, 0, 0.1) 20px, rgba(255, 215, 0, 0.1) 40px);
            animation: moveLines 20s linear infinite;
        }

        @keyframes moveLines {
            from { background-position: 0 0; }
            to { background-position: 100px 100px; }
        }

        /* ===== الهيدر الرئيسي ===== */
        .main-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px 35px;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.2);
            animation: slideDown 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        .main-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2), transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, gold, #ffd700);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: #0a0a0f;
            transform: rotate(10deg);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.5);
            animation: glow 2s infinite alternate;
            border: 3px solid white;
        }

        @keyframes glow {
            from { box-shadow: 0 20px 40px rgba(255, 215, 0, 0.5); }
            to { box-shadow: 0 30px 60px rgba(255, 215, 0, 0.8); }
        }

        .logo-text h1 {
            color: white;
            font-size: 42px;
            font-weight: 900;
            text-shadow: 0 0 20px gold;
            line-height: 1.2;
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 50px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid gold;
            font-size: 16px;
            font-weight: 600;
        }

        .status-badge i {
            color: #4caf50;
            font-size: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== شبكة الأيقونات ===== */
        .icons-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
            flex-wrap: wrap;
            margin: 50px 0 30px;
            animation: fadeInUp 1s ease 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .icon-card:hover {
            transform: translateY(-25px);
        }

        .icon-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
            position: relative;
            border: 6px solid white;
            position: relative;
            overflow: hidden;
        }

        .icon-circle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent 70%);
            animation: rotate 10s linear infinite;
        }

        .icon-card:hover .icon-circle {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6);
        }

        .icon-circle.snap {
            background: linear-gradient(135deg, #fffc00, #ffd600);
            color: black;
        }

        .icon-circle.tiktok {
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            color: white;
        }

        .icon-circle.reels {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
        }

        .icon-label {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 15px 35px;
            border-radius: 60px;
            color: white;
            font-size: 26px;
            font-weight: 700;
            border: 2px solid gold;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .icon-card:hover .icon-label {
            background: gold;
            color: black;
            transform: scale(1.1);
            border-color: white;
        }

        .icon-file {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
            direction: ltr;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        .icon-card:hover .icon-file {
            background: rgba(255, 215, 0, 0.2);
            color: gold;
            border-color: gold;
        }

        /* ===== شريط الإحصائيات ===== */
        .stats-wrapper {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .stats-container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 70px;
            padding: 15px 30px;
            display: flex;
            gap: 30px;
            border: 2px solid gold;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease 0.6s both;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-item:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-3px);
        }

        .stat-item i {
            color: gold;
            font-size: 24px;
        }

        /* ===== رسالة المدير ===== */
        .message-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            max-width: 350px;
        }

        .message-box {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px;
            border: 2px solid gold;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: slideInLeft 0.5s ease;
            position: relative;
        }

        .message-box.closed {
            display: none;
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .message-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .message-header h3 {
            color: gold;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-message {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-message:hover {
            background: rgba(255, 0, 0, 0.2);
            color: red;
            transform: rotate(90deg);
        }

        .message-content {
            color: white;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }

        .message-time {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ===== نافذة التطبيق المكبرة ===== */
        .fullscreen-app {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            flex-direction: column;
            animation: zoomIn 0.4s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .fullscreen-app.show {
            display: flex;
        }

        .fullscreen-header {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            border-bottom: 3px solid gold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1001;
        }

        .fullscreen-title {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .fullscreen-icon {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border: 2px solid white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-name {
            font-size: 28px;
            font-weight: 700;
        }

        .fullscreen-file {
            font-family: monospace;
            font-size: 18px;
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            direction: ltr;
        }

        .fullscreen-actions {
            display: flex;
            gap: 15px;
        }

        .fullscreen-btn {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            border: 2px solid white;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }

        .fullscreen-btn.close:hover {
            background: red;
            border-color: red;
            color: white;
        }

        .fullscreen-frame {
            width: 100%;
            flex: 1;
            border: none;
            background: white;
        }

        /* ===== مؤشر التحميل ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 30px;
        }

        .loading-spinner {
            width: 100px;
            height: 100px;
            border: 8px solid rgba(255, 215, 0, 0.2);
            border-top: 8px solid gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: gold;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 0 20px gold;
        }

        /* ===== إشعارات ===== */
        .notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 18px 40px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            z-index: 3000;
            animation: slideDown 0.4s ease;
            border: 3px solid white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .notification i {
            font-size: 24px;
        }

        /* ===== زر الرجوع ===== */
        .back-button {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
        }

        .back-btn {
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 60px;
            padding: 15px 30px;
            color: black;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid white;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateX(-10px);
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.5);
        }

        .back-btn i {
            font-size: 20px;
        }

        /* ===== تجاوب ===== */
        @media (max-width: 768px) {
            .logo-text h1 {
                font-size: 28px;
            }
            
            .icon-circle {
                width: 150px;
                height: 150px;
                font-size: 60px;
            }
            
            .icon-label {
                font-size: 20px;
                padding: 10px 20px;
            }
            
            .icons-grid {
                gap: 40px;
            }
            
            .stats-container {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية المدير المتحركة -->
    <div class="manager-bg">
        <div class="stars"></div>
        <div class="golden-rays"></div>
        <div class="gold-lines"></div>
    </div>
    
    <!-- الهيدر الرئيسي -->
    <div class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">
                    <h1>المدير المتكامل</h1>
                    <p>
                        <i class="fas fa-circle" style="color: #4caf50;"></i>
                        جميع الملفات جاهزة
                    </p>
                </div>
            </div>
            <div class="status-badge">
                <i class="fas fa-bolt"></i>
                <span>جاهز للتشغيل</span>
            </div>
        </div>
    </div>

    <!-- شبكة الأيقونات -->
    <div class="icons-grid">
        <!-- سناب شات -->
        <div class="icon-card" onclick="openFullscreen('snap')">
            <div class="icon-circle snap">
                <i class="fab fa-snapchat"></i>
            </div>
            <div class="icon-label">سناب شات</div>
            <div class="icon-file">snam.html</div>
        </div>

        <!-- تيك توك -->
        <div class="icon-card" onclick="openFullscreen('tiktok')">
            <div class="icon-circle tiktok">
                <i class="fab fa-tiktok"></i>
            </div>
            <div class="icon-label">تيك توك</div>
            <div class="icon-file">tikm.html</div>
        </div>

        <!-- ريلز تلجرام -->
        <div class="icon-card" onclick="openFullscreen('reels')">
            <div class="icon-circle reels">
                <i class="fas fa-film"></i>
            </div>
            <div class="icon-label">ريلز تلجرام</div>
            <div class="icon-file">reels.html</div>
        </div>
    </div>

    <!-- شريط الإحصائيات -->
    <div class="stats-wrapper">
        <div class="stats-container">
            <div class="stat-item">
                <i class="fas fa-file-code"></i>
                <span>snam.html</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-file-code"></i>
                <span>tikm.html</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-file-code"></i>
                <span>reels.html</span>
            </div>
        </div>
    </div>

    <!-- رسالة المدير (قابلة للإغلاق) -->
    <div class="message-container">
        <div class="message-box" id="welcomeMessage">
            <div class="message-header">
                <h3>
                    <i class="fas fa-bell" style="color: gold;"></i>
                    رسالة الترحيب
                </h3>
                <button class="close-message" onclick="closeMessage()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="message-content">
                <i class="fas fa-crown" style="color: gold; margin-left: 8px;"></i>
                مرحباً بك في المدير المتكامل<br>
                اضغط على أي أيقونة لتشغيل التطبيق مباشرة<br>
                <span style="color: gold;">ESC</span> للخروج من وضع ملء الشاشة
            </div>
            <div class="message-time">
                <i class="far fa-clock"></i>
                الآن
            </div>
        </div>
    </div>

    <!-- زر الرجوع (يظهر فقط عند فتح التطبيق) -->
    <div class="back-button" id="backButton" style="display: none;">
        <button class="back-btn" onclick="closeFullscreen()">
            <i class="fas fa-arrow-right"></i>
            العودة للمدير
        </button>
    </div>

    <!-- نافذة التطبيق المكبرة -->
    <div class="fullscreen-app" id="fullscreenApp">
        <div class="fullscreen-header" id="fullscreenHeader">
            <div class="fullscreen-title">
                <div class="fullscreen-icon" id="fullscreenIcon">
                    <i class="fab fa-snapchat"></i>
                </div>
                <span class="fullscreen-name" id="fullscreenName">سناب شات</span>
                <span class="fullscreen-file" id="fullscreenFile">snam.html</span>
            </div>
            <div class="fullscreen-actions">
                <button class="fullscreen-btn" onclick="refreshApp()">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="fullscreen-btn close" onclick="closeFullscreen()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        <iframe class="fullscreen-frame" id="fullscreenFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups allow-downloads allow-pointer-lock allow-orientation-lock"></iframe>
    </div>

    <!-- مؤشر التحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">جاري التحميل...</div>
    </div>

    <script>
        // معلومات التطبيقات
        const apps = {
            snap: {
                name: 'سناب شات',
                file: 'snam.html',
                icon: 'fab fa-snapchat',
                iconClass: 'snap',
                headerColor: 'linear-gradient(135deg, #fffc00, #ffd600)'
            },
            tiktok: {
                name: 'تيك توك',
                file: 'tikm.html',
                icon: 'fab fa-tiktok',
                iconClass: 'tiktok',
                headerColor: 'linear-gradient(135deg, #ff0050, #00f2ea)'
            },
            reels: {
                name: 'ريلز تلجرام',
                file: 'reels.html',
                icon: 'fas fa-film',
                iconClass: 'reels',
                headerColor: 'linear-gradient(135deg, #25D366, #128C7E)'
            }
        };

        let currentApp = '';

        // فتح التطبيق بملء الشاشة
        function openFullscreen(app) {
            const appInfo = apps[app];
            currentApp = app;
            
            // إظهار مؤشر التحميل
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // تحديث رأس النافذة
            document.getElementById('fullscreenName').textContent = appInfo.name;
            document.getElementById('fullscreenFile').textContent = appInfo.file;
            
            const fullscreenIcon = document.getElementById('fullscreenIcon');
            fullscreenIcon.className = `fullscreen-icon ${appInfo.iconClass}`;
            fullscreenIcon.innerHTML = `<i class="${appInfo.icon}"></i>`;
            
            const header = document.getElementById('fullscreenHeader');
            header.style.background = appInfo.headerColor;
            
            // تحميل التطبيق
            const frame = document.getElementById('fullscreenFrame');
            frame.src = appInfo.file;
            
            frame.onload = function() {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('fullscreenApp').classList.add('show');
                document.getElementById('backButton').style.display = 'block';
                showNotification(`✅ تم تشغيل ${appInfo.name}`);
            };
            
            frame.onerror = function() {
                document.getElementById('loadingOverlay').style.display = 'none';
                showNotification(`❌ خطأ في تحميل ${appInfo.file}`, 'error');
            };
        }

        // إغلاق التطبيق المكبر
        function closeFullscreen() {
            document.getElementById('fullscreenApp').classList.remove('show');
            document.getElementById('fullscreenFrame').src = '';
            document.getElementById('backButton').style.display = 'none';
            currentApp = '';
            showNotification('↩️ تم العودة للمدير');
        }

        // تحديث التطبيق الحالي
        function refreshApp() {
            if (!currentApp) return;
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            const frame = document.getElementById('fullscreenFrame');
            frame.src = frame.src;
            
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                showNotification('🔄 تم تحديث التطبيق');
            }, 1000);
        }

        // إغلاق رسالة الترحيب
        function closeMessage() {
            document.getElementById('welcomeMessage').classList.add('closed');
            showNotification('✖️ تم إغلاق الرسالة');
        }

        // عرض الإشعارات
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let icon = '✅';
            if (type === 'error') icon = '❌';
            else if (type === 'warning') icon = '⚠️';
            
            notification.innerHTML = `<i class="fas fa-bell"></i> ${icon} ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2500);
        }

        // إغلاق بالضغط على ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const fullscreen = document.getElementById('fullscreenApp');
                if (fullscreen.classList.contains('show')) {
                    closeFullscreen();
                }
            }
        });

        // إنشاء النجوم في الخلفية
        function createStars() {
            const starsContainer = document.querySelector('.stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // تهيئة الصفحة
        window.onload = function() {
            createStars();
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 1000);
            showNotification('✨ مرحباً بك في المدير المتكامل');
        };
    </script>
</body>
</html>
