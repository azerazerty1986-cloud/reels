<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدير المتكامل - أيقونات وتشغيل مباشر</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية المدير - ذهبية فاخرة */
        .manager-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #8B6910 0%, #DAA520 30%, #FFD700 70%, #F0E68C 100%);
            overflow: hidden;
        }

        /* تأثيرات خلفية المدير */
        .manager-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.3) 0%, transparent 50%);
            animation: rotate 40s linear infinite;
        }

        .manager-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.2"><polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="none" stroke="white" stroke-width="2"/><circle cx="50" cy="50" r="20" fill="none" stroke="white" stroke-width="2"/></svg>');
            background-size: 150px 150px;
            animation: moveBubbles 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes moveBubbles {
            0% { background-position: 0 0; }
            100% { background-position: 150px 150px; }
        }

        /* الهيدر الرئيسي - شفاف */
        .main-header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-text h1 {
            color: white;
            font-size: 32px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .status-badge i {
            color: #4caf50;
        }

        /* شبكة الأيقونات */
        .icons-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            flex-wrap: wrap;
            margin: 60px 0;
            animation: fadeIn 1s ease 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* بطاقة الأيقونة */
        .icon-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .icon-card:hover {
            transform: translateY(-20px);
        }

        .icon-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
            position: relative;
            border: 5px solid white;
        }

        .icon-card:hover .icon-circle {
            transform: scale(1.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        /* ألوان الأيقونات */
        .icon-circle.snap {
            background: linear-gradient(135deg, #fffc00, #ffd600);
            color: black;
        }

        .icon-circle.tiktok {
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            color: white;
        }

        .icon-circle.reels {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
        }

        /* اسم التطبيق تحت الأيقونة */
        .icon-label {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .icon-card:hover .icon-label {
            background: gold;
            color: black;
            transform: scale(1.05);
        }

        /* اسم الملف صغير أسفل */
        .icon-file {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            direction: ltr;
            transition: all 0.3s ease;
        }

        .icon-card:hover .icon-file {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* مؤشرات المستخدمين الصغيرة */
        .users-preview {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .user-mini {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        /* شريط سفلي */
        .bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            display: flex;
            gap: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 1s ease 0.5s both;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 100px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .bottom-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: gold;
        }

        /* نافذة التطبيق المكبرة */
        .fullscreen-app {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            flex-direction: column;
        }

        .fullscreen-app.show {
            display: flex;
        }

        .fullscreen-header {
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            border-bottom: 2px solid gold;
        }

        .fullscreen-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .fullscreen-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .fullscreen-close {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(255, 0, 0, 0.3);
            border: 2px solid red;
            color: red;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-close:hover {
            background: red;
            color: white;
            transform: scale(1.1);
        }

        .fullscreen-frame {
            width: 100%;
            flex: 1;
            border: none;
            background: white;
        }

        /* مؤشر التحميل */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 215, 0, 0.3);
            border-top: 8px solid gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* إشعارات */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 3000;
            animation: slideDown 0.3s ease;
            border: 2px solid white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* تجاوب */
        @media (max-width: 768px) {
            .icon-circle {
                width: 120px;
                height: 120px;
                font-size: 50px;
            }
            
            .icons-grid {
                gap: 30px;
            }
            
            .bottom-bar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية المدير الذهبية -->
    <div class="manager-bg"></div>
    
    <!-- الهيدر -->
    <div class="main-header">
        <div class="header-content">
            <div class="logo-text">
                <h1>🎯 المدير المتكامل</h1>
                <p>اضغط على أيقونة للتشغيل مباشرة في وضع ملء الشاشة</p>
            </div>
            <div class="status-badge">
                <i class="fas fa-circle"></i>
                <span>جميع الملفات جاهزة</span>
            </div>
        </div>
    </div>

    <!-- شبكة الأيقونات -->
    <div class="icons-grid">
        <!-- أيقونة سناب شات -->
        <div class="icon-card" onclick="openFullscreen('snap')">
            <div class="icon-circle snap">
                <i class="fab fa-snapchat"></i>
            </div>
            <div class="icon-label">سناب شات</div>
            <div class="icon-file">snam.html</div>
            <div class="users-preview">
                <div class="user-mini">👤</div>
                <div class="user-mini">👤</div>
                <div class="user-mini">👤</div>
            </div>
        </div>

        <!-- أيقونة تيك توك -->
        <div class="icon-card" onclick="openFullscreen('tiktok')">
            <div class="icon-circle tiktok">
                <i class="fab fa-tiktok"></i>
            </div>
            <div class="icon-label">تيك توك</div>
            <div class="icon-file">tikm.html</div>
            <div class="users-preview">
                <div class="user-mini">@sara</div>
                <div class="user-mini">@khaled</div>
            </div>
        </div>

        <!-- أيقونة ريلز تلجرام -->
        <div class="icon-card" onclick="openFullscreen('reels')">
            <div class="icon-circle reels">
                <i class="fas fa-film"></i>
            </div>
            <div class="icon-label">ريلز تلجرام</div>
            <div class="icon-file">reels.html</div>
            <div class="users-preview">
                <div class="user-mini">⭐</div>
                <div class="user-mini">450</div>
            </div>
        </div>
    </div>

    <!-- شريط سفلي -->
    <div class="bottom-bar">
        <div class="bottom-item">
            <i class="fas fa-crown"></i>
            <span>خلفية ذهبية للمدير</span>
        </div>
        <div class="bottom-item">
            <i class="fas fa-expand-alt"></i>
            <span>تشغيل مكبر مباشر</span>
        </div>
        <div class="bottom-item">
            <i class="fas fa-times-circle"></i>
            <span>ESC للخروج</span>
        </div>
    </div>

    <!-- نافذة التطبيق المكبرة -->
    <div class="fullscreen-app" id="fullscreenApp">
        <div class="fullscreen-header" id="fullscreenHeader">
            <div class="fullscreen-title">
                <div class="fullscreen-icon snap" id="fullscreenIcon">
                    <i class="fab fa-snapchat"></i>
                </div>
                <span id="fullscreenName">سناب شات</span>
                <span style="color: gold; font-family: monospace; margin-right: 15px;" id="fullscreenFile">snam.html</span>
            </div>
            <div class="fullscreen-close" onclick="closeFullscreen()">
                <i class="fas fa-times"></i>
            </div>
        </div>
        <iframe class="fullscreen-frame" id="fullscreenFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups allow-downloads allow-pointer-lock allow-orientation-lock"></iframe>
    </div>

    <!-- مؤشر التحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        // معلومات التطبيقات
        const apps = {
            snap: {
                name: 'سناب شات',
                file: 'snam.html',
                icon: 'fab fa-snapchat',
                iconClass: 'snap',
                color: '#fffc00'
            },
            tiktok: {
                name: 'تيك توك',
                file: 'tikm.html',
                icon: 'fab fa-tiktok',
                iconClass: 'tiktok',
                color: '#ff0050'
            },
            reels: {
                name: 'ريلز تلجرام',
                file: 'reels.html',
                icon: 'fas fa-film',
                iconClass: 'reels',
                color: '#25D366'
            }
        };

        // فتح التطبيق بملء الشاشة
        function openFullscreen(app) {
            const appInfo = apps[app];
            
            // إظهار مؤشر التحميل
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // تحديث رأس النافذة المكبرة
            document.getElementById('fullscreenName').textContent = appInfo.name;
            document.getElementById('fullscreenFile').textContent = appInfo.file;
            
            const fullscreenIcon = document.getElementById('fullscreenIcon');
            fullscreenIcon.className = `fullscreen-icon ${appInfo.iconClass}`;
            fullscreenIcon.innerHTML = `<i class="${appInfo.icon}"></i>`;
            
            // تغيير لون خلفية الهيدر حسب التطبيق
            const header = document.getElementById('fullscreenHeader');
            if (app === 'snap') {
                header.style.background = 'linear-gradient(135deg, #fffc00, #ffd600)';
                header.style.color = 'black';
            } else if (app === 'tiktok') {
                header.style.background = 'linear-gradient(135deg, #ff0050, #00f2ea)';
                header.style.color = 'white';
            } else {
                header.style.background = 'linear-gradient(135deg, #25D366, #128C7E)';
                header.style.color = 'white';
            }
            
            // تحميل التطبيق في iframe
            const frame = document.getElementById('fullscreenFrame');
            frame.src = appInfo.file;
            
            // عند اكتمال التحميل
            frame.onload = function() {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('fullscreenApp').classList.add('show');
                showNotification(`✅ تم تشغيل ${appInfo.name} بملء الشاشة`);
            };
            
            // في حالة خطأ
            frame.onerror = function() {
                document.getElementById('loadingOverlay').style.display = 'none';
                showNotification(`❌ خطأ في تحميل ${appInfo.file}`, 'error');
            };
        }

        // إغلاق التطبيق المكبر
        function closeFullscreen() {
            document.getElementById('fullscreenApp').classList.remove('show');
            document.getElementById('fullscreenFrame').src = ''; // تفريغ المصدر
        }

        // عرض الإشعارات
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let icon = '✅';
            if (type === 'error') icon = '❌';
            
            notification.innerHTML = `<i class="fas fa-bell"></i> ${icon} ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        // إغلاق بالضغط على ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const fullscreen = document.getElementById('fullscreenApp');
                if (fullscreen.classList.contains('show')) {
                    closeFullscreen();
                }
            }
        });

        // التحقق من وجود الملفات
        function checkFiles() {
            const files = ['snam.html', 'tikm.html', 'reels.html'];
            let readyCount = 0;
            
            files.forEach(file => {
                fetch(file)
                    .then(response => {
                        if (response.ok) {
                            readyCount++;
                            if (readyCount === 3) {
                                showNotification('✨ جميع الملفات جاهزة للتشغيل');
                            }
                        }
                    })
                    .catch(() => {
                        showNotification(`⚠️ الملف ${file} غير موجود`, 'warning');
                    });
            });
        }

        // تهيئة الصفحة
        window.onload = function() {
            checkFiles();
            
            // إخفاء مؤشر التحميل بعد ثانية
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 1000);
        };
    </script>
</body>
</html>
