<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدير المتكامل - خلفيات مميزة</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية المدير فقط - خلفية فاخرة */
        .manager-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }

        /* تأثيرات خلفية المدير */
        .manager-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        .manager-bg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M10 50 Q 30 30, 50 50 T 90 50" stroke="gold" fill="none" stroke-width="2"/><circle cx="20" cy="20" r="3" fill="gold"/><circle cx="80" cy="80" r="3" fill="gold"/></svg>');
            background-size: 100px 100px;
            animation: moveBubbles 20s linear infinite;
        }

        /* خلفية سناب شات */
        .snap-bg {
            background: linear-gradient(135deg, #fffc00 0%, #ffd600 100%);
            position: relative;
        }

        .snap-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><text x="10" y="50" font-family="Arial" font-size="40" fill="black">👻</text><text x="60" y="30" font-family="Arial" font-size="30" fill="black">✨</text></svg>');
            background-size: 200px 200px;
            animation: float 10s ease-in-out infinite;
        }

        /* خلفية تيك توك */
        .tiktok-bg {
            background: linear-gradient(135deg, #ff0050 0%, #00f2ea 100%);
            position: relative;
        }

        .tiktok-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><text x="20" y="30" font-family="Arial" font-size="40" fill="white">🎵</text><text x="60" y="70" font-family="Arial" font-size="40" fill="white">🎶</text></svg>');
            background-size: 200px 200px;
            animation: spin 20s linear infinite;
        }

        /* خلفية ريلز تلجرام */
        .reels-bg {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            position: relative;
        }

        .reels-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><text x="10" y="30" font-family="Arial" font-size="40" fill="white">🎬</text><text x="50" y="70" font-family="Arial" font-size="40" fill="white">🎥</text></svg>');
            background-size: 200px 200px;
            animation: bounce 15s ease-in-out infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes moveBubbles {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* الهيدر الرئيسي */
        .main-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.8s ease;
            position: relative;
            z-index: 10;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, gold, #ffd700);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #1a1a2e;
            transform: rotate(10deg);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4); }
            to { box-shadow: 0 25px 50px rgba(255, 215, 0, 0.8); }
        }

        .logo-text h1 {
            color: white;
            font-size: 36px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            font-weight: 900;
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-weight: 500;
        }

        /* شريط التنقل العلوي */
        .nav-bar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 10px;
            display: flex;
            gap: 10px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            margin-bottom: 30px;
            animation: slideUp 0.8s ease 0.2s both;
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-item {
            flex: 1;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            font-size: 18px;
            border: none;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .nav-item:hover::before {
            width: 300px;
            height: 300px;
        }

        .nav-item i {
            font-size: 24px;
            transition: all 0.4s;
            position: relative;
            z-index: 1;
        }

        .nav-item span {
            position: relative;
            z-index: 1;
        }

        .nav-item.active {
            background: linear-gradient(135deg, gold, #ffd700);
            color: #1a1a2e;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
        }

        .nav-item.active i {
            transform: scale(1.2);
            color: #1a1a2e;
        }

        /* حاوية التطبيق */
        .app-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            overflow: hidden;
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            height: 600px;
            position: relative;
            animation: fadeIn 1s ease 0.4s both;
            transition: all 0.3s ease;
        }

        /* وضع ملء الشاشة */
        .app-container:fullscreen {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            background: white;
        }

        .app-container:fullscreen .app-frame {
            height: 100vh;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .app-header {
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .app-icon.snap {
            background: linear-gradient(135deg, #fffc00, #ffd600);
            color: black;
        }

        .app-icon.tiktok {
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            color: white;
        }

        .app-icon.reels {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
        }

        .app-name {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .app-file {
            color: gold;
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            direction: ltr;
        }

        .app-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 2px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .action-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.1);
        }

        /* iframe */
        .app-frame {
            width: 100%;
            height: calc(100% - 75px);
            border: none;
            background: white;
            transition: all 0.5s ease;
        }

        /* مؤشر التحميل */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 215, 0, 0.3);
            border-top: 5px solid gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* إشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.4);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            border: 2px solid white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* إحصائيات سريعة */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            position: relative;
            z-index: 10;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .stat-item i {
            color: gold;
        }

        /* خلفيات التطبيقات - تضاف ديناميكياً */
        .app-bg-snap {
            background: linear-gradient(135deg, #fffc00, #ffd600) !important;
        }

        .app-bg-tiktok {
            background: linear-gradient(135deg, #ff0050, #00f2ea) !important;
        }

        .app-bg-reels {
            background: linear-gradient(135deg, #25D366, #128C7E) !important;
        }

        /* تجاوب */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-item span {
                display: none;
            }
            
            .nav-item i {
                font-size: 28px;
            }
            
            .app-container {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية المدير فقط -->
    <div class="manager-bg"></div>
    
    <!-- الهيدر الرئيسي -->
    <div class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">
                    <h1>المدير المتكامل</h1>
                    <p>خلفية ذهبية للمدير - خلفيات ملونة لكل تطبيق</p>
                </div>
            </div>
            
            <div class="stat-item">
                <i class="fas fa-circle" style="color: #4caf50;"></i>
                <span>جميع الملفات جاهزة</span>
            </div>
        </div>
    </div>

    <!-- شريط التنقل العلوي -->
    <div class="nav-bar">
        <button class="nav-item active" onclick="switchApp('snap')" id="nav-snap">
            <i class="fab fa-snapchat"></i>
            <span>سناب شات</span>
        </button>
        <button class="nav-item" onclick="switchApp('tiktok')" id="nav-tiktok">
            <i class="fab fa-tiktok"></i>
            <span>تيك توك</span>
        </button>
        <button class="nav-item" onclick="switchApp('reels')" id="nav-reels">
            <i class="fas fa-film"></i>
            <span>ريلز تلجرام</span>
        </button>
    </div>

    <!-- حاوية التطبيق -->
    <div class="app-container" id="appContainer">
        <div class="app-header" id="appHeader">
            <div class="app-title">
                <div class="app-icon snap" id="appIcon">
                    <i class="fab fa-snapchat"></i>
                </div>
                <span class="app-name" id="appName">سناب شات</span>
                <span class="app-file" id="appFile">snam.html</span>
            </div>
            <div class="app-actions">
                <button class="action-btn" onclick="refreshApp()" title="تحديث">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="action-btn" onclick="toggleFullscreen()" title="عرض كامل">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
        
        <!-- مكان عرض التطبيق -->
        <div id="appContent">
            <iframe class="app-frame" id="appFrame" src="snam.html" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups allow-downloads allow-pointer-lock allow-orientation-lock"></iframe>
        </div>
        
        <!-- مؤشر التحميل -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- إحصائيات سريعة -->
    <div class="stats-bar">
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>snam.html</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>tikm.html</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>reels.html</span>
        </div>
    </div>

    <script>
        // التطبيق الحالي
        let currentApp = 'snap';
        
        // معلومات التطبيقات
        const apps = {
            snap: {
                name: 'سناب شات',
                file: 'snam.html',
                icon: 'fab fa-snapchat',
                iconClass: 'snap',
                color: '#fffc00',
                bgClass: 'app-bg-snap'
            },
            tiktok: {
                name: 'تيك توك',
                file: 'tikm.html',
                icon: 'fab fa-tiktok',
                iconClass: 'tiktok',
                color: '#ff0050',
                bgClass: 'app-bg-tiktok'
            },
            reels: {
                name: 'ريلز تلجرام',
                file: 'reels.html',
                icon: 'fas fa-film',
                iconClass: 'reels',
                color: '#25D366',
                bgClass: 'app-bg-reels'
            }
        };

        // التبديل بين التطبيقات
        function switchApp(app) {
            if (currentApp === app) return; // نفس التطبيق
            
            // إظهار مؤشر التحميل
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // تحديث الأزرار النشطة
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.getElementById(`nav-${app}`).classList.add('active');
            
            // تحديث رأس التطبيق
            const appInfo = apps[app];
            document.getElementById('appName').textContent = appInfo.name;
            document.getElementById('appFile').textContent = appInfo.file;
            
            // تحديث أيقونة التطبيق
            const appIcon = document.getElementById('appIcon');
            appIcon.className = `app-icon ${appInfo.iconClass}`;
            appIcon.innerHTML = `<i class="${appInfo.icon}"></i>`;
            
            // تغيير خلفية حاوية التطبيق
            const appContainer = document.getElementById('appContainer');
            appContainer.className = `app-container ${appInfo.bgClass}`;
            
            // تغيير التطبيق في iframe
            const frame = document.getElementById('appFrame');
            
            // إخفاء التطبيق القديم
            frame.style.opacity = '0';
            
            // تغيير المصدر
            setTimeout(() => {
                frame.src = `${appInfo.file}`;
                currentApp = app;
                
                // إظهار التطبيق الجديد بعد التحميل
                frame.onload = function() {
                    frame.style.opacity = '1';
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`✅ تم تشغيل ${appInfo.name}`);
                };
                
                // في حالة خطأ في التحميل
                frame.onerror = function() {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`❌ خطأ في تحميل ${appInfo.file}`, 'error');
                };
            }, 300);
        }

        // تحديث التطبيق الحالي
        function refreshApp() {
            const frame = document.getElementById('appFrame');
            const appInfo = apps[currentApp];
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            frame.style.opacity = '0';
            
            setTimeout(() => {
                frame.src = `${appInfo.file}`;
                frame.onload = function() {
                    frame.style.opacity = '1';
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`🔄 تم تحديث ${appInfo.name}`);
                };
            }, 300);
        }

        // وضع ملء الشاشة (معدل للظهور كاملاً)
        function toggleFullscreen() {
            const container = document.getElementById('appContainer');
            
            if (!document.fullscreenElement) {
                container.requestFullscreen();
                showNotification('🔍 وضع ملء الشاشة - التطبيق يظهر كاملاً');
                
                // ضبط حجم iframe عند التكبير
                setTimeout(() => {
                    const frame = document.getElementById('appFrame');
                    frame.style.height = '100vh';
                }, 100);
            } else {
                document.exitFullscreen();
                
                // إعادة الحجم الطبيعي عند الخروج
                setTimeout(() => {
                    const frame = document.getElementById('appFrame');
                    frame.style.height = 'calc(100% - 75px)';
                }, 100);
            }
        }

        // عرض الإشعارات
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let icon = '✅';
            if (type === 'error') icon = '❌';
            else if (type === 'warning') icon = '⚠️';
            
            notification.innerHTML = `<i class="fas fa-bell"></i> ${icon} ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        // التحقق من وجود الملفات
        function checkFiles() {
            const files = ['snam.html', 'tikm.html', 'reels.html'];
            
            files.forEach(file => {
                fetch(file)
                    .then(response => {
                        if (!response.ok) {
                            showNotification(`⚠️ الملف ${file} غير موجود`, 'warning');
                        }
                    })
                    .catch(() => {
                        showNotification(`⚠️ الملف ${file} غير موجود`, 'warning');
                    });
            });
        }

        // اختصار لوحة المفاتيح
        document.addEventListener('keydown', (e) => {
            if (e.altKey) {
                switch(e.key) {
                    case '1':
                        switchApp('snap');
                        break;
                    case '2':
                        switchApp('tiktok');
                        break;
                    case '3':
                        switchApp('reels');
                        break;
                    case 'r':
                        refreshApp();
                        break;
                    case 'f':
                        toggleFullscreen();
                        break;
                }
            }
            
            // ESC للخروج من ملء الشاشة
            if (e.key === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen();
                setTimeout(() => {
                    const frame = document.getElementById('appFrame');
                    frame.style.height = 'calc(100% - 75px)';
                }, 100);
            }
        });

        // تهيئة الصفحة
        window.onload = function() {
            checkFiles();
            showNotification('✨ خلفية ذهبية للمدير - خلفيات ملونة للتطبيقات');
            
            // تحميل التطبيق الأول
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 1000);
        };
    </script>
</body>
</html>
