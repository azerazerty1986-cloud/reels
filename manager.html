<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التطبيقات المتكاملة - تشغيل احترافي</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* خلفية متحركة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 215, 0, 0.03) 0px,
                rgba(255, 215, 0, 0.03) 20px,
                transparent 20px,
                transparent 40px
            );
            animation: moveBg 20s linear infinite;
        }

        @keyframes moveBg {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* الهيدر الرئيسي */
        .main-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, gold, #ffd700);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #1a1a2e;
            transform: rotate(10deg);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4); }
            to { box-shadow: 0 25px 50px rgba(255, 215, 0, 0.8); }
        }

        .logo-text h1 {
            color: white;
            font-size: 36px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            font-weight: 900;
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-weight: 500;
        }

        /* شريط التنقل العلوي */
        .nav-bar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 10px;
            display: flex;
            gap: 10px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            margin-bottom: 30px;
            animation: slideUp 0.8s ease 0.2s both;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .nav-item {
            flex: 1;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            font-size: 18px;
            border: none;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .nav-item:hover::before {
            width: 300px;
            height: 300px;
        }

        .nav-item i {
            font-size: 24px;
            transition: all 0.4s;
            position: relative;
            z-index: 1;
        }

        .nav-item span {
            position: relative;
            z-index: 1;
        }

        .nav-item.active {
            background: linear-gradient(135deg, gold, #ffd700);
            color: #1a1a2e;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
        }

        .nav-item.active i {
            transform: scale(1.2);
            color: #1a1a2e;
        }

        /* حاوية التطبيق */
        .app-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            overflow: hidden;
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            height: 600px;
            position: relative;
            animation: fadeIn 1s ease 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .app-header {
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .app-icon.snap {
            background: linear-gradient(135deg, #fffc00, #ffd600);
            color: black;
        }

        .app-icon.tiktok {
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            color: white;
        }

        .app-icon.reels {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
        }

        .app-name {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .app-file {
            color: gold;
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            direction: ltr;
        }

        .app-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 2px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .action-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.1);
        }

        /* iframe */
        .app-frame {
            width: 100%;
            height: calc(100% - 75px);
            border: none;
            background: white;
            transition: all 0.5s ease;
        }

        /* حالة عدم التشغيل */
        .app-placeholder {
            width: 100%;
            height: calc(100% - 75px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            gap: 20px;
            text-align: center;
            padding: 30px;
        }

        .placeholder-icon {
            font-size: 80px;
            color: gold;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .placeholder-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .placeholder-desc {
            color: rgba(255, 255, 255, 0.7);
            max-width: 400px;
        }

        /* مؤشر التحميل */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 215, 0, 0.3);
            border-top: 5px solid gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* حالة عدم وجود ملف */
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            border-radius: 20px;
            padding: 30px;
            color: #f44336;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* إشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.4);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            border: 2px solid white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* إحصائيات سريعة */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .stat-item i {
            color: gold;
        }

        /* تجاوب */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-item span {
                display: none;
            }
            
            .nav-item i {
                font-size: 28px;
            }
            
            .app-container {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <!-- الهيدر الرئيسي -->
    <div class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">
                    <h1>منصة التطبيقات المتكاملة</h1>
                    <p>اختر تطبيقاً واحداً للتشغيل - يغلق الآخر تلقائياً</p>
                </div>
            </div>
            
            <div class="stat-item">
                <i class="fas fa-circle" style="color: #4caf50;"></i>
                <span>جميع الملفات جاهزة</span>
            </div>
        </div>
    </div>

    <!-- شريط التنقل العلوي -->
    <div class="nav-bar">
        <button class="nav-item active" onclick="switchApp('snap')" id="nav-snap">
            <i class="fab fa-snapchat"></i>
            <span>سناب شات</span>
        </button>
        <button class="nav-item" onclick="switchApp('tiktok')" id="nav-tiktok">
            <i class="fab fa-tiktok"></i>
            <span>تيك توك</span>
        </button>
        <button class="nav-item" onclick="switchApp('reels')" id="nav-reels">
            <i class="fas fa-film"></i>
            <span>ريلز تلجرام</span>
        </button>
    </div>

    <!-- حاوية التطبيق -->
    <div class="app-container" id="appContainer">
        <div class="app-header" id="appHeader">
            <div class="app-title">
                <div class="app-icon snap" id="appIcon">
                    <i class="fab fa-snapchat"></i>
                </div>
                <span class="app-name" id="appName">سناب شات</span>
                <span class="app-file" id="appFile">snam.html</span>
            </div>
            <div class="app-actions">
                <button class="action-btn" onclick="refreshApp()" title="تحديث">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="action-btn" onclick="toggleFullscreen()" title="عرض كامل">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
        
        <!-- مكان عرض التطبيق -->
        <div id="appContent">
            <iframe class="app-frame" id="appFrame" src="snam.html" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups allow-downloads allow-pointer-lock allow-orientation-lock"></iframe>
        </div>
        
        <!-- مؤشر التحميل -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- إحصائيات سريعة -->
    <div class="stats-bar">
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>snam.html</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>tikm.html</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>reels.html</span>
        </div>
    </div>

    <script>
        // التطبيق الحالي
        let currentApp = 'snap';
        
        // معلومات التطبيقات
        const apps = {
            snap: {
                name: 'سناب شات',
                file: 'snam.html',
                icon: 'fab fa-snapchat',
                iconClass: 'snap',
                color: '#fffc00'
            },
            tiktok: {
                name: 'تيك توك',
                file: 'tikm.html',
                icon: 'fab fa-tiktok',
                iconClass: 'tiktok',
                color: '#ff0050'
            },
            reels: {
                name: 'ريلز تلجرام',
                file: 'reels.html',
                icon: 'fas fa-film',
                iconClass: 'reels',
                color: '#25D366'
            }
        };

        // التبديل بين التطبيقات
        function switchApp(app) {
            if (currentApp === app) return; // نفس التطبيق
            
            // إظهار مؤشر التحميل
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // تحديث الأزرار النشطة
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.getElementById(`nav-${app}`).classList.add('active');
            
            // تحديث رأس التطبيق
            const appInfo = apps[app];
            document.getElementById('appName').textContent = appInfo.name;
            document.getElementById('appFile').textContent = appInfo.file;
            
            // تحديث أيقونة التطبيق
            const appIcon = document.getElementById('appIcon');
            appIcon.className = `app-icon ${appInfo.iconClass}`;
            appIcon.innerHTML = `<i class="${appInfo.icon}"></i>`;
            
            // تغيير التطبيق في iframe
            const frame = document.getElementById('appFrame');
            
            // إخفاء التطبيق القديم
            frame.style.opacity = '0';
            
            // تغيير المصدر (بدون مجلد reels)
            setTimeout(() => {
                frame.src = `${appInfo.file}`;
                currentApp = app;
                
                // إظهار التطبيق الجديد بعد التحميل
                frame.onload = function() {
                    frame.style.opacity = '1';
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`✅ تم تشغيل ${appInfo.name}`);
                };
                
                // في حالة خطأ في التحميل
                frame.onerror = function() {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`❌ خطأ في تحميل ${appInfo.file}`, 'error');
                };
            }, 300);
        }

        // تحديث التطبيق الحالي
        function refreshApp() {
            const frame = document.getElementById('appFrame');
            const appInfo = apps[currentApp];
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            frame.style.opacity = '0';
            
            setTimeout(() => {
                frame.src = `${appInfo.file}`;
                frame.onload = function() {
                    frame.style.opacity = '1';
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`🔄 تم تحديث ${appInfo.name}`);
                };
            }, 300);
        }

        // وضع ملء الشاشة
        function toggleFullscreen() {
            const container = document.getElementById('appContainer');
            
            if (!document.fullscreenElement) {
                container.requestFullscreen();
                showNotification('🔍 وضع ملء الشاشة');
            } else {
                document.exitFullscreen();
            }
        }

        // عرض الإشعارات
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let icon = '✅';
            if (type === 'error') icon = '❌';
            else if (type === 'warning') icon = '⚠️';
            
            notification.innerHTML = `<i class="fas fa-bell"></i> ${icon} ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        // التحقق من وجود الملفات
        function checkFiles() {
            const files = ['snam.html', 'tikm.html', 'reels.html'];
            
            files.forEach(file => {
                fetch(file)
                    .then(response => {
                        if (!response.ok) {
                            showNotification(`⚠️ الملف ${file} غير موجود`, 'warning');
                        }
                    })
                    .catch(() => {
                        showNotification(`⚠️ الملف ${file} غير موجود`, 'warning');
                    });
            });
        }

        // اختصار لوحة المفاتيح
        document.addEventListener('keydown', (e) => {
            if (e.altKey) {
                switch(e.key) {
                    case '1':
                        switchApp('snap');
                        break;
                    case '2':
                        switchApp('tiktok');
                        break;
                    case '3':
                        switchApp('reels');
                        break;
                    case 'r':
                        refreshApp();
                        break;
                    case 'f':
                        toggleFullscreen();
                        break;
                }
            }
            
            // ESC للخروج من ملء الشاشة
            if (e.key === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen();
            }
        });

        // تهيئة الصفحة
        window.onload = function() {
            checkFiles();
            showNotification('✨ مرحباً بك - استخدم الأزرار العلوية للتبديل بين التطبيقات');
            
            // تحميل التطبيق الأول
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 1000);
        };
    </script>
</body>
</html>
