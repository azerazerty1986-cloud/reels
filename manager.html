<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التطبيقات المتكاملة - تشغيل احترافي</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 15px;
            position: relative;
        }

        /* خلفية متحركة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 215, 0, 0.03) 0px,
                rgba(255, 215, 0, 0.03) 20px,
                transparent 20px,
                transparent 40px
            );
            animation: moveBg 20s linear infinite;
        }

        @keyframes moveBg {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* الهيدر الرئيسي - أصغر حجماً */
        .main-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 10px 20px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, gold, #ffd700);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1a1a2e;
            transform: rotate(5deg);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.4);
        }

        .logo-text h1 {
            color: white;
            font-size: 20px;
            margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            font-weight: 800;
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 10px;
            font-weight: 500;
        }

        /* شريط التنقل العلوي - أيقونات فقط */
        .nav-bar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 5px;
            display: flex;
            gap: 5px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            margin-bottom: 15px;
        }

        .nav-item {
            flex: 1;
            padding: 10px 15px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: none;
        }

        .nav-item i {
            font-size: 22px;
            transition: all 0.3s;
        }

        /* إخفاء النصوص في شريط التنقل */
        .nav-item span {
            display: none;
        }

        .nav-item.active {
            background: linear-gradient(135deg, gold, #ffd700);
            color: #1a1a2e;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.5);
        }

        .nav-item.active i {
            transform: scale(1.1);
            color: #1a1a2e;
        }

        /* حاوية التطبيق - أكبر حجماً */
        .app-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            height: 70vh; /* أكبر حجماً */
            min-height: 500px;
            position: relative;
            margin-top: 10px;
        }

        /* رأس التطبيق */
        .app-header {
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .app-icon.snap {
            background: linear-gradient(135deg, #fffc00, #ffd600);
            color: black;
        }

        .app-icon.tiktok {
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            color: white;
        }

        .app-icon.reels {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
        }

        .app-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .app-file {
            color: gold;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 8px;
            border-radius: 12px;
        }

        .app-actions {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 2px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .action-btn:hover {
            background: gold;
            color: black;
        }

        /* زر الإغلاق الدائري - دائم الظهور */
        .close-btn {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4d4d, #f44336);
            border: 3px solid white;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.6);
            transition: all 0.3s ease;
            z-index: 1000;
            /* دائم الظهور */
            opacity: 1;
            transform: scale(1);
        }

        .close-btn:hover {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 20px rgba(244, 67, 54, 0.9);
        }

        /* iframe */
        .app-frame {
            width: 100%;
            height: calc(100% - 46px);
            border: none;
            background: white;
        }

        /* مؤشر التحميل */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top: 4px solid gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* إشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            z-index: 1000;
            border: 2px solid white;
        }

        /* إحصائيات سريعة - أصغر */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            font-size: 12px;
        }

        .stat-item i {
            color: gold;
            font-size: 12px;
        }

        /* تجاوب */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .app-container {
                height: 60vh;
            }
            
            .close-btn {
                width: 35px;
                height: 35px;
                font-size: 18px;
                top: -10px;
                right: -10px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <!-- الهيدر الرئيسي -->
    <div class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">
                    <h1>منصة التطبيقات</h1>
                    <p>تبديل تلقائي</p>
                </div>
            </div>
            
            <div class="stat-item">
                <i class="fas fa-circle" style="color: #4caf50;"></i>
                <span>الملفات جاهزة</span>
            </div>
        </div>
    </div>

    <!-- شريط التنقل العلوي - أيقونات فقط -->
    <div class="nav-bar">
        <button class="nav-item active" onclick="switchApp('snap')" id="nav-snap">
            <i class="fab fa-snapchat"></i>
            <span>سناب شات</span>
        </button>
        <button class="nav-item" onclick="switchApp('tiktok')" id="nav-tiktok">
            <i class="fab fa-tiktok"></i>
            <span>تيك توك</span>
        </button>
        <button class="nav-item" onclick="switchApp('reels')" id="nav-reels">
            <i class="fas fa-film"></i>
            <span>ريلز تلجرام</span>
        </button>
    </div>

    <!-- حاوية التطبيق -->
    <div class="app-container" id="appContainer">
        <!-- زر الإغلاق الدائري - دائم الظهور -->
        <div class="close-btn" onclick="closeApp()" title="إغلاق التطبيق">
            <i class="fas fa-times"></i>
        </div>
        
        <div class="app-header" id="appHeader">
            <div class="app-title">
                <div class="app-icon snap" id="appIcon">
                    <i class="fab fa-snapchat"></i>
                </div>
                <span class="app-name" id="appName">سناب شات</span>
                <span class="app-file" id="appFile">snam.html</span>
            </div>
            <div class="app-actions">
                <button class="action-btn" onclick="refreshApp()" title="تحديث">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="action-btn" onclick="toggleFullscreen()" title="عرض كامل">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
        
        <!-- مكان عرض التطبيق -->
        <div id="appContent">
            <iframe class="app-frame" id="appFrame" src="snam.html" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups allow-downloads allow-pointer-lock allow-orientation-lock"></iframe>
        </div>
        
        <!-- مؤشر التحميل -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- إحصائيات سريعة -->
    <div class="stats-bar">
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>snam.html</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>tikm.html</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-file"></i>
            <span>reels.html</span>
        </div>
    </div>

    <script>
        // التطبيق الحالي
        let currentApp = 'snap';
        
        // معلومات التطبيقات
        const apps = {
            snap: {
                name: 'سناب شات',
                file: 'snam.html',
                icon: 'fab fa-snapchat',
                iconClass: 'snap'
            },
            tiktok: {
                name: 'تيك توك',
                file: 'tikm.html',
                icon: 'fab fa-tiktok',
                iconClass: 'tiktok'
            },
            reels: {
                name: 'ريلز تلجرام',
                file: 'reels.html',
                icon: 'fas fa-film',
                iconClass: 'reels'
            }
        };

        // التبديل بين التطبيقات
        function switchApp(app) {
            if (currentApp === app) return;
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.getElementById(`nav-${app}`).classList.add('active');
            
            const appInfo = apps[app];
            document.getElementById('appName').textContent = appInfo.name;
            document.getElementById('appFile').textContent = appInfo.file;
            
            const appIcon = document.getElementById('appIcon');
            appIcon.className = `app-icon ${appInfo.iconClass}`;
            appIcon.innerHTML = `<i class="${appInfo.icon}"></i>`;
            
            const frame = document.getElementById('appFrame');
            frame.style.opacity = '0';
            
            setTimeout(() => {
                frame.src = `${appInfo.file}`;
                currentApp = app;
                
                frame.onload = function() {
                    frame.style.opacity = '1';
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`✅ تم تشغيل ${appInfo.name}`);
                };
                
                frame.onerror = function() {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`❌ خطأ في تحميل ${appInfo.file}`, 'error');
                    
                    // عرض محتوى تجريبي إذا لم يوجد الملف
                    frame.src = 'about:blank';
                    frame.srcdoc = `
                        <html dir="rtl">
                        <body style="display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; font-family: Arial; text-align: center;">
                            <div>
                                <h2>${appInfo.name}</h2>
                                <p>الملف ${appInfo.file} غير موجود</p>
                                <p style="color: gold;">قم بإنشاء الملف لعرض المحتوى</p>
                            </div>
                        </body>
                        </html>
                    `;
                };
            }, 300);
        }

        // تحديث التطبيق الحالي
        function refreshApp() {
            const frame = document.getElementById('appFrame');
            const appInfo = apps[currentApp];
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            frame.style.opacity = '0';
            
            setTimeout(() => {
                frame.src = `${appInfo.file}`;
                frame.onload = function() {
                    frame.style.opacity = '1';
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showNotification(`🔄 تم تحديث ${appInfo.name}`);
                };
            }, 300);
        }

        // وضع ملء الشاشة
        function toggleFullscreen() {
            const container = document.getElementById('appContainer');
            
            if (!document.fullscreenElement) {
                container.requestFullscreen();
                showNotification('🔍 وضع ملء الشاشة');
            } else {
                document.exitFullscreen();
            }
        }

        // إغلاق التطبيق
        function closeApp() {
            const frame = document.getElementById('appFrame');
            const appInfo = apps[currentApp];
            
            frame.src = 'about:blank';
            showNotification(`🔴 تم إغلاق ${appInfo.name}`);
        }

        // عرض الإشعارات
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let icon = '✅';
            if (type === 'error') icon = '❌';
            
            notification.innerHTML = `${icon} ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        // اختصار لوحة المفاتيح
        document.addEventListener('keydown', (e) => {
            if (e.altKey) {
                switch(e.key) {
                    case '1': switchApp('snap'); break;
                    case '2': switchApp('tiktok'); break;
                    case '3': switchApp('reels'); break;
                    case 'r': refreshApp(); break;
                    case 'f': toggleFullscreen(); break;
                }
            }
        });

        // تهيئة الصفحة
        window.onload = function() {
            showNotification('✨ مرحباً بك');
            
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 1000);
        };
    </script>
</body>
</html>
