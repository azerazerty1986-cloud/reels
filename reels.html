
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رفع Reels - البصمة موجودة</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f2b23, #1e4a3f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* الهيدر */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: gold;
            font-size: 40px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
        }

        /* معلومات المستخدم */
        .user-info-bar {
            background: linear-gradient(135deg, #2c5e4f, #1a3a32);
            border: 2px solid gold;
            border-radius: 60px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .user-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, gold, #ffd700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #1a3a32;
            border: 3px solid white;
        }

        .user-info h3 {
            color: gold;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .user-info .user-role {
            display: inline-block;
            padding: 3px 12px;
            background: rgba(255,215,0,0.2);
            border-radius: 20px;
            font-size: 12px;
            color: gold;
            border: 1px solid gold;
        }

        .user-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: gold;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        /* بطاقة البصمة */
        .fingerprint-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 30px rgba(255,215,0,0.3); }
            to { box-shadow: 0 0 60px rgba(255,215,0,0.6); }
        }

        .fingerprint-icon {
            font-size: 80px;
            color: gold;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .fingerprint-title {
            color: gold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .fingerprint-value {
            font-family: 'Courier New', monospace;
            font-size: 32px;
            color: white;
            letter-spacing: 4px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid gold;
            margin: 20px 0;
            word-break: break-all;
            direction: ltr;
        }

        .fingerprint-user {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,215,0,0.1);
            border-radius: 50px;
        }

        .fingerprint-user i {
            color: gold;
        }

        .fingerprint-user span {
            color: white;
            font-weight: bold;
        }

        .copy-btn {
            background: none;
            border: 2px solid gold;
            color: gold;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .copy-btn:hover {
            background: gold;
            color: black;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px gold;
        }

        /* النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.5s ease;
            position: relative;
            box-shadow: 0 0 50px rgba(255,215,0,0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            color: gold;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .modal-header i {
            font-size: 60px;
            color: gold;
            margin-bottom: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: gold;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            transform: scale(1.2);
            color: white;
        }

        /* خيارات النشر */
        .publish-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .publish-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .publish-option i {
            font-size: 24px;
        }

        .publish-option.channel {
            background: linear-gradient(135deg, #0088cc, #006699);
        }

        .publish-option.group {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .publish-option.story {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }

        .publish-option:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.5);
        }

        .publish-option.active {
            border: 3px solid gold;
            transform: scale(1.05);
        }

        /* منطقة رفع الفيديو */
        .upload-area {
            border: 3px dashed gold;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            background: rgba(255,215,0,0.05);
        }

        .upload-area:hover {
            background: rgba(255,215,0,0.1);
            transform: scale(1.02);
        }

        .upload-area i {
            font-size: 60px;
            color: gold;
            margin-bottom: 15px;
        }

        .upload-area h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: gold;
        }

        /* معاينة الفيديو */
        .video-preview {
            margin-bottom: 25px;
            display: none;
        }

        .video-preview.show {
            display: block;
        }

        .video-preview video {
            width: 100%;
            max-height: 400px;
            border-radius: 15px;
            border: 3px solid gold;
            background: black;
        }

        .video-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .remove-video {
            color: #f44336;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .remove-video:hover {
            transform: scale(1.2);
        }

        /* حقول النموذج */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: gold;
            font-weight: bold;
        }

        .form-group label i {
            margin-left: 5px;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        /* معلومات القناة - مخفية تماماً */
        .channel-info {
            display: none;
        }

        /* زر الإرسال */
        .send-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-top: 20px;
            border: 2px solid white;
        }

        .send-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px gold;
        }

        .send-btn i {
            font-size: 28px;
            color: black;
        }

        /* الإشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(212,175,55,0.5);
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* رسالة الخطأ */
        .error-message {
            background: rgba(244,67,54,0.2);
            border: 2px solid #f44336;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #f44336;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-fingerprint"></i>
                رفع Reels
                <i class="fas fa-paper-plane"></i>
            </h1>
            <p>اضغط على الزر لفتح نافذة الرفع</p>
        </div>

        <!-- معلومات المستخدم -->
        <div class="user-info-bar" id="userInfoBar">
            <div class="user-details">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-info">
                    <h3 id="userName">أحمد التاجر</h3>
                    <span class="user-role" id="userRole">تاجر معتمد</span>
                </div>
            </div>
            <div class="user-stats">
                <div class="stat-item">
                    <div class="stat-value" id="userReelsCount">12</div>
                    <div class="stat-label">Reels</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="userPoints">450</div>
                    <div class="stat-label">نقاط</div>
                </div>
            </div>
        </div>

        <!-- زر فتح النافذة -->
        <button class="send-btn" onclick="openReelModal()" style="margin-bottom: 30px; background: linear-gradient(135deg, #2c5e4f, #1a3a32); color: gold; border: 2px solid gold;">
            <i class="fas fa-plus-circle" style="color: gold;"></i>
            رفع Reel جديد
        </button>
    </div>

    <!-- النافذة المنبثقة -->
    <div class="modal" id="reelModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            
            <div class="modal-header">
                <i class="fas fa-film"></i>
                <h2>رفع Reel</h2>
            </div>

            <!-- خيارات النشر -->
            <div class="publish-options">
                <div class="publish-option channel active" onclick="selectPublishType('channel', this)">
                    <i class="fas fa-tv"></i>
                    <span>قناة</span>
                </div>
                <div class="publish-option group" onclick="selectPublishType('group', this)">
                    <i class="fas fa-users"></i>
                    <span>مجموعة</span>
                </div>
                <div class="publish-option story" onclick="selectPublishType('story', this)">
                    <i class="fas fa-clock"></i>
                    <span>ستوري</span>
                </div>
            </div>

            <!-- منطقة رفع الفيديو -->
            <div class="upload-area" onclick="document.getElementById('videoFile').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>اضغط لرفع فيديو</h3>
                <p>MP4, MOV, AVI - الحد الأقصى 100MB</p>
            </div>

            <input type="file" id="videoFile" accept="video/*" style="display: none;" onchange="handleVideoUpload(this)">

            <!-- معاينة الفيديو -->
            <div class="video-preview" id="videoPreview">
                <video id="videoPlayer" controls>
                    <source src="" id="videoSource">
                </video>
                <div class="video-info">
                    <div class="video-name" id="videoName"></div>
                    <i class="fas fa-times-circle remove-video" onclick="removeVideo()"></i>
                </div>
            </div>

            <!-- البصمة -->
            <div class="fingerprint-card" style="padding: 20px; margin-bottom: 20px;">
                <div class="fingerprint-icon" style="font-size: 40px;">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <div class="fingerprint-title">البصمة</div>
                <div class="fingerprint-value" id="modalThumbprint" style="font-size: 20px; padding: 10px;">---</div>
                <div class="fingerprint-user">
                    <i class="fas fa-user-circle"></i>
                    <span id="modalUser">أحمد التاجر</span>
                </div>
                <button class="copy-btn" onclick="copyThumbprint()" style="margin-top: 10px;">
                    <i class="fas fa-copy"></i>
                    نسخ البصمة
                </button>
            </div>

            <!-- رسالة الخطأ (تظهر عند الحاجة) -->
            <div class="error-message" id="errorMessage" style="display: none;"></div>

            <!-- حقول النشر -->
            <div class="form-group">
                <label><i class="fas fa-heading"></i> العنوان</label>
                <input type="text" class="form-control" id="postTitle" placeholder="أدخل العنوان..." value="ريلز">
            </div>

            <!-- زر الإرسال (بدون كلمة تلجرام) -->
            <button class="send-btn" onclick="sendToTelegram()">
                <i class="fas fa-paper-plane"></i>
                إرسال
            </button>
        </div>
    </div>

    <script>
        // ========== إعدادات ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== بيانات المستخدم ==========
        const currentUser = {
            id: 1002,
            name: 'أحمد التاجر',
            role: 'merchant_approved',
            points: 450,
            reelsCount: 12
        };

        // ========== قاعدة بيانات البصمات ==========
        let thumbprintsDB = JSON.parse(localStorage.getItem('user_thumbprints')) || [];

        // ========== متغيرات ==========
        let publishType = 'channel';
        let selectedFile = null;
        let currentThumbprint = '';

        // ========== فتح النافذة ==========
        function openReelModal() {
            document.getElementById('reelModal').style.display = 'flex';
            document.getElementById('errorMessage').style.display = 'none';
            generateThumbprint();
            document.getElementById('modalUser').textContent = currentUser.name;
        }

        // ========== إغلاق النافذة ==========
        function closeModal() {
            document.getElementById('reelModal').style.display = 'none';
            removeVideo();
            document.getElementById('errorMessage').style.display = 'none';
        }

        // ========== توليد بصمة فريدة ==========
        function generateThumbprint() {
            const date = new Date();
            const year = date.getFullYear().toString().substring(2);
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            
            let prefix = 'REL';
            if (publishType === 'group') prefix = 'GRP';
            else if (publishType === 'story') prefix = 'STR';
            
            const userCode = currentUser.id.toString().padStart(4, '0');
            
            currentThumbprint = `${prefix}_${userCode}_${year}${month}${day}_${hours}${minutes}${seconds}`;
            document.getElementById('modalThumbprint').textContent = currentThumbprint;
        }

        // ========== تحديث البصمة ==========
        setInterval(generateThumbprint, 1000);

        // ========== اختيار نوع النشر ==========
        function selectPublishType(type, element) {
            publishType = type;
            
            document.querySelectorAll('.publish-option').forEach(opt => {
                opt.classList.remove('active');
            });
            
            element.classList.add('active');
            generateThumbprint();
        }

        // ========== معالجة رفع الفيديو ==========
        function handleVideoUpload(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                
                if (selectedFile.size > 100 * 1024 * 1024) {
                    showNotification('❌ حجم الفيديو كبير جداً (الحد الأقصى 100MB)', 'error');
                    return;
                }

                const videoURL = URL.createObjectURL(selectedFile);
                document.getElementById('videoSource').src = videoURL;
                document.getElementById('videoPlayer').load();
                document.getElementById('videoPreview').classList.add('show');
                document.getElementById('videoName').textContent = selectedFile.name;

                showNotification('✅ تم رفع الفيديو', 'success');
            }
        }

        // ========== إزالة الفيديو ==========
        function removeVideo() {
            selectedFile = null;
            document.getElementById('videoPreview').classList.remove('show');
            document.getElementById('videoFile').value = '';
            document.getElementById('videoSource').src = '';
        }

        // ========== نسخ البصمة ==========
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint).then(() => {
                showNotification('✅ تم نسخ البصمة', 'success');
            });
        }

        // ========== حفظ البصمة ==========
        function saveThumbprint() {
            const newEntry = {
                id: Date.now(),
                thumbprint: currentThumbprint,
                type: publishType,
                title: document.getElementById('postTitle').value || 'ريلز',
                userId: currentUser.id,
                userName: currentUser.name,
                timestamp: new Date().toISOString(),
                videoName: selectedFile ? selectedFile.name : 'بدون فيديو'
            };

            thumbprintsDB.unshift(newEntry);
            currentUser.reelsCount++;
            currentUser.points += 10;
            
            localStorage.setItem('user_thumbprints', JSON.stringify(thumbprintsDB));
            
            // تحديث الواجهة
            document.getElementById('userReelsCount').textContent = currentUser.reelsCount;
            document.getElementById('userPoints').textContent = currentUser.points;
            
            return newEntry;
        }

        // ========== إرسال (بدون ذكر تلجرام) ==========
        async function sendToTelegram() {
            if (!selectedFile) {
                showNotification('❌ الرجاء رفع فيديو أولاً', 'error');
                return;
            }

            showNotification('🔄 جاري الإرسال...', 'info');
            document.getElementById('errorMessage').style.display = 'none';

            // حفظ البصمة
            const savedEntry = saveThumbprint();

            // رسالة عادية بدون تنسيق
            const title = document.getElementById('postTitle').value || 'ريلز';
            const message = `🎬 Reel جديد\n\n👤 المستخدم: ${currentUser.name}\n🔍 البصمة: ${currentThumbprint}\n📌 النوع: ${publishType === 'channel' ? 'قناة' : publishType === 'group' ? 'مجموعة' : 'ستوري'}\n📝 العنوان: ${title}\n📁 الملف: ${selectedFile.name}\n📅 التاريخ: ${new Date().toLocaleString('ar-EG')}\n\n✅ تم الإرسال`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: ''
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    showNotification(`✅ تم الإرسال - ${currentThumbprint}`, 'success');
                    
                    document.getElementById('postTitle').value = 'ريلز';
                    removeVideo();
                    
                    setTimeout(() => {
                        closeModal();
                    }, 2000);
                } else {
                    const errorMsg = data.description || 'خطأ';
                    document.getElementById('errorMessage').innerHTML = `❌ ${errorMsg}`;
                    document.getElementById('errorMessage').style.display = 'block';
                    showNotification('❌ فشل الإرسال', 'error');
                }
            } catch (error) {
                document.getElementById('errorMessage').innerHTML = `❌ خطأ: ${error.message}`;
                document.getElementById('errorMessage').style.display = 'block';
                showNotification('❌ فشل الاتصال', 'error');
            }
        }

        // ========== عرض الإشعارات ==========
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let icon = 'ℹ️';
            if (type === 'success') icon = '✅';
            else if (type === 'error') icon = '❌';
            else if (type === 'info') icon = '🔄';
            
            notification.innerHTML = `${icon} ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // ========== إغلاق النافذة عند الضغط خارجها ==========
        window.onclick = function(event) {
            const modal = document.getElementById('reelModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // ========== تهيئة الصفحة ==========
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userRole').textContent = 'تاجر معتمد';
        document.getElementById('userReelsCount').textContent = currentUser.reelsCount;
        document.getElementById('userPoints').textContent = currentUser.points;
    </script>
</body>
</html>
