
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Cloud UI - مع جولة المستخدمين</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* الشريط الجانبي */
        .sidebar {
            background: white;
            padding: 30px 20px;
            border-left: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: bold;
        }

        .logo i {
            color: #ff0050;
            font-size: 32px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            border-radius: 12px;
            color: #666;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: linear-gradient(135deg, #ff0050, #ff8a00);
            color: white;
        }

        .nav-item i {
            font-size: 20px;
        }

        .storage-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .storage-info i {
            font-size: 24px;
            color: #ff0050;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 10px 0;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff0050, #ff8a00);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* المحتوى الرئيسي */
        .main-content {
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
            position: relative;
        }

        /* مؤشر الجولة - نفس تصميم الصورة */
        .tour-guide {
            background: linear-gradient(135deg, #ff0050, #ff8a00);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(255,0,80,0.3);
            animation: slideDown 0.5s ease;
        }

        .tour-guide i {
            font-size: 24px;
            margin-left: 10px;
        }

        .tour-progress {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }

        .tour-dot {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .tour-dot.active {
            background: white;
            width: 60px;
        }

        .tour-btn {
            background: white;
            color: #ff0050;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tour-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* شريط المستخدمين - نفس تصميم الصورة */
        .users-carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 15px 5px 20px 5px;
            margin-bottom: 25px;
            scrollbar-width: thin;
            scrollbar-color: #ff0050 #f0f0f0;
            direction: ltr;
        }

        .users-carousel::-webkit-scrollbar {
            height: 5px;
        }

        .users-carousel::-webkit-scrollbar-thumb {
            background: #ff0050;
            border-radius: 10px;
        }

        .user-tour-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            min-width: 80px;
        }

        .user-tour-item:hover {
            transform: translateY(-5px);
        }

        .user-tour-item.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 100%;
            height: 3px;
            background: #ff0050;
            border-radius: 3px;
            animation: slideIn 0.3s ease;
        }

        .user-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, #ff0050, #ff8a00);
        }

        .user-avatar-large img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
        }

        .user-status {
            font-size: 12px;
            color: #00cc66;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* بروفايل المستخدم - نفس تصميم الصورة تماماً */
        .user-profile-header {
            background: linear-gradient(135deg, #ff0050, #ff8a00);
            color: white;
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(255,0,80,0.2);
        }

        .profile-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-main img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        .profile-name h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .profile-name p {
            font-size: 16px;
            opacity: 0.9;
        }

        .verified-badge {
            color: #00cc66;
            margin-right: 5px;
        }

        .profile-bio {
            font-size: 15px;
            margin-bottom: 20px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-item .number {
            font-size: 22px;
            font-weight: bold;
        }

        .stat-item .label {
            font-size: 14px;
            opacity: 0.9;
        }

        .follow-btn {
            background: white;
            color: #ff0050;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .follow-btn.following {
            background: #00cc66;
            color: white;
        }

        /* الفيديوهات */
        .videos-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .video-card.tour-highlight {
            border: 3px solid #ff0050;
            transform: scale(1.01);
            box-shadow: 0 15px 40px rgba(255,0,80,0.3);
        }

        .video-wrapper {
            position: relative;
            height: 450px;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
        }

        .video-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .video-user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .video-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-btn {
            background: transparent;
            border: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .stat-btn.liked {
            color: #ff0050;
        }

        /* لوحة السحابة */
        .cloud-panel {
            background: white;
            padding: 20px;
            border-right: 1px solid #eee;
            overflow-y: auto;
        }

        .cloud-panel h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff0050;
            margin-bottom: 20px;
        }

        .upload-area {
            background: #f8f9fa;
            border: 2px dashed #ff0050;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #ffe5ec;
        }

        .upload-area i {
            font-size: 48px;
            color: #ff0050;
            margin-bottom: 10px;
        }

        .cloud-file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .cloud-file-item:hover {
            background: #ffe5ec;
        }

        .cloud-file-item i {
            color: #ff0050;
            font-size: 20px;
        }

        .file-info {
            flex: 1;
        }

        .file-info small {
            color: #999;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 10px;
            margin-top: 20px;
            color: #0066cc;
        }

        .spinning {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* مشغل الفيديو المنبثق */
        .video-player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .player-content {
            position: relative;
            width: 90%;
            max-width: 400px;
        }

        .close-player {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        #mainVideo {
            width: 100%;
            border-radius: 15px;
        }

        /* تجاوب مع الشاشات */
        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 80px 1fr 250px;
            }
            .logo span, .nav-item span, .storage-info span, .storage-info small {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar, .cloud-panel {
                display: none;
            }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

            <div class="upload-area" id="uploadArea" onclick="document.getElementById('videoUpload').click()">

            </div>

            <div class="cloud-files" id="cloudFiles">
                <div class="cloud-file-item">
                    <i class="fas fa-video"></i>
                    <div class="file-info">

                    </div>
                    <i class="fas fa-check-circle" style="color: #00cc66;"></i>
                </div>
                <div class="cloud-file-item">
                    <i class="fas fa-video"></i>

                        <strong>فيديو 2.mp4</strong>
                        <small>8.3 MB</small>
                    </div>
                    <i class="fas fa-cloud-upload-alt" style="color: #ff0050;"></i>

            <div class="sync-status">
                <i class="fas fa-sync-alt spinning"></i>

    </div>

    <!-- مشغل الفيديو المنبثق -->
    <div class="video-player-modal" id="videoPlayer">
        <div class="player-content">

            <video controls id="mainVideo" src=""></video>

        const userVideos = {

                { id: 402, desc: 'تقنية جديدة في الرسم ✨', likes: '32.1K', comments: '890', music: 'موسيقى هادئة' }
            ],
            5: [

            ]
        };

        // متغيرات الجولة
        let currentTourIndex = 0;
        let tourActive = true; // الجولة مفعلة تلقائياً
        let currentFollowing = new Set();

        // تحميل المستخدمين في الكاروسيل - نفس تصميم الصورة
        function loadUsersCarousel() {
            const carousel = document.getElementById('usersCarousel');
            carousel.innerHTML = '';

            users.forEach((user, index) => {
                const userItem = document.createElement('div');
                userItem.className = 'user-tour-item';
                if (index === 0) userItem.classList.add('active');
                userItem.setAttribute('data-user-id', user.id);
                userItem.setAttribute('onclick', `showUserVideos(${user.id})`);
                
                userItem.innerHTML = `
                    <div class="user-avatar-large">
                        <img src="${user.avatar}" alt="${user.name}">
                    </div>
                    <span style="font-size: 13px;">${user.username}</span>
                    <span class="user-status">
                        <i class="fas fa-circle" style="font-size: 8px;"></i>
                        ${user.status}
                    </span>
                `;
                
                carousel.appendChild(userItem);
            });
        }

        // بدء جولة المستخدمين
        function startUserTour() {
            tourActive = true;
            currentTourIndex = 0;
            
            document.getElementById('tourGuide').style.display = 'flex';
            document.getElementById('tourBtn').textContent = 'التالي';
            
            showUserVideos(users[currentTourIndex].id);
            updateTourProgress();
            highlightCurrentUser();
        }

        // الانتقال للمستخدم التالي
        function nextUserTour() {
            if (currentTourIndex < users.length - 1) {
                currentTourIndex++;
                showUserVideos(users[currentTourIndex].id);
                updateTourProgress();
                highlightCurrentUser();
                
                if (currentTourIndex === users.length - 1) {
                    document.getElementById('tourBtn').textContent = 'إنهاء الجولة';
                }
            } else {
                // إنهاء الجولة والعودة للصفحة الرئيسية
                tourActive = false;
                document.getElementById('tourGuide').style.display = 'none';
                loadAllVideos();
                
                document.querySelectorAll('.user-tour-item').forEach(item => {
                    item.classList.remove('active');
                });
            }
        }

        // تحديث شريط التقدم
        function updateTourProgress() {
            const dots = document.querySelectorAll('.tour-dot');
            dots.forEach((dot, index) => {
                if (index <= currentTourIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
            
            document.getElementById('tourStepText').textContent = 
                `اكتشف ${users[currentTourIndex].name}`;
        }

        // تحديد المستخدم الحالي في الكاروسيل
        function highlightCurrentUser() {
            document.querySelectorAll('.user-tour-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-user-id') == users[currentTourIndex].id) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
        }

        // عرض فيديوهات مستخدم معين - نفس تصميم الصورة بالضبط
        function showUserVideos(userId) {
            const feed = document.getElementById('videosFeed');
            const user = users.find(u => u.id === userId);
            const videos = userVideos[userId] || [];
            
            // بروفايل المستخدم - نفس التنسيق في الصورة
            let profileHTML = `
                <div class="user-profile-header">
                    <div class="profile-main">
                        <img src="${user.avatar}" alt="${user.name}">
                        <div class="profile-name">
                            <h2>${user.name} ${user.verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}</h2>
                            <p>${user.username}</p>
                        </div>
                    </div>
                    
                    <div class="profile-bio">
                        ${user.bio}
                    </div>
                    
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="number">${user.videos}</span>
                            <span class="label">فيديوهات</span>
                        </div>
                        <div class="stat-item">
                            <span class="number">${user.following}</span>
                            <span class="label">يتابع</span>
                        </div>
                        <div class="stat-item">
                            <span class="number">${user.followers}</span>
                            <span class="label">متابعين</span>
                        </div>
                    </div>
                    
                    <button class="follow-btn" onclick="toggleFollow(this, '${user.username}')" id="followBtn-${user.id}">
                        ${currentFollowing.has(user.username) ? 'متابَع' : 'متابع'}
                    </button>
                </div>
            `;
            
            // إضافة الفيديوهات
            let videosHTML = '';
            videos.forEach(video => {
                videosHTML += `
                    <div class="video-card ${tourActive && user.id === users[currentTourIndex].id ? 'tour-highlight' : ''}">
                        <div class="video-wrapper">
                            <video src="#" poster="https://via.placeholder.com/400x600/ff0050/ffffff?text=TikTok" 
                                   onclick="playVideo(this, '${user.username}')"></video>
                            <div class="video-overlay">
                                <div class="video-user-info">
                                    <img src="${user.avatar}" alt="${user.username}">
                                    <strong>${user.username}</strong>
                                </div>
                                <p style="margin: 10px 0;">${video.desc}</p>
                                <div style="display: flex; align-items: center; gap: 5px; margin: 10px 0;">
                                    <i class="fas fa-music"></i>
                                    <span>${video.music}</span>
                                </div>
                                <div class="video-stats">
                                    <button class="stat-btn" onclick="likeCount(this)">
                                        <i class="fas fa-heart"></i> ${video.likes}
                                    </button>
                                    <button class="stat-btn" onclick="openComments('${user.username}')">
                                        <i class="fas fa-comment"></i> ${video.comments}
                                    </button>
                                    <button class="stat-btn" onclick="shareToCloud('${user.username}')">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            feed.innerHTML = profileHTML + videosHTML;
        }

        // تحميل كل الفيديوهات
        function loadAllVideos() {
            const feed = document.getElementById('videosFeed');
            feed.innerHTML = '';
            
            users.forEach(user => {
                const videos = userVideos[user.id] || [];
                videos.forEach(video => {
                    feed.innerHTML += `
                        <div class="video-card">
                            <div class="video-wrapper">
                                <video src="#" poster="https://via.placeholder.com/400x600/ff0050/ffffff?text=TikTok" 
                                       onclick="playVideo(this, '${user.username}')"></video>
                                <div class="video-overlay">
                                    <div class="video-user-info">
                                        <img src="${user.avatar}" alt="${user.username}">
                                        <strong>${user.username}</strong>
                                    </div>
                                    <p style="margin: 10px 0;">${video.desc}</p>
                                    <div style="display: flex; align-items: center; gap: 5px; margin: 10px 0;">
                                        <i class="fas fa-music"></i>
                                        <span>${video.music}</span>
                                    </div>
                                    <div class="video-stats">
                                        <button class="stat-btn" onclick="likeCount(this)">
                                            <i class="fas fa-heart"></i> ${video.likes}
                                        </button>
                                        <button class="stat-btn" onclick="openComments('${user.username}')">
                                            <i class="fas fa-comment"></i> ${video.comments}
                                        </button>
                                        <button class="stat-btn" onclick="shareToCloud('${user.username}')">
                                            <i class="fas fa-cloud-upload-alt"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // عرض الملف الشخصي الحالي
        function showCurrentUserProfile() {
            showUserVideos(1); // عرض أول مستخدم
        }

        // متابعة/إلغاء متابعة
        function toggleFollow(btn, username) {
            if (currentFollowing.has(username)) {
                currentFollowing.delete(username);
                btn.textContent = 'متابع';
                btn.classList.remove('following');
            } else {
                currentFollowing.add(username);
                btn.textContent = 'متابَع';
                btn.classList.add('following');
            }
        }

        // تشغيل الفيديو
        function playVideo(videoElement, username) {
            const modal = document.getElementById('videoPlayer');
            const mainVideo = document.getElementById('mainVideo');
            
            mainVideo.src = 'https://www.w3schools.com/html/mov_bbb.mp4';
            modal.style.display = 'flex';
            mainVideo.play();
        }

        function closePlayer() {
            const modal = document.getElementById('videoPlayer');
            const mainVideo = document.getElementById('mainVideo');
            
            mainVideo.pause();
            modal.style.display = 'none';
        }

        // إعجاب
        function likeCount(btn) {
            const countSpan = btn.querySelector('span') || btn;
            let count = parseInt(countSpan.textContent.replace(/[^0-9]/g, ''));
            
            if (btn.classList.contains('liked')) {
                btn.classList.remove('liked');
                count--;
            } else {
                btn.classList.add('liked');
                count++;
            }
            
            if (count >= 1000) {
                countSpan.textContent = (count/1000).toFixed(1) + 'K';
            } else {
                countSpan.textContent = count;
            }
        }

        function likeVideo() {
            const likeSpan = document.getElementById('likeCount');
            let count = parseInt(likeSpan.textContent.replace(/[^0-9]/g, ''));
            count++;
            likeSpan.textContent = (count/1000).toFixed(1) + 'K';
        }

        // فتح التعليقات
        function openComments(username) {
            alert(`💬 فتح التعليقات لـ ${username}`);
        }

        // رفع فيديو
        function handleVideoUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const cloudFiles = document.getElementById('cloudFiles');
                
                const fileItem = document.createElement('div');
                fileItem.className = 'cloud-file-item';
                fileItem.innerHTML = `
                    <i class="fas fa-video"></i>
                    <div class="file-info">
                        <strong>${file.name}</strong>
                        <small>${(file.size / (1024*1024)).toFixed(2)} MB</small>
                    </div>
                    <i class="fas fa-check-circle" style="color: #00cc66;"></i>
                `;
                
                cloudFiles.appendChild(fileItem);
                updateStorage();
                
                alert(`✅ تم رفع ${file.name} إلى السحابة بنجاح!`);
            }
        }

        // تحديث مساحة التخزين
        function updateStorage() {
            const progress = document.getElementById('storageProgress');
            const storageText = document.getElementById('storageText');
            
            let currentWidth = parseInt(progress.style.width) || 45;
            currentWidth += 5;
            
            if (currentWidth <= 100) {
                progress.style.width = currentWidth + '%';
                storageText.textContent = `${(currentWidth * 0.1).toFixed(1)}GB من 10GB مستخدم`;
            }
        }

        // مشاركة على GitHub
        function shareToGitHub() {
            alert('✅ تم الحفظ في GitHub!');
        }

        function shareToCloud(username) {
            alert(`📤 جاري رفع الفيديو من ${username} إلى السحابة`);
            updateStorage();
        }

        // تفعيل العنصر النشط
        function setActive(element) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }

        // تهيئة الصفحة - تشغيل الجولة تلقائياً
        window.onload = function() {
            loadUsersCarousel();
            startUserTour(); // بدء الجولة تلقائياً
            
            // إضافة مستمع للسحب والإفلات
            const uploadArea = document.getElementById('uploadArea');
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#ffe5ec';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = '#f8f9fa';
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#f8f9fa';
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleVideoUpload({ files: files });
                }
            });
        };
    </script>
</body>
</html>
