<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lip Sync - حدد مكان الفم</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a1a2f, #1a3f4a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #00ffaa;
            font-size: 40px;
            text-shadow: 0 0 20px rgba(0,255,170,0.5);
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 3px solid #00ffaa;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,255,170,0.2);
        }

        /* منطقة الصورة */
        .image-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #00ffaa;
        }

        #uploadedImage {
            width: 100%;
            display: block;
        }

        /* قناع الفم المتحرك */
        .mouth-mask {
            position: absolute;
            width: 80px;
            height: 30px;
            background: rgba(255,107,107,0.7);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ffd700;
            cursor: move;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .mouth-animation {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #ff6b6b, #ff4757);
            transform-origin: top;
            transition: transform 0.05s;
        }

        /* أداة التحديد */
        .position-controls {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #00ffaa;
        }

        .slider-group {
            margin: 15px 0;
        }

        .slider-group label {
            display: block;
            margin-bottom: 5px;
            color: #00ffaa;
        }

        input[type=range] {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #00ffaa;
            border-radius: 50%;
            cursor: pointer;
        }

        .coord-value {
            display: inline-block;
            background: #00ffaa;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 10px;
            font-weight: bold;
        }

        /* منطقة النص */
        .text-area {
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #00ffaa;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            font-family: 'Cairo', sans-serif;
        }

        /* أزرار التحكم */
        .controls {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            min-width: 140px;
        }

        .btn-primary {
            background: #00ffaa;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px #00ffaa;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #00ffaa;
            color: #00ffaa;
        }

        .btn-secondary:hover {
            background: #00ffaa;
            color: black;
        }

        /* البصمة */
        .fingerprint {
            background: rgba(0,255,170,0.1);
            border: 2px solid #00ffaa;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            font-family: monospace;
            font-size: 24px;
            direction: ltr;
        }

        .copy-btn {
            background: none;
            border: 1px solid #00ffaa;
            color: #00ffaa;
            padding: 5px 15px;
            border-radius: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .status {
            text-align: center;
            margin: 15px 0;
            color: #00ffaa;
            font-size: 18px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .recording {
            animation: pulse 1s infinite;
            color: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-face-smile"></i>
                حدد مكان الفم ثم تحدث
            </h1>
        </div>

        <div class="card">
            <!-- الصورة مع الفم المتحرك -->
            <div class="image-container" id="imageContainer">
                <img id="uploadedImage" src="" alt="صورتك" style="display: none;">
                <div id="uploadPlaceholder" style="text-align: center; padding: 50px; background: rgba(0,255,170,0.1); border-radius: 20px;" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 80px; color: #00ffaa;"></i>
                    <p style="margin-top: 20px;">اضغط لرفع الصورة</p>
                </div>
                
                <!-- الفم المتحرك (قابل للتحريك) -->
                <div class="mouth-mask" id="mouthMask" style="display: none;">
                    <div class="mouth-animation" id="mouthAnimation"></div>
                </div>
            </div>

            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">

            <!-- أدوات تحديد مكان الفم -->
            <div class="position-controls" id="positionControls" style="display: none;">
                <h3 style="color: #00ffaa; margin-bottom: 15px;">
                    <i class="fas fa-arrows-alt"></i>
                    حدد مكان الفم
                </h3>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-left"></i>
                        الوضع الأفقي (X):
                        <span class="coord-value" id="xValue">50%</span>
                    </label>
                    <input type="range" id="xSlider" min="0" max="100" value="50" step="1" oninput="updateMouthPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-down"></i>
                        الوضع الرأسي (Y):
                        <span class="coord-value" id="yValue">50%</span>
                    </label>
                    <input type="range" id="ySlider" min="0" max="100" value="50" step="1" oninput="updateMouthPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-expand"></i>
                        حجم الفم:
                        <span class="coord-value" id="sizeValue">80px</span>
                    </label>
                    <input type="range" id="sizeSlider" min="40" max="150" value="80" step="5" oninput="updateMouthSize()">
                </div>
                
                <p style="color: #aaa; font-size: 14px; margin-top: 10px;">
                    <i class="fas fa-info-circle"></i>
                    حرك المؤشرات حتى يصبح الفم الأحمر على فم الصورة
                </p>
            </div>

            <!-- منطقة النص -->
            <div class="text-area">
                <textarea id="speechText" placeholder="اكتب هنا النص الذي تريد أن تنطقه الصورة..." maxlength="300">السلام عليكم</textarea>
            </div>

            <!-- أزرار التحكم -->
            <div class="controls">
                <button class="btn btn-primary" onclick="speakNow()" id="speakBtn">
                    <i class="fas fa-play"></i>
                    تحدث الآن
                </button>
                <button class="btn btn-secondary" onclick="sendToTelegram()" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال
                </button>
            </div>

            <!-- البصمة -->
            <div class="fingerprint">
                <i class="fas fa-fingerprint" style="color: #00ffaa;"></i>
                <span id="thumbprint">LIP_1002_260313_...</span>
                <button class="copy-btn" onclick="copyThumbprint()">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- حالة التشغيل -->
            <div class="status" id="status">
                <i class="fas fa-microphone"></i>
                1. ارفع صورة - 2. حدد مكان الفم - 3. تحدث
            </div>
        </div>
    </div>

    <script>
        // ========== إعدادات ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات ==========
        let selectedImage = null;
        let isSpeaking = false;
        let currentThumbprint = '';

        // ========== توليد بصمة ==========
        function generateThumbprint() {
            const date = new Date();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            currentThumbprint = `LIP_1002_${hours}${minutes}${seconds}`;
            document.getElementById('thumbprint').textContent = currentThumbprint;
        }
        setInterval(generateThumbprint, 1000);

        // ========== رفع الصورة ==========
        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                selectedImage = input.files[0];
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('uploadedImage');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                    
                    // إظهار الفم وأدوات التحكم
                    document.getElementById('mouthMask').style.display = 'block';
                    document.getElementById('positionControls').style.display = 'block';
                    
                    // وضع الفم في منتصف الصورة تقريباً
                    setTimeout(() => {
                        updateMouthPosition();
                    }, 100);
                    
                    document.getElementById('status').innerHTML = '<i class="fas fa-arrows-alt"></i> حرك المؤشرات لتحديد مكان الفم';
                };
                reader.readAsDataURL(selectedImage);
            }
        }

        // ========== تحديث مكان الفم ==========
        function updateMouthPosition() {
            const x = document.getElementById('xSlider').value;
            const y = document.getElementById('ySlider').value;
            
            document.getElementById('xValue').textContent = x + '%';
            document.getElementById('yValue').textContent = y + '%';
            
            const mouth = document.getElementById('mouthMask');
            mouth.style.left = x + '%';
            mouth.style.top = y + '%';
        }

        // ========== تحديث حجم الفم ==========
        function updateMouthSize() {
            const size = document.getElementById('sizeSlider').value;
            document.getElementById('sizeValue').textContent = size + 'px';
            
            const mouth = document.getElementById('mouthMask');
            mouth.style.width = size + 'px';
            mouth.style.height = (size * 0.4) + 'px';
            mouth.style.borderRadius = (size * 0.2) + 'px';
        }

        // ========== تحريك الشفاه مع الكلام ==========
        function speakNow() {
            const text = document.getElementById('speechText').value.trim();
            
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            if (!selectedImage) {
                alert('الرجاء رفع صورة أولاً');
                return;
            }

            // إيقاف أي كلام سابق
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            // بدء كلام جديد
            const utterance = new SpeechSynthesisUtterance(text);
            
            // اختيار صوت عربي
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(voice => voice.lang.includes('ar-'));
            if (arabicVoice) {
                utterance.voice = arabicVoice;
            }
            
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            utterance.pitch = 1;

            // بدء تحريك الشفاه
            utterance.onstart = () => {
                isSpeaking = true;
                document.getElementById('status').innerHTML = '<i class="fas fa-microphone-alt recording"></i> تتحدث...';
                document.getElementById('speakBtn').innerHTML = '<i class="fas fa-stop"></i> إيقاف';
            };

            // تحريك الشفاه أثناء الكلام
            utterance.onboundary = (event) => {
                if (event.name === 'word') {
                    // فتح الفم بشكل عشوائي
                    const openAmount = 0.3 + Math.random() * 0.5;
                    document.getElementById('mouthAnimation').style.transform = `scaleY(${openAmount})`;
                    
                    // إغلاق الفم بعد فترة قصيرة
                    setTimeout(() => {
                        document.getElementById('mouthAnimation').style.transform = 'scaleY(1)';
                    }, 100);
                }
            };

            // نهاية الكلام
            utterance.onend = () => {
                isSpeaking = false;
                document.getElementById('status').innerHTML = '<i class="fas fa-check"></i> انتهى الكلام';
                document.getElementById('speakBtn').innerHTML = '<i class="fas fa-play"></i> تحدث الآن';
                document.getElementById('mouthAnimation').style.transform = 'scaleY(1)';
                
                setTimeout(() => {
                    document.getElementById('status').innerHTML = '<i class="fas fa-microphone"></i> جاهز للتحدث';
                }, 2000);
            };

            window.speechSynthesis.speak(utterance);
        }

        // ========== إرسال إلى تيليجرام ==========
        async function sendToTelegram() {
            if (!selectedImage) {
                alert('الرجاء رفع صورة أولاً');
                return;
            }

            const text = document.getElementById('speechText').value.trim();
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            // تجهيز البيانات
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', selectedImage);
            
            const caption = `🖼️ **صورة ناطقة**\n\n💬 **النص:** ${text}\n🔍 **البصمة:** \`${currentThumbprint}\`\n📍 **مكان الفم:** X:${document.getElementById('xSlider').value}% Y:${document.getElementById('ySlider').value}%\n\n✅ تم الإنشاء بواسطة Lip Sync`;
            formData.append('caption', caption);

            try {
                document.getElementById('status').innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
                
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.ok) {
                    document.getElementById('status').innerHTML = '✅ تم الإرسال بنجاح';
                    alert('✅ تم إرسال الصورة للقناة');
                } else {
                    throw new Error(data.description);
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ خطأ في الإرسال';
                alert('❌ فشل الإرسال: ' + error.message);
            }
        }

        // ========== نسخ البصمة ==========
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint);
            alert('✅ تم نسخ البصمة');
        }
    </script>
</body>
</html>
