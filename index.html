<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lip Sync - شفاه شفافة متحركة</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ffd700;
            font-size: 40px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 3px solid #ffd700;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
        }

        /* منطقة الصورة */
        .image-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #ffd700;
            background: #1a2f3f;
        }

        #uploadedImage {
            width: 100%;
            display: block;
        }

        /* الشفاه الشفافة المتحركة */
        .lips-container {
            position: absolute;
            width: 100px;
            height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            filter: drop-shadow(0 0 5px rgba(255,215,0,0.5));
        }

        /* الشفة العلوية */
        .upper-lip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: rgba(255, 182, 193, 0.85); /* وردي شفاف */
            border-radius: 50% 50% 0 0;
            border: 2px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 -2px 10px rgba(255,215,0,0.3);
            transform-origin: center bottom;
            transition: transform 0.05s;
            backdrop-filter: blur(2px);
        }

        /* الشفة السفلية */
        .lower-lip {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: rgba(255, 160, 170, 0.85); /* وردي شفاف */
            border-radius: 0 0 50% 50%;
            border: 2px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 2px 10px rgba(255,215,0,0.3);
            transform-origin: center top;
            transition: transform 0.05s;
            backdrop-filter: blur(2px);
        }

        /* لمعة على الشفاه */
        .lip-shine {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(2px);
        }

        /* زوايا الفم */
        .mouth-corner {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 140, 140, 0.9);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
        }

        .mouth-corner.left {
            left: -4px;
        }

        .mouth-corner.right {
            right: -4px;
        }

        /* أداة التحديد */
        .position-controls {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ffd700;
        }

        .slider-group {
            margin: 15px 0;
        }

        .slider-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            color: #ffd700;
        }

        input[type=range] {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ffd700;
        }

        .coord-value {
            display: inline-block;
            background: #ffd700;
            color: black;
            padding: 2px 10px;
            border-radius: 15px;
            margin-right: 10px;
            font-weight: bold;
        }

        /* معاينة مكان الشفاه */
        .preview-note {
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,215,0,0.1);
            border-radius: 15px;
            color: #ffd700;
        }

        /* منطقة النص */
        .text-area {
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #ffd700;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            font-family: 'Cairo', sans-serif;
        }

        textarea:focus {
            outline: none;
            box-shadow: 0 0 20px #ffd700;
        }

        /* أزرار التحكم */
        .controls {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            min-width: 140px;
        }

        .btn-primary {
            background: #ffd700;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px #ffd700;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
        }

        .btn-secondary:hover {
            background: #ffd700;
            color: black;
        }

        /* البصمة */
        .fingerprint {
            background: rgba(255,215,0,0.1);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            font-family: monospace;
            font-size: 24px;
            direction: ltr;
        }

        .copy-btn {
            background: none;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #ffd700;
            color: black;
        }

        .status {
            text-align: center;
            margin: 15px 0;
            color: #ffd700;
            font-size: 18px;
        }

        @keyframes subtlePulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .speaking .lips-container {
            animation: subtlePulse 0.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-lips"></i>
                شفاه شفافة متحركة
            </h1>
        </div>

        <div class="card">
            <!-- الصورة مع الشفاه -->
            <div class="image-container" id="imageContainer">
                <img id="uploadedImage" src="" alt="صورتك" style="display: none;">
                <div id="uploadPlaceholder" style="text-align: center; padding: 50px; background: rgba(255,215,0,0.1); border-radius: 20px; cursor: pointer;" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 80px; color: #ffd700;"></i>
                    <p style="margin-top: 20px;">اضغط لرفع الصورة</p>
                </div>
                
                <!-- الشفاه الشفافة المتحركة -->
                <div class="lips-container" id="lipsContainer" style="display: none;">
                    <div class="upper-lip" id="upperLip">
                        <div class="lip-shine"></div>
                    </div>
                    <div class="lower-lip" id="lowerLip">
                        <div class="lip-shine"></div>
                    </div>
                    <div class="mouth-corner left"></div>
                    <div class="mouth-corner right"></div>
                </div>
            </div>

            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">

            <!-- أدوات تحديد مكان الشفاه -->
            <div class="position-controls" id="positionControls" style="display: none;">
                <h3 style="color: #ffd700; margin-bottom: 15px;">
                    <i class="fas fa-arrows-alt"></i>
                    حدد مكان الشفاه بدقة
                </h3>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-left"></i>
                        الوضع الأفقي (X):
                        <span class="coord-value" id="xValue">31%</span>
                    </label>
                    <input type="range" id="xSlider" min="0" max="100" value="31" step="1" oninput="updateLipsPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-down"></i>
                        الوضع الرأسي (Y):
                        <span class="coord-value" id="yValue">55%</span>
                    </label>
                    <input type="range" id="ySlider" min="0" max="100" value="55" step="1" oninput="updateLipsPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-expand"></i>
                        حجم الشفاه:
                        <span class="coord-value" id="sizeValue">45px</span>
                    </label>
                    <input type="range" id="sizeSlider" min="30" max="120" value="45" step="1" oninput="updateLipsSize()">
                </div>
                
                <div class="preview-note">
                    <i class="fas fa-info-circle"></i>
                    حرك المؤشرات حتى تصبح الشفاه الذهبية على فم الصورة
                </div>
            </div>

            <!-- منطقة النص -->
            <div class="text-area">
                <textarea id="speechText" placeholder="اكتب هنا النص الذي تريد أن تنطقه الصورة..." maxlength="300">السلام عليكم</textarea>
            </div>

            <!-- أزرار التحكم -->
            <div class="controls">
                <button class="btn btn-primary" onclick="speakNow()" id="speakBtn">
                    <i class="fas fa-play"></i>
                    تحدث الآن
                </button>
                <button class="btn btn-secondary" onclick="sendToTelegram()" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال
                </button>
            </div>

            <!-- البصمة -->
            <div class="fingerprint">
                <i class="fas fa-fingerprint" style="color: #ffd700;"></i>
                <span id="thumbprint">LIP_1002_...</span>
                <button class="copy-btn" onclick="copyThumbprint()">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- حالة التشغيل -->
            <div class="status" id="status">
                <i class="fas fa-lips"></i>
                الشفاه الذهبية تنتظر...
            </div>
        </div>
    </div>

    <script>
        // ========== إعدادات ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات ==========
        let selectedImage = null;
        let isSpeaking = false;
        let currentThumbprint = '';
        let speechUtterance = null;

        // ========== توليد بصمة ==========
        function generateThumbprint() {
            const date = new Date();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            currentThumbprint = `LIP_1002_${hours}${minutes}${seconds}`;
            document.getElementById('thumbprint').textContent = currentThumbprint;
        }
        setInterval(generateThumbprint, 1000);

        // ========== رفع الصورة ==========
        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                selectedImage = input.files[0];
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('uploadedImage');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                    
                    // إظهار الشفاه وأدوات التحكم
                    document.getElementById('lipsContainer').style.display = 'block';
                    document.getElementById('positionControls').style.display = 'block';
                    
                    // ضبط القيم الافتراضية من الصورة السابقة
                    document.getElementById('xSlider').value = 31;
                    document.getElementById('ySlider').value = 55;
                    document.getElementById('sizeSlider').value = 45;
                    
                    updateLipsPosition();
                    updateLipsSize();
                    
                    document.getElementById('status').innerHTML = '<i class="fas fa-arrows-alt"></i> حرك المؤشرات لتحديد مكان الشفاه';
                };
                reader.readAsDataURL(selectedImage);
            }
        }

        // ========== تحديث مكان الشفاه ==========
        function updateLipsPosition() {
            const x = document.getElementById('xSlider').value;
            const y = document.getElementById('ySlider').value;
            
            document.getElementById('xValue').textContent = x + '%';
            document.getElementById('yValue').textContent = y + '%';
            
            const lips = document.getElementById('lipsContainer');
            lips.style.left = x + '%';
            lips.style.top = y + '%';
        }

        // ========== تحديث حجم الشفاه ==========
        function updateLipsSize() {
            const size = document.getElementById('sizeSlider').value;
            document.getElementById('sizeValue').textContent = size + 'px';
            
            const lips = document.getElementById('lipsContainer');
            lips.style.width = size + 'px';
            lips.style.height = (size * 0.5) + 'px';
        }

        // ========== تحريك الشفاه بشكل طبيعي ==========
        function animateLips(natural) {
            const upperLip = document.getElementById('upperLip');
            const lowerLip = document.getElementById('lowerLip');
            
            if (natural) {
                // حركة طبيعية للشفاه أثناء الكلام
                const openAmount = 0.3 + Math.random() * 0.4;
                
                // الشفة العلوية تتحرك للأعلى قليلاً
                upperLip.style.transform = `scaleY(${1 - openAmount * 0.3}) translateY(${-openAmount * 5}px)`;
                upperLip.style.background = 'rgba(255, 140, 150, 0.9)';
                
                // الشفة السفلية تتحرك للأسفل أكثر
                lowerLip.style.transform = `scaleY(${1 + openAmount}) translateY(${openAmount * 8}px)`;
                lowerLip.style.background = 'rgba(255, 120, 130, 0.9)';
                
                // زيادة اللمعة
                document.querySelectorAll('.lip-shine').forEach(shine => {
                    shine.style.background = 'rgba(255, 255, 255, 0.5)';
                });
            } else {
                // وضع السكون (شفاه مقفلة)
                upperLip.style.transform = 'scaleY(1) translateY(0)';
                lowerLip.style.transform = 'scaleY(1) translateY(0)';
                upperLip.style.background = 'rgba(255, 182, 193, 0.85)';
                lowerLip.style.background = 'rgba(255, 160, 170, 0.85)';
                
                document.querySelectorAll('.lip-shine').forEach(shine => {
                    shine.style.background = 'rgba(255, 255, 255, 0.3)';
                });
            }
        }

        // ========== التحدث مع تحريك الشفاه ==========
        function speakNow() {
            const text = document.getElementById('speechText').value.trim();
            
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            if (!selectedImage) {
                alert('الرجاء رفع صورة أولاً');
                return;
            }

            // إيقاف أي كلام سابق
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            // بدء كلام جديد
            speechUtterance = new SpeechSynthesisUtterance(text);
            
            // اختيار أفضل صوت عربي
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(voice => voice.lang.includes('ar') || voice.name.includes('Arabic'));
            if (arabicVoice) {
                speechUtterance.voice = arabicVoice;
            }
            
            speechUtterance.lang = 'ar-SA';
            speechUtterance.rate = 0.9;
            speechUtterance.pitch = 1.1;

            // بدء تحريك الشفاه
            speechUtterance.onstart = () => {
                isSpeaking = true;
                document.getElementById('status').innerHTML = '<i class="fas fa-lips fa-beat" style="color: #ffd700;"></i> الشفاه تتحدث...';
                document.getElementById('speakBtn').innerHTML = '<i class="fas fa-stop"></i> إيقاف';
            };

            // تحريك الشفاه مع كل مقطع من الكلام
            speechUtterance.onboundary = (event) => {
                if (event.name === 'word' || event.name === 'sentence') {
                    // محاكاة طبيعية للكلام
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            if (isSpeaking) {
                                animateLips(true);
                                
                                setTimeout(() => {
                                    if (isSpeaking) {
                                        animateLips(false);
                                    }
                                }, 100);
                            }
                        }, i * 50);
                    }
                }
            };

            // نهاية الكلام
            speechUtterance.onend = () => {
                isSpeaking = false;
                animateLips(false);
                document.getElementById('status').innerHTML = '<i class="fas fa-check-circle"></i> انتهى الكلام';
                document.getElementById('speakBtn').innerHTML = '<i class="fas fa-play"></i> تحدث الآن';
                
                setTimeout(() => {
                    document.getElementById('status').innerHTML = '<i class="fas fa-lips"></i> الشفاه الذهبية تنتظر...';
                }, 2000);
            };

            window.speechSynthesis.speak(speechUtterance);
        }

        // ========== إرسال إلى تيليجرام ==========
        async function sendToTelegram() {
            if (!selectedImage) {
                alert('الرجاء رفع صورة أولاً');
                return;
            }

            const text = document.getElementById('speechText').value.trim();
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            // إيقاف أي كلام جاري
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                animateLips(false);
            }

            // تجهيز البيانات
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', selectedImage);
            
            const caption = `🖼️ **صورة ناطقة**\n\n💬 **النص:** ${text}\n🔍 **البصمة:** \`${currentThumbprint}\`\n📍 **مكان الشفاه:** (${document.getElementById('xSlider').value}%, ${document.getElementById('ySlider').value}%)\n\n✅ تم الإنشاء - شفاه ذهبية متحركة ✨`;
            formData.append('caption', caption);

            try {
                document.getElementById('status').innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
                
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.ok) {
                    document.getElementById('status').innerHTML = '✅ تم الإرسال إلى القناة';
                    alert('✅ تم إرسال الصورة الناطقة');
                } else {
                    throw new Error(data.description);
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ خطأ في الإرسال';
                alert('❌ فشل الإرسال: ' + error.message);
            }
        }

        // ========== نسخ البصمة ==========
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint);
            alert('✅ تم نسخ البصمة');
        }

        // ========== تحميل الأصوات ==========
        window.speechSynthesis.onvoiceschanged = function() {
            console.log('الأصوات العربية متاحة');
        };
    </script>
</body>
</html>
