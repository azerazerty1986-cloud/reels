<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lip Sync - شفاه متحركة حقيقية</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ffd700;
            font-size: 40px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 3px solid #ffd700;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
        }

        /* منطقة الصورة */
        .image-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #ffd700;
            background: #1a2f3f;
        }

        #uploadedImage {
            width: 100%;
            display: block;
        }

        /* الشفاه المتحركة - طبقة منفصلة فوق الصورة */
        .lips-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* الشفاه - قابلة للتحريك والتغيير */
        .lips {
            position: absolute;
            width: 100px;
            height: 50px;
            transform: translate(-50%, -50%);
            transition: all 0.05s ease;
            filter: drop-shadow(0 0 8px rgba(255,215,0,0.6));
            z-index: 30;
        }

        /* مسار الشفاه (SVG) للحركة الطبيعية */
        .lip-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        /* الشفاه في وضع السكون */
        .lip-path-closed {
            fill: rgba(255, 140, 150, 0.85);
            stroke: rgba(255, 215, 0, 0.8);
            stroke-width: 2;
            transition: d 0.05s ease;
        }

        /* الشفاه في وضع الفتح */
        .lip-path-open {
            fill: rgba(255, 100, 120, 0.9);
            stroke: rgba(255, 215, 0, 0.9);
            stroke-width: 2;
        }

        /* أداة التحديد */
        .position-controls {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ffd700;
        }

        .slider-group {
            margin: 15px 0;
        }

        .slider-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            color: #ffd700;
        }

        input[type=range] {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ffd700;
        }

        .coord-value {
            display: inline-block;
            background: #ffd700;
            color: black;
            padding: 2px 10px;
            border-radius: 15px;
            margin-right: 10px;
            font-weight: bold;
        }

        /* منطقة النص */
        .text-area {
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #ffd700;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            font-family: 'Cairo', sans-serif;
        }

        /* أزرار التحكم */
        .controls {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            min-width: 140px;
        }

        .btn-primary {
            background: #ffd700;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px #ffd700;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
        }

        .btn-secondary:hover {
            background: #ffd700;
            color: black;
        }

        /* البصمة */
        .fingerprint {
            background: rgba(255,215,0,0.1);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            font-family: monospace;
            font-size: 24px;
            direction: ltr;
        }

        .copy-btn {
            background: none;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .status {
            text-align: center;
            margin: 15px 0;
            color: #ffd700;
            font-size: 18px;
        }

        @keyframes speakAnimation {
            0% { transform: translate(-50%, -50%) scaleY(0.8); }
            25% { transform: translate(-50%, -50%) scaleY(1.2); }
            50% { transform: translate(-50%, -50%) scaleY(0.9); }
            75% { transform: translate(-50%, -50%) scaleY(1.1); }
            100% { transform: translate(-50%, -50%) scaleY(0.8); }
        }

        .speaking .lips {
            animation: speakAnimation 0.2s infinite;
        }

        .highlight {
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-lips"></i>
                شفاه متحركة - تضبط بالماوس
            </h1>
        </div>

        <div class="card">
            <!-- الصورة مع طبقة الشفاه -->
            <div class="image-container" id="imageContainer">
                <img id="uploadedImage" src="" alt="صورتك" style="display: none;">
                <div id="uploadPlaceholder" style="text-align: center; padding: 50px; background: rgba(255,215,0,0.1); border-radius: 20px; cursor: pointer;" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 80px; color: #ffd700;"></i>
                    <p style="margin-top: 20px;">اضغط لرفع الصورة</p>
                </div>
                
                <!-- طبقة الشفاه فوق الصورة -->
                <div class="lips-overlay" id="lipsOverlay">
                    <div class="lips" id="lips">
                        <!-- SVG للشفاه -->
                        <svg class="lip-svg" viewBox="0 0 100 50">
                            <!-- الشفة العلوية -->
                            <path id="upperLip" d="M 10,25 Q 30,15 50,15 Q 70,15 90,25" fill="rgba(255,140,150,0.9)" stroke="#ffd700" stroke-width="2"/>
                            <!-- الشفة السفلية -->
                            <path id="lowerLip" d="M 10,25 Q 30,40 50,40 Q 70,40 90,25" fill="rgba(255,120,130,0.9)" stroke="#ffd700" stroke-width="2"/>
                            <!-- لمعة -->
                            <circle cx="40" cy="20" r="5" fill="rgba(255,255,255,0.3)"/>
                            <circle cx="60" cy="20" r="5" fill="rgba(255,255,255,0.3)"/>
                        </svg>
                    </div>
                </div>
            </div>

            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">

            <!-- أدوات تحديد مكان الشفاه -->
            <div class="position-controls" id="positionControls" style="display: none;">
                <h3 style="color: #ffd700; margin-bottom: 15px;">
                    <i class="fas fa-arrows-alt"></i>
                    حدد مكان الشفاه بدقة
                </h3>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-left"></i>
                        الوضع الأفقي (X):
                        <span class="coord-value" id="xValue">31%</span>
                    </label>
                    <input type="range" id="xSlider" min="0" max="100" value="31" step="1" oninput="updateLipsPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-down"></i>
                        الوضع الرأسي (Y):
                        <span class="coord-value" id="yValue">55%</span>
                    </label>
                    <input type="range" id="ySlider" min="0" max="100" value="55" step="1" oninput="updateLipsPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-expand"></i>
                        حجم الشفاه:
                        <span class="coord-value" id="sizeValue">45px</span>
                    </label>
                    <input type="range" id="sizeSlider" min="30" max="120" value="45" step="1" oninput="updateLipsSize()">
                </div>
            </div>

            <!-- منطقة النص -->
            <div class="text-area">
                <textarea id="speechText" placeholder="اكتب هنا النص الذي تريد أن تنطقه الصورة..." maxlength="300">السلام عليكم</textarea>
            </div>

            <!-- أزرار التحكم -->
            <div class="controls">
                <button class="btn btn-primary" onclick="toggleSpeech()" id="speakBtn">
                    <i class="fas fa-play"></i>
                    تحدث الآن
                </button>
                <button class="btn btn-secondary" onclick="sendToTelegram()" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال
                </button>
            </div>

            <!-- البصمة -->
            <div class="fingerprint">
                <i class="fas fa-fingerprint" style="color: #ffd700;"></i>
                <span id="thumbprint">LIP_1002_...</span>
                <button class="copy-btn" onclick="copyThumbprint()">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- حالة التشغيل -->
            <div class="status" id="status">
                <i class="fas fa-lips"></i>
                حرك الشفاه على فم الصورة ثم اضغط تحدث
            </div>
        </div>
    </div>

    <script>
        // ========== إعدادات ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات ==========
        let selectedImage = null;
        let isSpeaking = false;
        let currentThumbprint = '';
        let speechInterval = null;
        let currentUtterance = null;

        // ========== توليد بصمة ==========
        function generateThumbprint() {
            const date = new Date();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            currentThumbprint = `LIP_1002_${hours}${minutes}${seconds}`;
            document.getElementById('thumbprint').textContent = currentThumbprint;
        }
        setInterval(generateThumbprint, 1000);

        // ========== رفع الصورة ==========
        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                selectedImage = input.files[0];
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('uploadedImage');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                    
                    // إظهار الشفاه وأدوات التحكم
                    document.getElementById('lipsOverlay').style.display = 'block';
                    document.getElementById('positionControls').style.display = 'block';
                    
                    // ضبط القيم الافتراضية من الصورة السابقة
                    document.getElementById('xSlider').value = 31;
                    document.getElementById('ySlider').value = 55;
                    document.getElementById('sizeSlider').value = 45;
                    
                    updateLipsPosition();
                    updateLipsSize();
                };
                reader.readAsDataURL(selectedImage);
            }
        }

        // ========== تحديث مكان الشفاه ==========
        function updateLipsPosition() {
            const x = document.getElementById('xSlider').value;
            const y = document.getElementById('ySlider').value;
            
            document.getElementById('xValue').textContent = x + '%';
            document.getElementById('yValue').textContent = y + '%';
            
            const lips = document.getElementById('lips');
            lips.style.left = x + '%';
            lips.style.top = y + '%';
        }

        // ========== تحديث حجم الشفاه ==========
        function updateLipsSize() {
            const size = document.getElementById('sizeSlider').value;
            document.getElementById('sizeValue').textContent = size + 'px';
            
            const lips = document.getElementById('lips');
            lips.style.width = size + 'px';
            lips.style.height = (size * 0.5) + 'px';
        }

        // ========== تحريك الشفاه بشكل مباشر ==========
        function animateLipsDirectly(isOpen) {
            const upperLip = document.getElementById('upperLip');
            const lowerLip = document.getElementById('lowerLip');
            
            if (isOpen) {
                // فتح الشفاه - تعديل مسار SVG
                upperLip.setAttribute('d', "M 10,20 Q 30,10 50,10 Q 70,10 90,20");
                lowerLip.setAttribute('d', "M 10,30 Q 30,45 50,45 Q 70,45 90,30");
                
                // تغيير اللون لجعله أكثر وضوحاً
                upperLip.setAttribute('fill', 'rgba(255,100,120,0.95)');
                lowerLip.setAttribute('fill', 'rgba(255,80,100,0.95)');
            } else {
                // إغلاق الشفاه
                upperLip.setAttribute('d', "M 10,25 Q 30,15 50,15 Q 70,15 90,25");
                lowerLip.setAttribute('d', "M 10,25 Q 30,40 50,40 Q 70,40 90,25");
                
                // العودة للون الطبيعي
                upperLip.setAttribute('fill', 'rgba(255,140,150,0.9)');
                lowerLip.setAttribute('fill', 'rgba(255,120,130,0.9)');
            }
        }

        // ========== بدء الكلام مع تحريك الشفاه ==========
        function toggleSpeech() {
            const text = document.getElementById('speechText').value.trim();
            
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            if (!selectedImage) {
                alert('الرجاء رفع صورة أولاً');
                return;
            }

            if (isSpeaking) {
                // إيقاف الكلام
                stopSpeaking();
            } else {
                // بدء الكلام
                startSpeaking(text);
            }
        }

        function startSpeaking(text) {
            // إيقاف أي كلام سابق
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            if (speechInterval) {
                clearInterval(speechInterval);
            }

            // بدء كلام جديد
            currentUtterance = new SpeechSynthesisUtterance(text);
            
            // اختيار صوت عربي
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(voice => voice.lang.includes('ar-'));
            if (arabicVoice) {
                currentUtterance.voice = arabicVoice;
            }
            
            currentUtterance.lang = 'ar-SA';
            currentUtterance.rate = 0.9;
            
            // بدء تحريك الشفاه
            currentUtterance.onstart = () => {
                isSpeaking = true;
                document.getElementById('status').innerHTML = '<i class="fas fa-lips fa-beat"></i> تتحدث...';
                document.getElementById('speakBtn').innerHTML = '<i class="fas fa-stop"></i> إيقاف';
                
                // بدء حركة الشفاه المستمرة
                let mouthState = false;
                speechInterval = setInterval(() => {
                    if (isSpeaking) {
                        // تبديل حالة الشفاه كل 100 مللي
                        mouthState = !mouthState;
                        animateLipsDirectly(mouthState);
                    }
                }, 120); // سرعة حركة الشفاه
            };
            
            // نهاية الكلام
            currentUtterance.onend = () => {
                stopSpeaking();
            };
            
            window.speechSynthesis.speak(currentUtterance);
        }

        function stopSpeaking() {
            isSpeaking = false;
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            
            if (speechInterval) {
                clearInterval(speechInterval);
                speechInterval = null;
            }
            
            // إغلاق الشفاه
            animateLipsDirectly(false);
            
            document.getElementById('status').innerHTML = '<i class="fas fa-check-circle"></i> توقف الكلام';
            document.getElementById('speakBtn').innerHTML = '<i class="fas fa-play"></i> تحدث الآن';
            
            setTimeout(() => {
                document.getElementById('status').innerHTML = '<i class="fas fa-lips"></i> حرك الشفاه على فم الصورة';
            }, 2000);
        }

        // ========== إرسال إلى تيليجرام ==========
        async function sendToTelegram() {
            if (!selectedImage) {
                alert('الرجاء رفع صورة أولاً');
                return;
            }

            const text = document.getElementById('speechText').value.trim();
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            // إيقاف أي كلام جاري
            stopSpeaking();

            // تجهيز البيانات
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', selectedImage);
            
            const caption = `🖼️ **صورة ناطقة**\n\n💬 **النص:** ${text}\n🔍 **البصمة:** \`${currentThumbprint}\`\n📍 **مكان الشفاه:** X:${document.getElementById('xSlider').value}% Y:${document.getElementById('ySlider').value}%\n\n✅ شفاه متحركة ✨`;
            formData.append('caption', caption);

            try {
                document.getElementById('status').innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
                
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.ok) {
                    document.getElementById('status').innerHTML = '✅ تم الإرسال إلى القناة';
                    alert('✅ تم إرسال الصورة');
                } else {
                    throw new Error(data.description);
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ خطأ في الإرسال';
                alert('❌ فشل الإرسال: ' + error.message);
            }
        }

        // ========== نسخ البصمة ==========
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint);
            alert('✅ تم نسخ البصمة');
        }
    </script>
</body>
</html>
