<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lip Sync - شفاه شفافة متحركة</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ffd700;
            font-size: 40px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 3px solid #ffd700;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
        }

        /* منطقة الصورة */
        .image-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #ffd700;
            background: #1a2f3f;
        }

        #uploadedImage {
            width: 100%;
            display: block;
        }

        /* طبقة الشفاه الشفافة */
        .lips-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* الشفاه - بتأثير شفاف وواقعي */
        .lips {
            position: absolute;
            width: 100px;
            height: 50px;
            transform: translate(-50%, -50%);
            transition: all 0.05s ease;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            z-index: 30;
            opacity: 0.9;
        }

        /* تدرج لوني طبيعي للشفاه */
        .lip-gradient {
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 50%, 
                rgba(255, 182, 193, 0.85) 0%, 
                rgba(255, 105, 120, 0.9) 70%,
                rgba(200, 80, 90, 0.8) 100%);
            border-radius: 45% 45% 40% 40%;
            border: 2px solid rgba(255, 215, 0, 0.5);
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2),
                        inset 0 5px 15px rgba(255,255,255,0.3);
            backdrop-filter: blur(1px);
            position: relative;
            overflow: hidden;
        }

        /* لمعة على الشفاه */
        .lip-shine {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 40%;
            height: 25%;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 80%);
            border-radius: 50%;
            filter: blur(3px);
            pointer-events: none;
        }

        /* ظل تحت الشفاه */
        .lip-shadow {
            position: absolute;
            bottom: -5px;
            left: 5%;
            width: 90%;
            height: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            filter: blur(5px);
            z-index: -1;
        }

        /* خط الفم (للإيهام بالتفاصيل) */
        .lip-line {
            position: absolute;
            top: 45%;
            left: 10%;
            width: 80%;
            height: 2px;
            background: rgba(180, 60, 70, 0.6);
            border-radius: 50%;
            filter: blur(1px);
            transform: translateY(-50%);
        }

        /* تأثير حركة الشفاه */
        @keyframes realisticLipMove {
            0% { transform: translate(-50%, -50%) scaleY(0.9) scaleX(1); }
            25% { transform: translate(-50%, -50%) scaleY(1.2) scaleX(1.05); }
            50% { transform: translate(-50%, -50%) scaleY(1.1) scaleX(1.02); }
            75% { transform: translate(-50%, -50%) scaleY(1.3) scaleX(1.08); }
            100% { transform: translate(-50%, -50%) scaleY(0.9) scaleX(1); }
        }

        .speaking .lips {
            animation: realisticLipMove 0.15s infinite;
        }

        /* أدوات التحديد */
        .position-controls {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ffd700;
        }

        .slider-group {
            margin: 15px 0;
        }

        .slider-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            color: #ffd700;
        }

        input[type=range] {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ffd700;
        }

        .coord-value {
            display: inline-block;
            background: #ffd700;
            color: black;
            padding: 2px 10px;
            border-radius: 15px;
            margin-right: 10px;
            font-weight: bold;
        }

        .text-area {
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #ffd700;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            font-family: 'Cairo', sans-serif;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            min-width: 140px;
        }

        .btn-primary {
            background: #ffd700;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px #ffd700;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
        }

        .btn-secondary:hover {
            background: #ffd700;
            color: black;
        }

        .fingerprint {
            background: rgba(255,215,0,0.1);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            font-family: monospace;
            font-size: 24px;
            direction: ltr;
        }

        .copy-btn {
            background: none;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #ffd700;
            color: black;
        }

        .status {
            text-align: center;
            margin: 15px 0;
            color: #ffd700;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-lips"></i>
                شفاه شفافة واقعية
            </h1>
        </div>

        <div class="card">
            <!-- الصورة مع الشفاه -->
            <div class="image-container" id="imageContainer">
                <img id="uploadedImage" src="" alt="صورتك" style="display: none;">
                <div id="uploadPlaceholder" style="text-align: center; padding: 50px; background: rgba(255,215,0,0.1); border-radius: 20px; cursor: pointer;" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 80px; color: #ffd700;"></i>
                    <p style="margin-top: 20px;">اضغط لرفع الصورة</p>
                </div>
                
                <!-- طبقة الشفاه -->
                <div class="lips-layer" id="lipsLayer">
                    <div class="lips" id="lips">
                        <div class="lip-gradient">
                            <div class="lip-shine"></div>
                            <div class="lip-line"></div>
                        </div>
                        <div class="lip-shadow"></div>
                    </div>
                </div>
            </div>

            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">

            <!-- أدوات تحديد مكان الشفاه -->
            <div class="position-controls" id="positionControls" style="display: none;">
                <h3 style="color: #ffd700; margin-bottom: 15px;">
                    <i class="fas fa-arrows-alt"></i>
                    حدد مكان الشفاه
                </h3>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-left"></i>
                        الوضع الأفقي (X):
                        <span class="coord-value" id="xValue">31%</span>
                    </label>
                    <input type="range" id="xSlider" min="0" max="100" value="31" step="1" oninput="updateLipsPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-down"></i>
                        الوضع الرأسي (Y):
                        <span class="coord-value" id="yValue">55%</span>
                    </label>
                    <input type="range" id="ySlider" min="0" max="100" value="55" step="1" oninput="updateLipsPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-expand"></i>
                        حجم الشفاه:
                        <span class="coord-value" id="sizeValue">45px</span>
                    </label>
                    <input type="range" id="sizeSlider" min="30" max="120" value="45" step="1" oninput="updateLipsSize()">
                </div>
            </div>

            <!-- منطقة النص -->
            <div class="text-area">
                <textarea id="speechText" placeholder="اكتب النص الذي تريد أن تنطقه الصورة..." maxlength="300">السلام عليكم</textarea>
            </div>

            <!-- أزرار التحكم -->
            <div class="controls">
                <button class="btn btn-primary" onclick="toggleSpeech()" id="speakBtn">
                    <i class="fas fa-play"></i>
                    تحدث الآن
                </button>
                <button class="btn btn-secondary" onclick="sendToTelegram()" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال
                </button>
            </div>

            <!-- البصمة -->
            <div class="fingerprint">
                <i class="fas fa-fingerprint" style="color: #ffd700;"></i>
                <span id="thumbprint">LIP_1002_...</span>
                <button class="copy-btn" onclick="copyThumbprint()">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- حالة التشغيل -->
            <div class="status" id="status">
                <i class="fas fa-lips"></i>
                الشفاه تنتظر...
            </div>
        </div>
    </div>

    <script>
        // ========== إعدادات ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات ==========
        let selectedImage = null;
        let isSpeaking = false;
        let currentThumbprint = '';
        let speechInterval = null;

        // ========== توليد بصمة ==========
        function generateThumbprint() {
            const date = new Date();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            currentThumbprint = `LIP_1002_${hours}${minutes}${seconds}`;
            document.getElementById('thumbprint').textContent = currentThumbprint;
        }
        setInterval(generateThumbprint, 1000);

        // ========== رفع الصورة ==========
        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                selectedImage = input.files[0];
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('uploadedImage');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                    document.getElementById('lipsLayer').style.display = 'block';
                    document.getElementById('positionControls').style.display = 'block';
                    
                    // ضبط القيم
                    document.getElementById('xSlider').value = 31;
                    document.getElementById('ySlider').value = 55;
                    document.getElementById('sizeSlider').value = 45;
                    
                    updateLipsPosition();
                    updateLipsSize();
                };
                reader.readAsDataURL(selectedImage);
            }
        }

        // ========== تحديث مكان الشفاه ==========
        function updateLipsPosition() {
            const x = document.getElementById('xSlider').value;
            const y = document.getElementById('ySlider').value;
            
            document.getElementById('xValue').textContent = x + '%';
            document.getElementById('yValue').textContent = y + '%';
            
            const lips = document.getElementById('lips');
            lips.style.left = x + '%';
            lips.style.top = y + '%';
        }

        // ========== تحديث حجم الشفاه ==========
        function updateLipsSize() {
            const size = document.getElementById('sizeSlider').value;
            document.getElementById('sizeValue').textContent = size + 'px';
            
            const lips = document.getElementById('lips');
            lips.style.width = size + 'px';
            lips.style.height = (size * 0.5) + 'px';
        }

        // ========== تحريك الشفاه بشكل واقعي ==========
        function animateLipsRealistic(intensity) {
            const lips = document.getElementById('lips');
            const gradient = lips.querySelector('.lip-gradient');
            
            if (intensity > 0.5) {
                // فتح الشفاه
                lips.style.transform = `translate(-50%, -50%) scaleY(${1.3 + intensity * 0.2})`;
                gradient.style.background = `radial-gradient(ellipse at 50% 50%, 
                    rgba(255, 140, 160, 0.9) 0%, 
                    rgba(255, 80, 100, 0.95) 70%,
                    rgba(200, 50, 70, 0.9) 100%)`;
            } else {
                // إغلاق الشفاه
                lips.style.transform = `translate(-50%, -50%) scaleY(1)`;
                gradient.style.background = `radial-gradient(ellipse at 50% 50%, 
                    rgba(255, 182, 193, 0.85) 0%, 
                    rgba(255, 105, 120, 0.9) 70%,
                    rgba(200, 80, 90, 0.8) 100%)`;
            }
        }

        // ========== بدء/إيقاف الكلام ==========
        function toggleSpeech() {
            const text = document.getElementById('speechText').value.trim();
            
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            if (!selectedImage) {
                alert('الرجاء رفع صورة أولاً');
                return;
            }

            if (isSpeaking) {
                stopSpeaking();
            } else {
                startSpeaking(text);
            }
        }

        function startSpeaking(text) {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            if (speechInterval) {
                clearInterval(speechInterval);
            }

            const utterance = new SpeechSynthesisUtterance(text);
            
            // اختيار صوت عربي
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(voice => voice.lang.includes('ar-'));
            if (arabicVoice) {
                utterance.voice = arabicVoice;
            }
            
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            
            utterance.onstart = () => {
                isSpeaking = true;
                document.getElementById('status').innerHTML = '<i class="fas fa-lips fa-beat"></i> الشفاه تتكلم...';
                document.getElementById('speakBtn').innerHTML = '<i class="fas fa-stop"></i> إيقاف';
                
                // حركة الشفاه المستمرة أثناء الكلام
                let intensity = 0;
                speechInterval = setInterval(() => {
                    if (isSpeaking) {
                        // محاكاة طبيعية (تزداد وتقل شدة الفتح)
                        intensity = 0.5 + Math.random() * 0.8;
                        animateLipsRealistic(intensity);
                        
                        // إغلاق جزئي بين الكلمات
                        setTimeout(() => {
                            if (isSpeaking) {
                                animateLipsRealistic(0.3);
                            }
                        }, 60);
                    }
                }, 120);
            };
            
            utterance.onend = () => {
                stopSpeaking();
            };
            
            window.speechSynthesis.speak(utterance);
        }

        function stopSpeaking() {
            isSpeaking = false;
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            
            if (speechInterval) {
                clearInterval(speechInterval);
                speechInterval = null;
            }
            
            // إغلاق الشفاه
            animateLipsRealistic(0);
            
            document.getElementById('status').innerHTML = '<i class="fas fa-check-circle"></i> انتهى الكلام';
            document.getElementById('speakBtn').innerHTML = '<i class="fas fa-play"></i> تحدث الآن';
            
            setTimeout(() => {
                document.getElementById('status').innerHTML = '<i class="fas fa-lips"></i> الشفاه تنتظر...';
            }, 2000);
        }

        // ========== إرسال إلى تيليجرام ==========
        async function sendToTelegram() {
            if (!selectedImage) {
                alert('الرجاء رفع صورة أولاً');
                return;
            }

            const text = document.getElementById('speechText').value.trim();
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            stopSpeaking();

            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', selectedImage);
            
            const caption = `🖼️ **صورة ناطقة**\n\n💬 **النص:** ${text}\n🔍 **البصمة:** \`${currentThumbprint}\`\n📍 **الشفاه:** X:${document.getElementById('xSlider').value}% Y:${document.getElementById('ySlider').value}%\n\n✅ شفاه شفافة متحركة ✨`;
            formData.append('caption', caption);

            try {
                document.getElementById('status').innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
                
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.ok) {
                    document.getElementById('status').innerHTML = '✅ تم الإرسال إلى القناة';
                    alert('✅ تم إرسال الصورة الناطقة');
                } else {
                    throw new Error(data.description);
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ خطأ في الإرسال';
                alert('❌ فشل الإرسال: ' + error.message);
            }
        }

        // ========== نسخ البصمة ==========
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint);
            alert('✅ تم نسخ البصمة');
        }
    </script>
</body>
</html>
