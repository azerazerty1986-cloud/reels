<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتج ناطق - طماطم</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #ff4d4d, #cc0000, #990000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ffff00;
            font-size: 40px;
            text-shadow: 0 0 20px rgba(255,255,0,0.5);
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 3px solid #ffff00;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(255,255,0,0.2);
        }

        /* منطقة الصورة */
        .image-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #ffff00;
            background: #fff5e6;
        }

        #uploadedImage {
            width: 100%;
            display: block;
            transition: transform 0.3s ease;
        }

        /* طبقة الوجه فوق الصورة */
        .face-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* العيون - شكل بسيط ولطيف */
        .eyes {
            position: absolute;
            width: 120px;
            height: 50px;
            transform: translate(-50%, -50%);
            z-index: 30;
            display: flex;
            justify-content: space-between;
            left: 50%;
        }

        .eye {
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            position: relative;
            border: 3px solid #000;
            box-shadow: 0 0 15px rgba(255,255,0,0.5);
        }

        .pupil {
            width: 15px;
            height: 15px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
        }

        /* الفم - عبارة عن خط بسيط وشفاف */
        .mouth-container {
            position: absolute;
            width: 100px;
            height: 20px;
            transform: translate(-50%, -50%);
            z-index: 30;
            left: 50%;
        }

        .mouth-line {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* الخط الأساسي - شفاف مع حدود */
        .mouth-base {
            width: 80%;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            position: relative;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 0, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.2);
            transition: all 0.1s ease;
        }

        /* عند الكلام - يصبح الخط مزدوج */
        .mouth-base.speaking {
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }

        /* تأثير النبض عند الكلام */
        @keyframes mouthPulse {
            0% { 
                width: 80%;
                height: 4px;
                background: rgba(255, 255, 255, 0.3);
            }
            25% { 
                width: 90%;
                height: 8px;
                background: rgba(255, 255, 255, 0.6);
            }
            50% { 
                width: 85%;
                height: 12px;
                background: rgba(255, 255, 255, 0.5);
            }
            75% { 
                width: 95%;
                height: 6px;
                background: rgba(255, 255, 255, 0.7);
            }
            100% { 
                width: 80%;
                height: 4px;
                background: rgba(255, 255, 255, 0.3);
            }
        }

        .mouth-base.animated {
            animation: mouthPulse 0.2s infinite;
        }

        /* الأنف - نقطة صغيرة */
        .nose {
            position: absolute;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            z-index: 30;
            left: 50%;
        }

        .nose-dot {
            width: 100%;
            height: 100%;
            background: rgba(255, 150, 150, 0.4);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 0, 0.3);
            backdrop-filter: blur(2px);
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.2);
        }

        /* أدوات التحكم */
        .position-controls {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ffff00;
        }

        .slider-group {
            margin: 20px 0;
        }

        .slider-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            color: #ffff00;
        }

        input[type=range] {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            background: #ffff00;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ffff00;
        }

        .coord-value {
            display: inline-block;
            background: #ffff00;
            color: black;
            padding: 2px 10px;
            border-radius: 15px;
            margin-right: 10px;
            font-weight: bold;
        }

        /* منطقة النص */
        .text-area {
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #ffff00;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            font-family: 'Cairo', sans-serif;
        }

        textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* أزرار التحكم */
        .controls {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            min-width: 140px;
        }

        .btn-primary {
            background: #ffff00;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px #ffff00;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #ffff00;
            color: #ffff00;
        }

        .btn-secondary:hover {
            background: #ffff00;
            color: black;
        }

        .status {
            text-align: center;
            margin: 15px 0;
            color: #ffff00;
            font-size: 18px;
        }

        /* تنسيق الوجه المتحرك */
        .highlight {
            border: 2px solid #ffff00;
            box-shadow: 0 0 20px #ffff00;
        }

        /* رسالة المساعدة */
        .help-text {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-smile"></i>
                طماطم ناطقة
            </h1>
        </div>

        <div class="card">
            <!-- الصورة مع طبقة الوجه -->
            <div class="image-container" id="imageContainer">
                <img id="uploadedImage" src="" alt="المنتج" style="display: none;">
                <div id="uploadPlaceholder" style="text-align: center; padding: 50px; background: rgba(255,255,0,0.1); border-radius: 20px; cursor: pointer;" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 80px; color: #ffff00;"></i>
                    <p style="margin-top: 20px;">اضغط لرفع صورة المنتج</p>
                    <p style="font-size: 14px; color: rgba(255,255,255,0.7);">مثال: طماطم، تفاحة، برتقال</p>
                </div>
                
                <!-- طبقة الوجه -->
                <div class="face-overlay" id="faceOverlay">
                    <!-- العيون -->
                    <div class="eyes" id="eyes">
                        <div class="eye" id="leftEye">
                            <div class="pupil" id="leftPupil"></div>
                        </div>
                        <div class="eye" id="rightEye">
                            <div class="pupil" id="rightPupil"></div>
                        </div>
                    </div>
                    
                    <!-- الفم - خط شفاف -->
                    <div class="mouth-container" id="mouthContainer">
                        <div class="mouth-line">
                            <div class="mouth-base" id="mouthBase"></div>
                        </div>
                    </div>
                    
                    <!-- الأنف -->
                    <div class="nose" id="nose">
                        <div class="nose-dot"></div>
                    </div>
                </div>
            </div>

            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">

            <!-- أدوات تحديد مكان ملامح الوجه -->
            <div class="position-controls" id="positionControls" style="display: none;">
                <h3 style="color: #ffff00; margin-bottom: 15px;">
                    <i class="fas fa-arrows-alt"></i>
                    حدد مكان الملامح
                </h3>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-left"></i>
                        العيون (الوضع الأفقي):
                        <span class="coord-value" id="eyesXValue">50%</span>
                    </label>
                    <input type="range" id="eyesXSlider" min="20" max="80" value="50" step="1" oninput="updateEyesPosition()">
                    <label>
                        <i class="fas fa-arrow-down"></i>
                        العيون (الوضع الرأسي):
                        <span class="coord-value" id="eyesYValue">40%</span>
                    </label>
                    <input type="range" id="eyesYSlider" min="20" max="70" value="40" step="1" oninput="updateEyesPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-arrow-left"></i>
                        الفم (الوضع الأفقي):
                        <span class="coord-value" id="mouthXValue">50%</span>
                    </label>
                    <input type="range" id="mouthXSlider" min="20" max="80" value="50" step="1" oninput="updateMouthPosition()">
                    <label>
                        <i class="fas fa-arrow-down"></i>
                        الفم (الوضع الرأسي):
                        <span class="coord-value" id="mouthYValue">60%</span>
                    </label>
                    <input type="range" id="mouthYSlider" min="40" max="80" value="60" step="1" oninput="updateMouthPosition()">
                </div>
                
                <div class="slider-group">
                    <label>
                        <i class="fas fa-expand"></i>
                        حجم الملامح:
                        <span class="coord-value" id="sizeValue">100%</span>
                    </label>
                    <input type="range" id="sizeSlider" min="50" max="150" value="100" step="1" oninput="updateFeaturesSize()">
                </div>
            </div>

            <!-- منطقة النص -->
            <div class="text-area">
                <textarea id="speechText" placeholder="اكتب هنا ما تريد أن يقوله المنتج..." maxlength="300">أنا طماطم طازجة وصحية!</textarea>
            </div>

            <!-- أزرار التحكم -->
            <div class="controls">
                <button class="btn btn-primary" onclick="toggleSpeech()" id="speakBtn">
                    <i class="fas fa-play"></i>
                    تحدث الآن
                </button>
                <button class="btn btn-secondary" onclick="resetFeatures()">
                    <i class="fas fa-undo"></i>
                    إعادة ضبط
                </button>
            </div>

            <!-- حالة التشغيل -->
            <div class="status" id="status">
                <i class="fas fa-smile"></i>
                حرك الملامح على الصورة ثم اضغط تحدث
            </div>
            
            <div class="help-text">
                <i class="fas fa-info-circle"></i>
                الفم عبارة عن خط شفاف - يتحرك ويتغير عند الكلام
            </div>
        </div>
    </div>

    <script>
        // متغيرات
        let selectedImage = null;
        let isSpeaking = false;
        let speechInterval = null;
        let currentUtterance = null;
        
        // مقاسات افتراضية
        let currentSize = 100;

        // رفع الصورة
        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                selectedImage = input.files[0];
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('uploadedImage');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    document.getElementById('uploadPlaceholder').style.display = 'none';
                    
                    // إظهار ملامح الوجه وأدوات التحكم
                    document.getElementById('faceOverlay').style.display = 'block';
                    document.getElementById('positionControls').style.display = 'block';
                    
                    // ضبط القيم الافتراضية
                    resetFeatures();
                };
                reader.readAsDataURL(selectedImage);
            }
        }

        // تحديث موقع العيون
        function updateEyesPosition() {
            const x = document.getElementById('eyesXSlider').value;
            const y = document.getElementById('eyesYSlider').value;
            
            document.getElementById('eyesXValue').textContent = x + '%';
            document.getElementById('eyesYValue').textContent = y + '%';
            
            const eyes = document.getElementById('eyes');
            eyes.style.left = x + '%';
            eyes.style.top = y + '%';
            
            // تحريك بؤبؤ العين مع الماوس (تأثير لطيف)
            movePupils();
        }

        // تحديث موقع الفم
        function updateMouthPosition() {
            const x = document.getElementById('mouthXSlider').value;
            const y = document.getElementById('mouthYSlider').value;
            
            document.getElementById('mouthXValue').textContent = x + '%';
            document.getElementById('mouthYValue').textContent = y + '%';
            
            const mouth = document.getElementById('mouthContainer');
            mouth.style.left = x + '%';
            mouth.style.top = y + '%';
        }

        // تحديث حجم جميع الملامح
        function updateFeaturesSize() {
            const size = document.getElementById('sizeSlider').value;
            currentSize = size;
            document.getElementById('sizeValue').textContent = size + '%';
            
            // تعديل حجم العيون
            document.getElementById('eyes').style.transform = `translate(-50%, -50%) scale(${size/100})`;
            
            // تعديل حجم الفم
            document.getElementById('mouthContainer').style.transform = `translate(-50%, -50%) scale(${size/100})`;
            
            // تعديل حجم الأنف
            document.getElementById('nose').style.transform = `translate(-50%, -50%) scale(${size/100})`;
        }

        // تحريك بؤبؤ العين (تأثير لطيف)
        function movePupils() {
            const pupils = document.querySelectorAll('.pupil');
            pupils.forEach(pupil => {
                const randomX = Math.random() * 10 - 5;
                const randomY = Math.random() * 10 - 5;
                pupil.style.transform = `translate(calc(-50% + ${randomX}px), calc(-50% + ${randomY}px))`;
            });
        }

        // إعادة ضبط الملامح
        function resetFeatures() {
            document.getElementById('eyesXSlider').value = 50;
            document.getElementById('eyesYSlider').value = 40;
            document.getElementById('mouthXSlider').value = 50;
            document.getElementById('mouthYSlider').value = 60;
            document.getElementById('sizeSlider').value = 100;
            
            updateEyesPosition();
            updateMouthPosition();
            updateFeaturesSize();
        }

        // تحريك الفم عند الكلام
        function animateMouth(isOpen) {
            const mouthBase = document.getElementById('mouthBase');
            
            if (isOpen) {
                mouthBase.classList.add('animated');
            } else {
                mouthBase.classList.remove('animated');
            }
        }

        // بدء الكلام
        function startSpeaking(text) {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            if (speechInterval) {
                clearInterval(speechInterval);
            }

            currentUtterance = new SpeechSynthesisUtterance(text);
            
            // اختيار صوت عربي
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(voice => voice.lang.includes('ar-'));
            if (arabicVoice) {
                currentUtterance.voice = arabicVoice;
            }
            
            currentUtterance.lang = 'ar-SA';
            currentUtterance.rate = 0.9;
            
            currentUtterance.onstart = () => {
                isSpeaking = true;
                document.getElementById('status').innerHTML = '<i class="fas fa-volume-up fa-beat"></i> يتحدث...';
                document.getElementById('speakBtn').innerHTML = '<i class="fas fa-stop"></i> إيقاف';
                
                // بدء حركة الفم
                animateMouth(true);
                
                // حركة العيون (تحديث كل 200 مللي)
                speechInterval = setInterval(() => {
                    if (isSpeaking) {
                        movePupils();
                    }
                }, 200);
            };
            
            currentUtterance.onend = () => {
                stopSpeaking();
            };
            
            window.speechSynthesis.speak(currentUtterance);
        }

        // إيقاف الكلام
        function stopSpeaking() {
            isSpeaking = false;
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            
            if (speechInterval) {
                clearInterval(speechInterval);
                speechInterval = null;
            }
            
            // إيقاف حركة الفم
            animateMouth(false);
            
            // إعادة بؤبؤ العين للمنتصف
            document.querySelectorAll('.pupil').forEach(pupil => {
                pupil.style.transform = 'translate(-50%, -50%)';
            });
            
            document.getElementById('status').innerHTML = '<i class="fas fa-check-circle"></i> توقف الكلام';
            document.getElementById('speakBtn').innerHTML = '<i class="fas fa-play"></i> تحدث الآن';
            
            setTimeout(() => {
                document.getElementById('status').innerHTML = '<i class="fas fa-smile"></i> حرك الملامح على الصورة';
            }, 2000);
        }

        // تشغيل أو إيقاف الكلام
        function toggleSpeech() {
            const text = document.getElementById('speechText').value.trim();
            
            if (!text) {
                alert('الرجاء كتابة نص للتحدث');
                return;
            }

            if (!selectedImage) {
                alert('الرجاء رفع صورة المنتج أولاً');
                return;
            }

            if (isSpeaking) {
                stopSpeaking();
            } else {
                startSpeaking(text);
            }
        }

        // تحميل الأصوات المتاحة
        window.speechSynthesis.onvoiceschanged = function() {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
