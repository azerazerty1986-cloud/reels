<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناردو برو - جدول المبيعات المباشر مع تليجرام</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a1f1a, #1a3a32);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== رأس الصفحة ===== */
        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid gold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: gold;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            font-size: 40px;
        }

        .stats {
            display: flex;
            gap: 30px;
            background: rgba(255,215,0,0.1);
            padding: 15px 25px;
            border-radius: 50px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat i {
            color: gold;
            font-size: 20px;
        }

        .stat-value {
            font-weight: bold;
            color: gold;
            font-size: 18px;
        }

        /* ===== جدول المبيعات المباشر ===== */
        .sales-table-container {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid gold;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .table-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-title h2 {
            color: gold;
            font-size: 24px;
        }

        .table-title i {
            color: gold;
            font-size: 28px;
        }

        .table-controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-gold {
            background: gold;
            color: black;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px gold;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid gold;
            color: gold;
        }

        .btn-outline:hover {
            background: gold;
            color: black;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        /* ===== الجدول الرئيسي ===== */
        .sales-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        .sales-table th {
            background: gold;
            color: black;
            padding: 15px;
            font-size: 16px;
            text-align: center;
        }

        .sales-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            text-align: center;
        }

        .sales-table tr:hover td {
            background: rgba(255,215,0,0.1);
        }

        /* خلايا قابلة للتعديل */
        .editable-cell {
            background: rgba(255,255,255,0.1);
            border: 1px solid transparent;
            padding: 8px;
            border-radius: 5px;
            cursor: text;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        .editable-cell:hover {
            border-color: gold;
            background: rgba(255,215,0,0.2);
        }

        .editable-cell:focus {
            outline: none;
            border-color: gold;
            background: rgba(0,0,0,0.5);
        }

        /* حالة المنتج */
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-available {
            background: #4CAF50;
            color: white;
        }

        .status-low {
            background: #FFC107;
            color: black;
        }

        .status-sold {
            background: #f44336;
            color: white;
        }

        /* أيقونات الإجراءات */
        .action-icons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .action-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-icon.edit {
            background: gold;
            color: black;
        }

        .action-icon.delete {
            background: #f44336;
            color: white;
        }

        .action-icon.telegram {
            background: #0088cc;
            color: white;
        }

        .action-icon:hover {
            transform: scale(1.1);
        }

        /* ===== نموذج الإضافة السريع ===== */
        .quick-add {
            background: rgba(255,215,0,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px dashed gold;
        }

        .quick-add h3 {
            color: gold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quick-add-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .form-input {
            background: rgba(0,0,0,0.3);
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: gold;
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* ===== إحصائيات إضافية ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid gold;
            text-align: center;
        }

        .stat-card i {
            font-size: 30px;
            color: gold;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
            color: gold;
        }

        .stat-card .label {
            color: #888;
            font-size: 14px;
        }

        /* ===== قسم المحلات ===== */
        .shops-section {
            margin-top: 40px;
        }

        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .shop-card {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .shop-card:hover {
            border-color: gold;
        }

        .shop-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .shop-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: gold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: black;
        }

        .shop-info h3 {
            color: gold;
        }

        .shop-stats {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 1px solid rgba(255,215,0,0.3);
            border-bottom: 1px solid rgba(255,215,0,0.3);
        }

        .telegram-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #0088cc;
            text-decoration: none;
            margin-top: 10px;
        }

        /* ===== الإشعارات ===== */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: gold;
            color: black;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(212,175,55,0.5);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ===== تجاوب ===== */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .quick-add-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== رأس الصفحة مع الإحصائيات ===== -->
        <div class="header">
            <h1>
                <i class="fas fa-table"></i>
                جدول المبيعات المباشر
            </h1>
            
            <div class="stats">
                <div class="stat">
                    <i class="fas fa-store"></i>
                    <span>المحلات: <span class="stat-value" id="totalShops">0</span></span>
                </div>
                <div class="stat">
                    <i class="fas fa-box"></i>
                    <span>المنتجات: <span class="stat-value" id="totalProducts">0</span></span>
                </div>
                <div class="stat">
                    <i class="fas fa-shopping-cart"></i>
                    <span>مبيعات اليوم: <span class="stat-value" id="todaySales">0</span></span>
                </div>
            </div>
        </div>

        <!-- ===== إحصائيات سريعة ===== -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-coins"></i>
                <div class="number" id="totalRevenue">0</div>
                <div class="label">إجمالي الإيرادات</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-chart-line"></i>
                <div class="number" id="avgPrice">0</div>
                <div class="label">متوسط السعر</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-tags"></i>
                <div class="number" id="topCategory">-</div>
                <div class="label">أفضل قسم</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-truck"></i>
                <div class="number" id="pendingOrders">0</div>
                <div class="label">طلبات pending</div>
            </div>
        </div>

        <!-- ===== نموذج إضافة سريع ===== -->
        <div class="quick-add">
            <h3>
                <i class="fas fa-plus-circle"></i>
                إضافة منتج جديد مباشرة إلى الجدول
            </h3>
            <div class="quick-add-form">
                <input type="text" class="form-input" id="newProductName" placeholder="اسم المنتج">
                <select class="form-input" id="newProductCategory">
                    <option value="">اختر القسم</option>
                    <option value="برومسيون">برومسيون</option>
                    <option value="توابل">توابل</option>
                    <option value="كوسمتيك">كوسمتيك</option>
                    <option value="أخرى">أخرى</option>
                </select>
                <input type="number" class="form-input" id="newProductPrice" placeholder="السعر">
                <input type="number" class="form-input" id="newProductStock" placeholder="الكمية">
                <select class="form-input" id="newProductShop">
                    <option value="">اختر المحل</option>
                </select>
                <button class="btn btn-gold" onclick="addNewProduct()">
                    <i class="fas fa-save"></i> إضافة
                </button>
            </div>
        </div>

        <!-- ===== جدول المبيعات الرئيسي ===== -->
        <div class="sales-table-container">
            <div class="table-header">
                <div class="table-title">
                    <i class="fas fa-chart-simple"></i>
                    <h2>جدول المبيعات - إدخال وتعديل مباشر</h2>
                </div>
                <div class="table-controls">
                    <button class="btn btn-outline" onclick="exportToExcel()">
                        <i class="fas fa-file-excel"></i> تصدير Excel
                    </button>
                    <button class="btn btn-outline" onclick="syncWithTelegram()">
                        <i class="fab fa-telegram"></i> مزامنة مع تليجرام
                    </button>
                    <button class="btn btn-gold" onclick="addSampleData()">
                        <i class="fas fa-flask"></i> إضافة عينات
                    </button>
                </div>
            </div>

            <table class="sales-table" id="salesTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>المعرف</th>
                        <th>اسم المنتج</th>
                        <th>القسم</th>
                        <th>السعر</th>
                        <th>الكمية</th>
                        <th>المحل</th>
                        <th>حالة المخزون</th>
                        <th>تاريخ الإضافة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- البيانات ستضاف هنا عبر JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- ===== قسم المحلات ===== -->
        <div class="shops-section">
            <h2 style="color: gold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-store-alt"></i>
                المحلات المسجلة
            </h2>
            <div class="shops-grid" id="shopsGrid"></div>
        </div>
    </div>

    <script>
        // ========== تهيئة البيانات ==========
        let products = JSON.parse(localStorage.getItem('sales_products')) || [];
        let shops = JSON.parse(localStorage.getItem('sales_shops')) || [
            {
                id: 1,
                name: 'متجر أحمد للتوابل',
                owner: 'أحمد',
                telegram: '@ahmed_spices',
                category: 'توابل',
                products: 0,
                rating: 4.8
            },
            {
                id: 2,
                name: 'متجر سارة للتجميل',
                owner: 'سارة',
                telegram: '@sara_cosmetic',
                category: 'كوسمتيك',
                products: 0,
                rating: 4.5
            },
            {
                id: 3,
                name: 'برومسيون اليوم',
                owner: 'محمد',
                telegram: '@mohamed_promo',
                category: 'برومسيون',
                products: 0,
                rating: 4.2
            }
        ];

        // ========== إعدادات تليجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== تهيئة الصفحة ==========
        function init() {
            updateShopsSelect();
            renderTable();
            renderShops();
            updateStats();
        }

        // ========== تحديث قائمة المحلات ==========
        function updateShopsSelect() {
            const select = document.getElementById('newProductShop');
            select.innerHTML = '<option value="">اختر المحل</option>';
            shops.forEach(shop => {
                select.innerHTML += `<option value="${shop.id}">${shop.name}</option>`;
            });
        }

        // ========== عرض الجدول ==========
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (products.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 50px;">
                            <i class="fas fa-box-open" style="font-size: 50px; color: gold;"></i>
                            <p style="margin-top: 20px;">لا توجد منتجات، أضف منتجاً جديداً</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = products.map((product, index) => {
                const shop = shops.find(s => s.id == product.shopId) || { name: 'غير معروف', telegram: '#' };
                
                // تحديد حالة المخزون
                let statusClass = 'status-available';
                let statusText = 'متوفر';
                if (product.stock <= 0) {
                    statusClass = 'status-sold';
                    statusText = 'نفذ';
                } else if (product.stock < 5) {
                    statusClass = 'status-low';
                    statusText = 'محدود';
                }

                return `
                    <tr data-id="${product.id}">
                        <td>${index + 1}</td>
                        <td>${product.id}</td>
                        <td>
                            <div class="editable-cell" contenteditable="true" onblur="updateCell(${product.id}, 'name', this.innerText)">${product.name}</div>
                        </td>
                        <td>
                            <select class="form-input" style="padding: 5px;" onchange="updateCell(${product.id}, 'category', this.value)">
                                <option value="برومسيون" ${product.category === 'برومسيون' ? 'selected' : ''}>برومسيون</option>
                                <option value="توابل" ${product.category === 'توابل' ? 'selected' : ''}>توابل</option>
                                <option value="كوسمتيك" ${product.category === 'كوسمتيك' ? 'selected' : ''}>كوسمتيك</option>
                                <option value="أخرى" ${product.category === 'أخرى' ? 'selected' : ''}>أخرى</option>
                            </select>
                        </td>
                        <td>
                            <div class="editable-cell" contenteditable="true" onblur="updateCell(${product.id}, 'price', this.innerText)">${product.price}</div>
                        </td>
                        <td>
                            <div class="editable-cell" contenteditable="true" onblur="updateCell(${product.id}, 'stock', this.innerText)">${product.stock}</div>
                        </td>
                        <td>${shop.name}</td>
                        <td>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </td>
                        <td>${new Date(product.date).toLocaleDateString('ar-EG')}</td>
                        <td>
                            <div class="action-icons">
                                <div class="action-icon edit" onclick="editProduct(${product.id})" title="تعديل">
                                    <i class="fas fa-edit"></i>
                                </div>
                                <div class="action-icon telegram" onclick="sendToTelegram(${product.id})" title="إرسال إلى تليجرام">
                                    <i class="fab fa-telegram"></i>
                                </div>
                                <div class="action-icon delete" onclick="deleteProduct(${product.id})" title="حذف">
                                    <i class="fas fa-trash"></i>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ========== عرض المحلات ==========
        function renderShops() {
            const grid = document.getElementById('shopsGrid');
            
            grid.innerHTML = shops.map(shop => {
                const shopProducts = products.filter(p => p.shopId == shop.id);
                const totalValue = shopProducts.reduce((sum, p) => sum + (p.price * p.stock), 0);
                
                return `
                    <div class="shop-card">
                        <div class="shop-header">
                            <div class="shop-avatar">
                                <i class="fas fa-store"></i>
                            </div>
                            <div class="shop-info">
                                <h3>${shop.name}</h3>
                                <p>👤 ${shop.owner}</p>
                            </div>
                        </div>
                        
                        <div class="shop-stats">
                            <span>📦 ${shopProducts.length} منتج</span>
                            <span>💰 ${totalValue.toLocaleString()} دج</span>
                        </div>
                        
                        <div style="display: flex; justify-content: space-between; margin: 10px 0;">
                            <span>⭐ ${shop.rating}</span>
                            <span>🏷️ ${shop.category}</span>
                        </div>
                        
                        <a href="https://t.me/${shop.telegram.replace('@', '')}" target="_blank" class="telegram-link">
                            <i class="fab fa-telegram"></i>
                            ${shop.telegram}
                        </a>
                        
                        <button class="btn btn-gold" style="width: 100%; margin-top: 15px;" onclick="showShopProducts(${shop.id})">
                            <i class="fas fa-eye"></i> عرض المنتجات
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ========== تحديث خلية في الجدول ==========
        function updateCell(productId, field, value) {
            const product = products.find(p => p.id == productId);
            if (!product) return;

            if (field === 'price' || field === 'stock') {
                value = parseInt(value) || 0;
            }

            product[field] = value;
            saveProducts();
            updateStats();
            showNotification(`تم تحديث ${field} بنجاح`);
        }

        // ========== إضافة منتج جديد ==========
        function addNewProduct() {
            const name = document.getElementById('newProductName').value;
            const category = document.getElementById('newProductCategory').value;
            const price = parseInt(document.getElementById('newProductPrice').value);
            const stock = parseInt(document.getElementById('newProductStock').value);
            const shopId = document.getElementById('newProductShop').value;

            if (!name || !category || !price || !shopId) {
                showNotification('الرجاء ملء جميع الحقول', 'error');
                return;
            }

            const newProduct = {
                id: Date.now(),
                name: name,
                category: category,
                price: price,
                stock: stock || 0,
                shopId: parseInt(shopId),
                date: new Date().toISOString()
            };

            products.push(newProduct);
            saveProducts();
            renderTable();
            updateStats();

            // مسح الحقول
            document.getElementById('newProductName').value = '';
            document.getElementById('newProductCategory').value = '';
            document.getElementById('newProductPrice').value = '';
            document.getElementById('newProductStock').value = '';

            showNotification('✅ تم إضافة المنتج بنجاح');
        }

        // ========== حذف منتج ==========
        function deleteProduct(id) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                products = products.filter(p => p.id != id);
                saveProducts();
                renderTable();
                updateStats();
                showNotification('✅ تم حذف المنتج');
            }
        }

        // ========== تعديل منتج ==========
        function editProduct(id) {
            const product = products.find(p => p.id == id);
            if (!product) return;

            document.getElementById('newProductName').value = product.name;
            document.getElementById('newProductCategory').value = product.category;
            document.getElementById('newProductPrice').value = product.price;
            document.getElementById('newProductStock').value = product.stock;
            document.getElementById('newProductShop').value = product.shopId;

            // حذف المنتج القديم
            products = products.filter(p => p.id != id);
            saveProducts();
            renderTable();

            showNotification('✏️ يمكنك تعديل البيانات ثم الضغط على إضافة');
        }

        // ========== إرسال إلى تليجرام ==========
        async function sendToTelegram(productId) {
            const product = products.find(p => p.id == productId);
            const shop = shops.find(s => s.id == product.shopId);

            const message = `🛍️ **منتج جديد في السوق**
            
📦 الاسم: ${product.name}
🏷️ القسم: ${product.category}
💰 السعر: ${product.price} دج
📊 الكمية: ${product.stock}
🏪 المحل: ${shop.name}
👤 التاجر: ${shop.owner}
📱 تليجرام: ${shop.telegram}

✅ للطلب: تواصل مع التاجر مباشرة`;

            try {
                showNotification('جاري الإرسال إلى تليجرام...', 'info');

                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    showNotification('✅ تم الإرسال إلى قناة تليجرام');
                } else {
                    showNotification('❌ فشل الإرسال: ' + data.description, 'error');
                }
            } catch (error) {
                showNotification('❌ خطأ في الاتصال', 'error');
            }
        }

        // ========== مزامنة مع تليجرام ==========
        async function syncWithTelegram() {
            showNotification('جاري المزامنة مع تليجرام...', 'info');
            
            // محاكاة جلب المنتجات من تليجرام
            setTimeout(() => {
                showNotification('✅ تمت المزامنة مع 3 منتجات جديدة');
            }, 2000);
        }

        // ========== تصدير إلى Excel ==========
        function exportToExcel() {
            let csv = 'المعرف,الاسم,القسم,السعر,الكمية,المحل,التاريخ\n';
            
            products.forEach(p => {
                const shop = shops.find(s => s.id == p.shopId) || { name: 'غير معروف' };
                csv += `${p.id},${p.name},${p.category},${p.price},${p.stock},${shop.name},${new Date(p.date).toLocaleDateString()}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'sales_data.csv';
            link.click();

            showNotification('✅ تم تصدير البيانات');
        }

        // ========== عرض منتجات محل معين ==========
        function showShopProducts(shopId) {
            const shop = shops.find(s => s.id == shopId);
            const shopProducts = products.filter(p => p.shopId == shopId);
            
            let message = `🛍️ **منتجات ${shop.name}**\n\n`;
            shopProducts.forEach((p, i) => {
                message += `${i+1}. ${p.name} - ${p.price} دج (${p.stock} قطعة)\n`;
            });
            message += `\n📱 تليجرام: ${shop.telegram}`;

            alert(message);
        }

        // ========== إضافة بيانات عينة ==========
        function addSampleData() {
            const sampleProducts = [
                { id: Date.now() + 1, name: 'كركم أصلي', category: 'توابل', price: 250, stock: 50, shopId: 1, date: new Date().toISOString() },
                { id: Date.now() + 2, name: 'زيت زيتون', category: 'برومسيون', price: 800, stock: 30, shopId: 3, date: new Date().toISOString() },
                { id: Date.now() + 3, name: 'كريم مرطب', category: 'كوسمتيك', price: 1200, stock: 15, shopId: 2, date: new Date().toISOString() },
                { id: Date.now() + 4, name: 'فلفل أسود', category: 'توابل', price: 180, stock: 100, shopId: 1, date: new Date().toISOString() },
                { id: Date.now() + 5, name: 'زعفران', category: 'توابل', price: 3500, stock: 5, shopId: 1, date: new Date().toISOString() }
            ];

            products = [...products, ...sampleProducts];
            saveProducts();
            renderTable();
            updateStats();
            showNotification('✅ تم إضافة 5 منتجات تجريبية');
        }

        // ========== تحديث الإحصائيات ==========
        function updateStats() {
            document.getElementById('totalShops').textContent = shops.length;
            document.getElementById('totalProducts').textContent = products.length;
            
            const today = new Date().toDateString();
            const todaySales = products.filter(p => new Date(p.date).toDateString() === today).length;
            document.getElementById('todaySales').textContent = todaySales;

            const totalRevenue = products.reduce((sum, p) => sum + (p.price * p.stock), 0);
            document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString() + ' دج';

            const avgPrice = products.length ? Math.round(products.reduce((sum, p) => sum + p.price, 0) / products.length) : 0;
            document.getElementById('avgPrice').textContent = avgPrice.toLocaleString() + ' دج';

            // أفضل قسم
            const categories = {};
            products.forEach(p => categories[p.category] = (categories[p.category] || 0) + 1);
            const topCategory = Object.entries(categories).sort((a,b) => b[1] - a[1])[0];
            document.getElementById('topCategory').textContent = topCategory ? topCategory[0] : '-';

            // طلبات pending (محاكاة)
            document.getElementById('pendingOrders').textContent = Math.floor(Math.random() * 10) + 1;
        }

        // ========== حفظ المنتجات ==========
        function saveProducts() {
            localStorage.setItem('sales_products', JSON.stringify(products));
        }

        // ========== حفظ المحلات ==========
        function saveShops() {
            localStorage.setItem('sales_shops', JSON.stringify(shops));
        }

        // ========== عرض الإشعارات ==========
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            notification.style.background = type === 'success' ? 'gold' : '#f44336';
            notification.style.color = type === 'success' ? 'black' : 'white';
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // ========== تشغيل عند تحميل الصفحة ==========
        window.onload = init;

        // ========== دوال عامة للوصول من HTML ==========
        window.addNewProduct = addNewProduct;
        window.updateCell = updateCell;
        window.deleteProduct = deleteProduct;
        window.editProduct = editProduct;
        window.sendToTelegram = sendToTelegram;
        window.exportToExcel = exportToExcel;
        window.syncWithTelegram = syncWithTelegram;
        window.addSampleData = addSampleData;
        window.showShopProducts = showShopProducts;
    </script>
</body>
</html>
