
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الجولات - ناردو برو</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a1a15, #1a3a32);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== الهيدر ===== */
        .tour-header {
            background: linear-gradient(135deg, #2c5e4f, #1a3a32);
            padding: 30px;
            border-radius: 30px;
            border: 2px solid gold;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .tour-header h1 {
            color: gold;
            font-size: 42px;
            margin-bottom: 10px;
        }

        .tour-header h1 i {
            margin: 0 15px;
        }

        .tour-header p {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
        }

        /* ===== إحصائيات سريعة ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid gold;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px gold;
        }

        .stat-card i {
            font-size: 40px;
            color: gold;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: gold;
        }

        .stat-label {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        /* ===== أزرار التحكم ===== */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(212,175,55,0.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px gold;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid gold;
            color: gold;
            padding: 13px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: gold;
            color: black;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            border: none;
            padding: 13px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        /* ===== قسم المستخدمين النشطين ===== */
        .section-title {
            color: gold;
            font-size: 24px;
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .user-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid gold;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, gold, transparent);
            opacity: 0.1;
            border-radius: 50%;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212,175,55,0.3);
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2c5e4f, #1a3a32);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid gold;
        }

        .user-avatar i {
            font-size: 35px;
            color: gold;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 18px;
            font-weight: bold;
            color: gold;
        }

        .user-role {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin: 5px 0;
        }

        .user-role i {
            margin-left: 5px;
        }

        .user-telegram {
            font-size: 12px;
            color: #0088cc;
        }

        .user-active {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 12px;
            height: 12px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .user-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .user-action-btn {
            background: gold;
            color: black;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .user-action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px gold;
        }

        /* ===== الجولات النشطة ===== */
        .tours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tour-card {
            background: linear-gradient(145deg, #1a3a32, #0d1e18);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .tour-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, gold, #00b894, gold);
        }

        .tour-header-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .tour-title {
            font-size: 20px;
            font-weight: bold;
            color: gold;
        }

        .tour-status {
            background: #00b894;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .tour-participants {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .tour-participant {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tour-participant i {
            width: 30px;
            height: 30px;
            background: #2c5e4f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
        }

        .tour-progress {
            margin: 15px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, gold, #00b894);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .tour-stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .tour-stat {
            text-align: center;
        }

        .tour-stat-value {
            font-size: 18px;
            font-weight: bold;
            color: gold;
        }

        .tour-stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }

        .tour-thumbprint {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            color: gold;
            direction: ltr;
            text-align: center;
            margin: 10px 0;
            border: 1px solid gold;
        }

        .tour-footer {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .tour-btn {
            flex: 1;
            background: gold;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .tour-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px gold;
        }

        .tour-btn.secondary {
            background: transparent;
            border: 1px solid gold;
            color: gold;
        }

        /* ===== نافذة الجولة ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a3a32, #0d1e18);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: gold;
            font-size: 24px;
        }

        .close-btn {
            background: none;
            border: none;
            color: gold;
            font-size: 30px;
            cursor: pointer;
        }

        .stops-container {
            margin: 20px 0;
        }

        .stop-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid gold;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .stop-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .stop-number {
            color: gold;
            font-weight: bold;
        }

        .stop-status {
            color: #00b894;
        }

        .chat-container {
            margin: 20px 0;
            height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255,215,0,0.1);
            border-radius: 10px;
        }

        .chat-sender {
            color: gold;
            font-weight: bold;
            font-size: 12px;
        }

        .chat-text {
            color: white;
            margin-top: 3px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid gold;
            border-radius: 10px;
            color: white;
            font-family: 'Cairo', sans-serif;
        }

        .chat-input button {
            background: gold;
            color: black;
            border: none;
            width: 50px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* ===== تذييل الصفحة ===== */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: rgba(255,255,255,0.5);
            border-top: 1px solid gold;
        }

        /* ===== حركات ===== */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== تجاوب ===== */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .action-buttons {
                flex-direction: column;
            }

            .tour-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== الهيدر ===== -->
        <div class="tour-header">
            <h1>
                <i class="fas fa-globe"></i>
                نظام الجولات
                <i class="fas fa-users"></i>
            </h1>
            <p>تواصل مع التجار والمشترين في جولات تفاعلية</p>
        </div>

        <!-- ===== الإحصائيات ===== -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="stat-number" id="activeUsersCount">0</div>
                <div class="stat-label">مستخدم نشط</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-globe"></i>
                <div class="stat-number" id="activeToursCount">0</div>
                <div class="stat-label">جولة نشطة</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-store"></i>
                <div class="stat-number" id="merchantsCount">0</div>
                <div class="stat-label">تاجر</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-user"></i>
                <div class="stat-number" id="customersCount">0</div>
                <div class="stat-label">مشتري</div>
            </div>
        </div>

        <!-- ===== أزرار التحكم ===== -->
        <div class="action-buttons">
            <button class="btn-primary" onclick="startRandomTour()">
                <i class="fas fa-random"></i>
                جولة عشوائية
            </button>
            <button class="btn-secondary" onclick="showTourRequests()">
                <i class="fas fa-envelope"></i>
                طلبات الجولات
                <span class="badge" id="requestsBadge" style="
                    background: red;
                    color: white;
                    border-radius: 50%;
                    padding: 2px 8px;
                    font-size: 12px;
                ">0</span>
            </button>
            <button class="btn-secondary" onclick="showMyTours()">
                <i class="fas fa-history"></i>
                جولاتي
            </button>
            <button class="btn-danger" onclick="searchByThumbprint()">
                <i class="fas fa-fingerprint"></i>
                بحث بالبصمة
            </button>
        </div>

        <!-- ===== المستخدمين النشطين ===== -->
        <div class="section-title">
            <i class="fas fa-circle" style="color: #00ff00; font-size: 12px;"></i>
            المستخدمين النشطين الآن
            <span style="color: gold;" id="activeUsersCount2">(0)</span>
        </div>

        <div class="users-grid" id="activeUsersContainer">
            <!-- تضاف هنا بطاقات المستخدمين ديناميكياً -->
        </div>

        <!-- ===== الجولات النشطة ===== -->
        <div class="section-title">
            <i class="fas fa-globe"></i>
            الجولات النشطة
            <span style="color: gold;" id="activeToursCount2">(0)</span>
        </div>

        <div class="tours-grid" id="activeToursContainer">
            <!-- تضاف هنا بطاقات الجولات ديناميكياً -->
        </div>

        <!-- ===== نافذة الجولة ===== -->
        <div class="modal" id="tourModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTourTitle">جولة جديدة</h2>
                    <button class="close-btn" onclick="closeTourModal()">&times;</button>
                </div>
                
                <div class="tour-info" id="tourInfo">
                    <!-- معلومات الجولة -->
                </div>

                <div class="stops-container" id="stopsContainer">
                    <!-- محطات الجولة -->
                </div>

                <div class="chat-container" id="chatContainer">
                    <!-- رسائل الشات -->
                    <div class="chat-message">
                        <div class="chat-sender">النظام</div>
                        <div class="chat-text">مرحباً بكم في الجولة</div>
                    </div>
                </div>

                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="tour-btn" onclick="nextStop()">
                        <i class="fas fa-arrow-left"></i>
                        المحطة التالية
                    </button>
                    <button class="tour-btn secondary" onclick="endTour()">
                        <i class="fas fa-times"></i>
                        إنهاء الجولة
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-fingerprint"></i> جميع الجولات لها بصمة فريدة في تلجرام
    </div>

    <script>
        // ========== بيانات تجريبية ==========
        let currentUser = {
            id: 1,
            name: 'أحمد',
            role: 'merchant',
            telegram: '@ahmed'
        };

        let activeUsers = [
            { id: 2, name: 'محمد', role: 'merchant', telegram: '@mohamed', lastActive: new Date() },
            { id: 3, name: 'فاطمة', role: 'customer', telegram: '@fatma', lastActive: new Date() },
            { id: 4, name: 'علي', role: 'merchant', telegram: '@ali', lastActive: new Date() },
            { id: 5, name: 'نور', role: 'customer', telegram: '@noor', lastActive: new Date() }
        ];

        let activeTours = [
            {
                id: 1,
                title: 'جولة في المتجر',
                creator: { name: 'أحمد', role: 'merchant' },
                participant: { name: 'محمد', role: 'merchant' },
                stops: 5,
                currentStop: 2,
                thumbprint: 'TOR_001_AHM_240312_153045_XY9P',
                status: 'active'
            }
        ];

        let tourRequests = [];

        // ========== تهيئة الصفحة ==========
        function initPage() {
            updateActiveUsers();
            updateActiveTours();
            updateStats();
        }

        // ========== تحديث المستخدمين النشطين ==========
        function updateActiveUsers() {
            const container = document.getElementById('activeUsersContainer');
            const countSpan = document.getElementById('activeUsersCount');
            const countSpan2 = document.getElementById('activeUsersCount2');
            
            countSpan.textContent = activeUsers.length;
            countSpan2.textContent = `(${activeUsers.length})`;

            if (activeUsers.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">لا يوجد مستخدمين نشطين</div>';
                return;
            }

            container.innerHTML = activeUsers.map(user => `
                <div class="user-card">
                    <div class="user-active"></div>
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-info">
                        <div class="user-name">${user.name}</div>
                        <div class="user-role">
                            <i class="fas ${user.role === 'merchant' ? 'fa-store' : 'fa-user'}"></i>
                            ${user.role === 'merchant' ? 'تاجر' : 'مشتري'}
                        </div>
                        <div class="user-telegram">
                            <i class="fab fa-telegram"></i> ${user.telegram}
                        </div>
                        <div class="user-actions">
                            <button class="user-action-btn" onclick="requestTour(${user.id})">
                                <i class="fas fa-globe"></i> طلب جولة
                            </button>
                            <button class="user-action-btn" onclick="messageUser('${user.telegram}')">
                                <i class="fab fa-telegram"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== تحديث الجولات النشطة ==========
        function updateActiveTours() {
            const container = document.getElementById('activeToursContainer');
            const countSpan = document.getElementById('activeToursCount');
            const countSpan2 = document.getElementById('activeToursCount2');
            
            countSpan.textContent = activeTours.length;
            countSpan2.textContent = `(${activeTours.length})`;

            if (activeTours.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">لا توجد جولات نشطة</div>';
                return;
            }

            container.innerHTML = activeTours.map(tour => `
                <div class="tour-card">
                    <div class="tour-header-card">
                        <span class="tour-title">${tour.title}</span>
                        <span class="tour-status">نشط</span>
                    </div>
                    
                    <div class="tour-participants">
                        <div class="tour-participant">
                            <i class="fas fa-user"></i>
                            <span>${tour.creator.name}</span>
                        </div>
                        <i class="fas fa-arrow-left" style="color: gold;"></i>
                        <div class="tour-participant">
                            <i class="fas fa-user"></i>
                            <span>${tour.participant.name}</span>
                        </div>
                    </div>

                    <div class="tour-progress">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span>المحطة ${tour.currentStop} من ${tour.stops}</span>
                            <span>${Math.round(tour.currentStop/tour.stops*100)}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${tour.currentStop/tour.stops*100}%"></div>
                        </div>
                    </div>

                    <div class="tour-stats">
                        <div class="tour-stat">
                            <div class="tour-stat-value">${tour.stops}</div>
                            <div class="tour-stat-label">محطات</div>
                        </div>
                        <div class="tour-stat">
                            <div class="tour-stat-value">${tour.currentStop}</div>
                            <div class="tour-stat-label">الحالية</div>
                        </div>
                        <div class="tour-stat">
                            <div class="tour-stat-value">15</div>
                            <div class="tour-stat-label">دقيقة</div>
                        </div>
                    </div>

                    <div class="tour-thumbprint">
                        <i class="fas fa-fingerprint"></i> ${tour.thumbprint}
                    </div>

                    <div class="tour-footer">
                        <button class="tour-btn" onclick="openTour(${tour.id})">
                            <i class="fas fa-play"></i> متابعة
                        </button>
                        <button class="tour-btn secondary" onclick="copyThumbprint('${tour.thumbprint}')">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ========== تحديث الإحصائيات ==========
        function updateStats() {
            document.getElementById('merchantsCount').textContent = activeUsers.filter(u => u.role === 'merchant').length;
            document.getElementById('customersCount').textContent = activeUsers.filter(u => u.role === 'customer').length;
        }

        // ========== بدء جولة عشوائية ==========
        function startRandomTour() {
            const otherUsers = activeUsers.filter(u => u.id !== currentUser.id);
            
            if (otherUsers.length === 0) {
                alert('❌ لا يوجد مستخدمين للجولة');
                return;
            }

            const randomUser = otherUsers[Math.floor(Math.random() * otherUsers.length)];
            
            const thumbprint = generateThumbprint('tour');
            
            const newTour = {
                id: Date.now(),
                title: `جولة مع ${randomUser.name}`,
                creator: currentUser,
                participant: randomUser,
                stops: 5,
                currentStop: 1,
                thumbprint: thumbprint,
                status: 'active'
            };

            activeTours.push(newTour);
            updateActiveTours();
            
            alert(`✅ بدأت جولة عشوائية مع ${randomUser.name}\nالبصمة: ${thumbprint}`);
        }

        // ========== طلب جولة مع مستخدم ==========
        function requestTour(userId) {
            const user = activeUsers.find(u => u.id === userId);
            if (!user) return;

            const message = prompt(`📝 أرسل طلب جولة إلى ${user.name}:`, 'أود القيام بجولة معك');
            if (!message) return;

            const thumbprint = generateThumbprint('tour');

            const request = {
                id: Date.now(),
                from: currentUser,
                to: user,
                message: message,
                thumbprint: thumbprint,
                status: 'pending'
            };

            tourRequests.push(request);
            document.getElementById('requestsBadge').textContent = tourRequests.length;

            alert(`✅ تم إرسال الطلب إلى ${user.name}\nالبصمة: ${thumbprint}`);
        }

        // ========== فتح الجولة ==========
        function openTour(tourId) {
            const tour = activeTours.find(t => t.id === tourId);
            if (!tour) return;

            document.getElementById('modalTourTitle').textContent = tour.title;
            
            let stopsHtml = '';
            for (let i = 1; i <= tour.stops; i++) {
                const isActive = i === tour.currentStop;
                const isCompleted = i < tour.currentStop;
                
                stopsHtml += `
                    <div class="stop-item" style="border-color: ${isActive ? 'gold' : isCompleted ? '#00b894' : '#666'}">
                        <div class="stop-header">
                            <span class="stop-number">المحطة ${i}</span>
                            <span class="stop-status">
                                ${isActive ? '🔴 حالية' : isCompleted ? '✅ تمت' : '⏳ قادمة'}
                            </span>
                        </div>
                        <p>${isActive ? 'جاري استكشاف المحطة...' : isCompleted ? 'تم استكشاف المحطة' : 'في انتظار الوصول'}</p>
                    </div>
                `;
            }

            document.getElementById('stopsContainer').innerHTML = stopsHtml;
            document.getElementById('tourModal').style.display = 'flex';
        }

        // ========== إرسال رسالة ==========
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;

            const chatContainer = document.getElementById('chatContainer');
            const messageHtml = `
                <div class="chat-message" style="border-right: 3px solid gold;">
                    <div class="chat-sender">${currentUser.name}</div>
                    <div class="chat-text">${message}</div>
                </div>
            `;

            chatContainer.innerHTML += messageHtml;
            chatContainer.scrollTop = chatContainer.scrollHeight;
            input.value = '';
        }

        // ========== المحطة التالية ==========
        function nextStop() {
            // تنفيذ الانتقال للمحطة التالية
        }

        // ========== إنهاء الجولة ==========
        function endTour() {
            if (confirm('هل أنت متأكد من إنهاء الجولة؟')) {
                closeTourModal();
            }
        }

        // ========== إغلاق نافذة الجولة ==========
        function closeTourModal() {
            document.getElementById('tourModal').style.display = 'none';
        }

        // ========== توليد بصمة ==========
        function generateThumbprint(type) {
            const prefix = 'TOR';
            const date = new Date();
            const dateStr = `${date.getFullYear().toString().substring(2)}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}`;
            const timeStr = `${date.getHours().toString().padStart(2,'0')}${date.getMinutes().toString().padStart(2,'0')}${date.getSeconds().toString().padStart(2,'0')}`;
            const random = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            return `${prefix}_${dateStr}_${timeStr}_${random}`;
        }

        // ========== نسخ البصمة ==========
        function copyThumbprint(thumbprint) {
            navigator.clipboard.writeText(thumbprint);
            alert('✅ تم نسخ البصمة');
        }

        // ========== البحث بالبصمة ==========
        function searchByThumbprint() {
            const thumbprint = prompt('🔍 أدخل البصمة:');
            if (!thumbprint) return;

            const found = activeTours.find(t => t.thumbprint === thumbprint);
            
            if (found) {
                alert(`✅ تم العثور على الجولة: ${found.title}`);
            } else {
                alert('❌ لا توجد جولة بهذه البصمة');
            }
        }

        // ========== عرض طلبات الجولات ==========
        function showTourRequests() {
            if (tourRequests.length === 0) {
                alert('لا توجد طلبات');
                return;
            }

            let message = '📋 طلبات الجولات:\n\n';
            tourRequests.forEach((req, i) => {
                message += `${i+1}. من: ${req.from.name}\n`;
                message += `   إلى: ${req.to.name}\n`;
                message += `   رسالة: ${req.message}\n`;
                message += `   بصمة: ${req.thumbprint}\n\n`;
            });

            alert(message);
        }

        // ========== عرض جولاتي ==========
        function showMyTours() {
            const myTours = activeTours.filter(t => 
                t.creator.id === currentUser.id || t.participant.id === currentUser.id
            );

            if (myTours.length === 0) {
                alert('لا توجد جولات لك');
                return;
            }

            let message = '📋 جولاتي:\n\n';
            myTours.forEach((tour, i) => {
                message += `${i+1}. ${tour.title}\n`;
                message += `   مع: ${tour.creator.id === currentUser.id ? tour.participant.name : tour.creator.name}\n`;
                message += `   المحطة: ${tour.currentStop}/${tour.stops}\n`;
                message += `   بصمة: ${tour.thumbprint}\n\n`;
            });

            alert(message);
        }

        // ========== مراسلة مستخدم ==========
        function messageUser(telegram) {
            window.open(`https://t.me/${telegram.replace('@', '')}`, '_blank');
        }

        // ========== تشغيل التهيئة ==========
        document.addEventListener('DOMContentLoaded', initPage);

        // تحديث كل 30 ثانية
        setInterval(() => {
            updateActiveUsers();
            updateActiveTours();
        }, 30000);
    </script>
</body>
</html>
