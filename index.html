<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Cloud UI - مع جولة المستخدمين</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* الشريط الجانبي */
        .sidebar {
            background: white;
            padding: 30px 20px;
            border-left: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: bold;
        }

        .logo i {
            color: #ff0050;
            font-size: 32px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            border-radius: 12px;
            color: #666;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: linear-gradient(135deg, #ff0050, #ff8a00);
            color: white;
        }

        .nav-item i {
            font-size: 20px;
        }

        .storage-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .storage-info i {
            font-size: 24px;
            color: #ff0050;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 10px 0;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff0050, #ff8a00);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* المحتوى الرئيسي */
        .main-content {
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
            position: relative;
        }

        /* مؤشر الجولة */
        .tour-guide {
            background: linear-gradient(135deg, #ff0050, #ff8a00);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 20px rgba(255,0,80,0.3);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .tour-progress {
            display: flex;
            gap: 5px;
        }

        .tour-dot {
            width: 30px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .tour-dot.active {
            background: white;
            width: 50px;
        }

        .tour-btn {
            background: white;
            color: #ff0050;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tour-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* قائمة المستخدمين للجولة */
        .users-carousel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 15px 0;
            margin-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: #ff0050 #f0f0f0;
        }

        .users-carousel::-webkit-scrollbar {
            height: 5px;
        }

        .users-carousel::-webkit-scrollbar-thumb {
            background: #ff0050;
            border-radius: 10px;
        }

        .user-tour-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .user-tour-item:hover {
            transform: translateY(-5px);
        }

        .user-tour-item.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            width: 100%;
            height: 3px;
            background: #ff0050;
            border-radius: 3px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { width: 0; }
            to { width: 100%; }
        }

        .user-avatar-large {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, #ff0050, #ff8a00);
        }

        .user-avatar-large img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
        }

        .user-status {
            font-size: 12px;
            color: #00cc66;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* الفيديوهات */
        .videos-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .video-card.tour-highlight {
            border: 2px solid #ff0050;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255,0,80,0.3);
        }

        .video-wrapper {
            position: relative;
            height: 400px;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .follow-btn {
            background: #ff0050;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .follow-btn.following {
            background: #00cc66;
        }

        .video-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-btn {
            background: transparent;
            border: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .stat-btn.liked {
            color: #ff0050;
        }

        /* لوحة السحابة */
        .cloud-panel {
            background: white;
            padding: 20px;
            border-right: 1px solid #eee;
            overflow-y: auto;
        }

        .cloud-panel h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff0050;
            margin-bottom: 20px;
        }

        .upload-area {
            background: #f8f9fa;
            border: 2px dashed #ff0050;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #ffe5ec;
        }

        .upload-area i {
            font-size: 48px;
            color: #ff0050;
            margin-bottom: 10px;
        }

        .cloud-file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .cloud-file-item:hover {
            background: #ffe5ec;
        }

        .cloud-file-item i {
            color: #ff0050;
            font-size: 20px;
        }

        .file-info {
            flex: 1;
        }

        .file-info small {
            color: #999;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 10px;
            margin-top: 20px;
            color: #0066cc;
        }

        .spinning {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* مشغل الفيديو المنبثق */
        .video-player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .player-content {
            position: relative;
            width: 90%;
            max-width: 800px;
        }

        .close-player {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        #mainVideo {
            width: 100%;
            border-radius: 15px;
        }

        /* نافذة معلومات المستخدم */
        .user-info-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 1001;
            display: none;
            width: 90%;
            max-width: 400px;
        }

        .user-info-modal.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .modal-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .modal-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            text-align: center;
        }

        .modal-stats div {
            display: flex;
            flex-direction: column;
        }

        .modal-stats span:first-child {
            font-weight: bold;
            font-size: 18px;
        }

        .modal-stats span:last-child {
            color: #666;
            font-size: 14px;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        /* تجاوب مع الشاشات */
        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 80px 1fr 250px;
            }
            .logo span, .nav-item span, .storage-info span, .storage-info small {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar, .cloud-panel {
                display: none;
            }
        }
    </style>
</head>

        // تحميل المستخدمين في الكاروسيل
        function loadUsersCarousel() {
            const carousel = document.getElementById('usersCarousel');
            carousel.innerHTML = '';

            users.forEach((user, index) => {
                const userItem = document.createElement('div');

        function nextUserTour() {
            if (currentTourIndex < users.length - 1) {
                currentTourIndex++;
                showUserVideos(users[currentTourIndex].id);
                updateTourProgress();
                highlightCurrentUser();
                
                if (currentTourIndex === users.length - 1) {
                    document.getElementById('tourBtn').textContent = 'إنهاء الجولة';
                }
            } else {
                // إنهاء الجولة
                tourActive = false;
                document.getElementById('tourGuide').style.display = 'none';
                loadAllVideos();
                
                // إزالة التحديد من الكاروسيل
                document.querySelectorAll('.user-tour-item').forEach(item => {
                    item.classList.remove('active');
                });
            }
        }

        // تحديث شريط التقدم
        function updateTourProgress() {
            const dots = document.querySelectorAll('.tour-dot');
            dots.forEach((dot, index) => {
                if (index <= currentTourIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
            
            document.getElementById('tourStepText').textContent = 
                `اكتشف ${users[currentTourIndex].username}`;
        }

        // تحديد المستخدم الحالي في الكاروسيل
        function highlightCurrentUser() {
            document.querySelectorAll('.user-tour-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-user-id') == users[currentTourIndex].id) {
                    item.classList.add('active');
                    
                    // تمرير تلقائي للمستخدم الحالي
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
        }

        // عرض فيديوهات مستخدم معين
        function showUserVideos(userId) {
            const feed = document.getElementById('videosFeed');
            const user = users.find(u => u.id === userId);
            const videos = userVideos[userId] || [];
            
            feed.innerHTML = `
                <div class="user-profile-header" style="background: linear-gradient(135deg, #ff0050, #ff8a00); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <img src="${user.avatar}" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid white;">
                        <div>
                            <h2>${user.name} ${user.verified ? '<i class="fas fa-check-circle" style="color: #00cc66;"></i>' : ''}</h2>
                            <p>${user.username}</p>
                            <p style="font-size: 14px; margin-top: 5px;">${user.bio}</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 30px; margin-top: 15px; text-align: center;">
                        <div><strong>${user.followers}</strong><br><small>متابعين</small></div>
                        <div><strong>${user.following}</strong><br><small>يتابع</small></div>
                        <div><strong>${user.videos}</strong><br><small>فيديوهات</small></div>
                    </div>
                    <button class="follow-btn" style="width: 100%; margin-top: 15px; background: white; color: #ff0050;" 
                            onclick="toggleFollow(this, '${user.username}')" id="followBtn-${user.id}">
                        ${currentFollowing.has(user.username) ? '✅ متابَع' : '➕ متابعة'}
                    </button>
                </div>
            `;
            
            videos.forEach(video => {
                const videoCard = document.createElement('div');
                videoCard.className = 'video-card';
                if (tourActive && user.id === users[currentTourIndex].id) {
                    videoCard.classList.add('tour-highlight');
                }
                
                videoCard.innerHTML = `
                    <div class="video-wrapper">
                        <video src="#" poster="https://via.placeholder.com/400x600/ff0050/ffffff?text=${user.username}" 
                               onclick="playVideo(this, '${user.username}', '${video.desc}')"></video>
                        <div class="video-overlay">
                            <div class="user-info">
                                <img src="${user.avatar}" alt="${user.username}">
                                <strong>${user.username}</strong>
                                <button class="follow-btn" onclick="toggleFollow(this, '${user.username}')">
                                    ${currentFollowing.has(user.username) ? 'متابَع' : 'متابعة'}
                                </button>
                            </div>
                            <p>${video.desc}</p>
                            <div style="display: flex; align-items: center; gap: 5px; margin: 10px 0;">
                                <i class="fas fa-music"></i>
                                <span>${video.music}</span>
                            </div>
                            <div class="video-stats">
                                <button class="stat-btn" onclick="likeCount(this)">
                                    <i class="fas fa-heart"></i> ${video.likes}
                                </button>
                                <button class="stat-btn" onclick="openComments('${user.username}')">
                                    <i class="fas fa-comment"></i> ${video.comments}
                                </button>
                                <button class="stat-btn" onclick="shareToCloud('${user.username}')">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                feed.appendChild(videoCard);
            });
        }

        // تحميل كل الفيديوهات
        function loadAllVideos() {
            const feed = document.getElementById('videosFeed');
            feed.innerHTML = '';
            
            users.forEach(user => {
                const videos = userVideos[user.id] || [];
                videos.forEach(video => {
                    const videoCard = document.createElement('div');
                    videoCard.className = 'video-card';
                    videoCard.innerHTML = `
                        <div class="video-wrapper">
                            <video src="#" poster="https://via.placeholder.com/400x600/ff0050/ffffff?text=${user.username}" 
                                   onclick="playVideo(this, '${user.username}', '${video.desc}')"></video>
                            <div class="video-overlay">
                                <div class="user-info">
                                    <img src="${user.avatar}" alt="${user.username}">
                                    <strong>${user.username}</strong>
                                    <button class="follow-btn" onclick="toggleFollow(this, '${user.username}')">
                                        ${currentFollowing.has(user.username) ? 'متابَع' : 'متابعة'}
                                    </button>
                                </div>
                                <p>${video.desc}</p>
                                <div style="display: flex; align-items: center; gap: 5px; margin: 10px 0;">
                                    <i class="fas fa-music"></i>
                                    <span>${video.music}</span>
                                </div>
                                <div class="video-stats">
                                    <button class="stat-btn" onclick="likeCount(this)">
                                        <i class="fas fa-heart"></i> ${video.likes}
                                    </button>
                                    <button class="stat-btn" onclick="openComments('${user.username}')">
                                        <i class="fas fa-comment"></i> ${video.comments}
                                    </button>
                                    <button class="stat-btn" onclick="shareToCloud('${user.username}')">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    feed.appendChild(videoCard);
                });
            });
        }

        // عرض ملف المستخدم
        function showUserProfile(username) {
            const user = users.find(u => u.username === username || username === 'current');
            if (!user) return;
            
            document.getElementById('modalHeader').innerHTML = `
                <img src="${user.avatar}" alt="${user.name}">
                <div>
                    <h3>${user.name} ${user.verified ? '<i class="fas fa-check-circle" style="color: #00cc66;"></i>' : ''}</h3>
                    <p style="color: #666;">${user.username}</p>
                </div>
            `;
            
            document.getElementById('modalStats').innerHTML = `
                <div><span>${user.followers}</span><span>متابعين</span></div>
                <div><span>${user.following}</span><span>يتابع</span></div>
                <div><span>${user.videos}</span><span>فيديوهات</span></div>
            `;
            
            document.getElementById('modalFollowBtn').textContent = 
                currentFollowing.has(user.username) ? 'إلغاء المتابعة' : 'متابعة';
            
            document.getElementById('userInfoModal').classList.add('active');
        }

        // إغلاق نافذة المستخدم
        function closeUserModal() {
            document.getElementById('userInfoModal').classList.remove('active');
        }

        // متابعة/إلغاء متابعة
        function toggleFollow(btn, username) {
            if (currentFollowing.has(username)) {
                currentFollowing.delete(username);
                btn.textContent = 'متابعة';
                btn.classList.remove('following');
            } else {
                currentFollowing.add(username);
                btn.textContent = 'متابَع';
                btn.classList.add('following');
            }
            
            // تحديث زر المتابعة في النافذة المنبثقة
            const modalBtn = document.getElementById('modalFollowBtn');
            if (modalBtn) {
                modalBtn.textContent = currentFollowing.has(username) ? 'إلغاء المتابعة' : 'متابعة';
            }
        }

        function followFromModal() {
            const username = document.querySelector('#modalHeader p').textContent;
            const btn = document.getElementById('modalFollowBtn');
            toggleFollow(btn, username);
        }

        // تشغيل الفيديو
        function playVideo(videoElement, username, desc) {
            const modal = document.getElementById('videoPlayer');
            const mainVideo = document.getElementById('mainVideo');
            
            mainVideo.src = 'https://www.w3schools.com/html/mov_bbb.mp4';
            modal.style.display = 'flex';
            mainVideo.play();
            
            // تحديث معلومات الفيديو
            document.getElementById('likeCount').textContent = '12.5K';
        }

        function closePlayer() {
            const modal = document.getElementById('videoPlayer');
            const mainVideo = document.getElementById('mainVideo');
            
            mainVideo.pause();
            modal.style.display = 'none';
        }

        // إعجاب
        function likeCount(btn) {
            const countSpan = btn.querySelector('span') || btn;
            let count = parseInt(countSpan.textContent.replace(/[^0-9]/g, ''));
            
            if (btn.classList.contains('liked')) {
                btn.classList.remove('liked');
                count--;
            } else {
                btn.classList.add('liked');
                count++;
            }
            
            if (count >= 1000) {
                countSpan.textContent = (count/1000).toFixed(1) + 'K';
            } else {
                countSpan.textContent = count;
            }
        }

        function likeVideo() {
            const likeSpan = document.getElementById('likeCount');
            let count = parseInt(likeSpan.textContent.replace(/[^0-9]/g, ''));
            count++;
            likeSpan.textContent = (count/1000).toFixed(1) + 'K';
        }

        // فتح التعليقات
        function openComments(username) {
            alert(`💬 فتح التعليقات لـ ${username}\n(سيتم إضافة نظام التعليقات قريباً)`);
        }

        // رفع فيديو
        function handleVideoUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const cloudFiles = document.getElementById('cloudFiles');
                
                const fileItem = document.createElement('div');
                fileItem.className = 'cloud-file-item';
                fileItem.innerHTML = `
                    <i class="fas fa-video"></i>
                    <div class="file-info">
                        <strong>${file.name}</strong>
                        <small>${(file.size / (1024*1024)).toFixed(2)} MB</small>
                    </div>
                    <i class="fas fa-cloud-upload-alt" style="color: #00cc66;"></i>
                `;
                
                cloudFiles.appendChild(fileItem);
                updateStorage();
                
                alert(`✅ تم رفع ${file.name} إلى السحابة بنجاح!`);
            }
        }

        // تحديث مساحة التخزين
        function updateStorage() {
            const progress = document.getElementById('storageProgress');
            const storageText = document.getElementById('storageText');
            
            let currentWidth = parseInt(progress.style.width) || 45;
            currentWidth += 5;
            
            if (currentWidth <= 100) {
                progress.style.width = currentWidth + '%';
                storageText.textContent = `${(currentWidth * 0.1).toFixed(1)}GB من 10GB مستخدم`;
            }
        }

        // مشاركة على GitHub
        function shareToGitHub() {
            alert('✅ تم حفظ الفيديو في مستودع GitHub!\nرابط المستودع: https://github.com/yourusername/tiktok-cloud-ui');
        }

        function shareToCloud(username) {
            alert(`📤 جاري رفع الفيديو إلى السحابة...\nتمت المشاركة من ${username}`);
            updateStorage();
        }

        // تفعيل العنصر النشط
        function setActive(element) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }

        // تهيئة الصفحة
        window.onload = function() {
            loadUsersCarousel();
            loadAllVideos();
            
            // إضافة مستمع للسحب والإفلات
            const uploadArea = document.getElementById('uploadArea');
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#ffe5ec';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = '#f8f9fa';
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#f8f9fa';
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleVideoUpload({ files: files });
                }
            });
        };
    </script>
</body>
</html>
