<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العجلة السحرية - إرسال Reels إلى تلجرام</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a1a15, #1a3a32);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            text-align: center;
        }

        h1 {
            color: gold;
            font-size: 40px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }

        h1 i {
            margin: 0 15px;
        }

        /* ===== العجلة السحرية ===== */
        .magic-wheel {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto 40px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .magic-wheel:hover {
            transform: rotate(15deg) scale(1.1);
            filter: drop-shadow(0 0 30px gold);
        }

        .magic-wheel:active {
            transform: rotate(30deg) scale(0.95);
        }

        /* الخلفية الدائرية */
        .wheel-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #FF0000 0deg 120deg,
                #ff4444 120deg 240deg,
                #00b894 240deg 360deg
            );
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 50px rgba(255,215,0,0.3);
            animation: rotateWheel 20s linear infinite;
            border: 5px solid gold;
        }

        @keyframes rotateWheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الأيقونات على العجلة */
        .wheel-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotateWheel 20s linear infinite reverse;
        }

        .wheel-icon {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid gold;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            transition: all 0.3s ease;
        }

        .wheel-icon:hover {
            transform: scale(1.2);
            box-shadow: 0 0 50px gold;
        }

        .wheel-icon i {
            font-size: 30px;
            margin-bottom: 5px;
        }

        .wheel-icon span {
            font-size: 14px;
            font-weight: bold;
        }

        .icon-reel {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FF0000, #cc0000);
        }

        .icon-live {
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
        }

        .icon-tour {
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #00b894, #008b6b);
        }

        /* المركز اللامع */
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, gold, transparent 80%);
            border-radius: 50%;
            filter: blur(10px);
            animation: pulse 2s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* السهم */
        .wheel-arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: gold;
            font-size: 50px;
            filter: drop-shadow(0 0 10px gold);
            animation: bounce 1.5s infinite;
            z-index: 20;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-15px); }
        }

        /* النص المساعد */
        .wheel-hint {
            font-size: 20px;
            color: rgba(255,215,0,0.9);
            margin: 20px 0;
            padding: 15px 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            border: 2px solid gold;
            display: inline-block;
        }

        .wheel-hint i {
            margin-left: 10px;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #1a3a32, #0a1a15);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.5s ease;
            position: relative;
            box-shadow: 0 0 50px rgba(255,215,0,0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            color: gold;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .modal-header i {
            font-size: 60px;
            color: gold;
            margin-bottom: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: gold;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            transform: scale(1.2);
            color: white;
        }

        /* خيارات الريلز */
        .reel-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .reel-option {
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reel-option:hover {
            transform: translateY(-5px);
            border-color: gold;
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
        }

        .reel-option.selected {
            border-color: gold;
            background: rgba(255,215,0,0.2);
            transform: scale(1.05);
        }

        .reel-option.reel {
            background: linear-gradient(135deg, #FF0000, #cc0000);
        }

        .reel-option.live {
            background: linear-gradient(135deg, #ff4444, #cc0000);
        }

        .reel-option.tour {
            background: linear-gradient(135deg, #00b894, #008b6b);
        }

        .reel-option i {
            font-size: 40px;
            margin-bottom: 10px;
            color: white;
        }

        .reel-option span {
            display: block;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        /* حقول النموذج */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: gold;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* زر الإرسال */
        .send-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, gold, #ffd700);
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px gold;
        }

        .send-btn i {
            font-size: 24px;
        }

        /* بصمة العرض */
        .thumbprint-preview {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid gold;
        }

        .thumbprint-preview .label {
            color: gold;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .thumbprint-preview .value {
            font-family: monospace;
            font-size: 18px;
            color: white;
            letter-spacing: 2px;
            word-break: break-all;
        }

        /* الإشعارات */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, gold, #ffd700);
            color: black;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(212,175,55,0.5);
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* المعلومات */
        .info-box {
            background: rgba(255,215,0,0.1);
            border: 1px solid gold;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .info-box i {
            color: gold;
            margin-left: 5px;
        }

        /* الهاتف */
        @media (max-width: 768px) {
            .magic-wheel {
                width: 300px;
                height: 300px;
            }

            .wheel-icon {
                width: 60px;
                height: 60px;
            }

            .wheel-icon i {
                font-size: 20px;
            }

            .wheel-icon span {
                font-size: 10px;
            }

            .modal-content {
                padding: 20px;
            }

            .reel-options {
                gap: 10px;
            }

            .reel-option {
                padding: 15px;
            }

            .reel-option i {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-film"></i>
            العجلة السحرية
            <i class="fas fa-paper-plane"></i>
        </h1>
        
        <!-- العجلة -->
        <div class="magic-wheel" onclick="showReelPopup()">
            <div class="wheel-bg"></div>
            <div class="wheel-icons">
                <div class="wheel-icon icon-reel">
                    <i class="fas fa-film"></i>
                    <span>Reel</span>
                </div>
                <div class="wheel-icon icon-live">
                    <i class="fas fa-video"></i>
                    <span>مباشر</span>
                </div>
                <div class="wheel-icon icon-tour">
                    <i class="fas fa-globe"></i>
                    <span>جولة</span>
                </div>
            </div>
            <div class="wheel-center"></div>
            <div class="wheel-arrow">
                <i class="fas fa-arrow-down"></i>
            </div>
        </div>

        <div class="wheel-hint">
            <i class="fas fa-hand-pointer"></i>
            اضغط على العجلة لإرسال Reel إلى تلجرام
        </div>
    </div>

    <!-- النافذة المنبثقة -->
    <div class="modal" id="reelModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            
            <div class="modal-header">
                <i class="fas fa-film"></i>
                <h2>إرسال Reel إلى تلجرام</h2>
            </div>

            <div class="info-box">
                <i class="fas fa-info-circle"></i>
                سيتم إنشاء بصمة فريدة لكل Reel وإرسالها إلى قناة تلجرام
            </div>

            <!-- خيارات الريلز -->
            <div class="reel-options">
                <div class="reel-option reel selected" onclick="selectReelType('reel', this)" id="optionReel">
                    <i class="fas fa-film"></i>
                    <span>Reel</span>
                </div>
                <div class="reel-option live" onclick="selectReelType('live', this)" id="optionLive">
                    <i class="fas fa-video"></i>
                    <span>مباشر</span>
                </div>
                <div class="reel-option tour" onclick="selectReelType('tour', this)" id="optionTour">
                    <i class="fas fa-globe"></i>
                    <span>جولة</span>
                </div>
            </div>

            <!-- النموذج -->
            <form id="reelForm" onsubmit="event.preventDefault(); sendReelToTelegram();">
                <div class="form-group">
                    <label><i class="fas fa-link"></i> رابط Reel</label>
                    <input type="url" class="form-control" id="reelUrl" placeholder="https://youtube.com/shorts/... أو https://instagram.com/reel/..." required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-heading"></i> العنوان (اختياري)</label>
                    <input type="text" class="form-control" id="reelTitle" placeholder="أدخل عنوان الـ Reel">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم القناة</label>
                    <input type="text" class="form-control" id="reelChannel" placeholder="اسم القناة أو المستخدم">
                </div>

                <div class="thumbprint-preview" id="thumbprintPreview">
                    <div class="label">البصمة المتوقعة:</div>
                    <div class="value" id="thumbprintValue">REL_240312_ABCD</div>
                </div>

                <button type="submit" class="send-btn">
                    <i class="fab fa-telegram"></i>
                    إرسال إلى تلجرام
                </button>
            </form>
        </div>
    </div>

    <script>
        // ========== إعدادات تلجرام ==========
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        // ========== متغيرات ==========
        let selectedType = 'reel';
        let currentUser = {
            name: 'مستخدم',
            role: 'customer',
            id: 1
        };

        // ========== فتح النافذة المنبثقة ==========
        function showReelPopup() {
            document.getElementById('reelModal').style.display = 'flex';
            generateThumbprint();
        }

        // ========== إغلاق النافذة ==========
        function closeModal() {
            document.getElementById('reelModal').style.display = 'none';
        }

        // ========== اختيار نوع الريل ==========
        function selectReelType(type, element) {
            selectedType = type;
            
            // إزالة التحديد من الكل
            document.querySelectorAll('.reel-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // إضافة التحديد للعنصر المختار
            element.classList.add('selected');
            
            // تحديث البصمة
            generateThumbprint();
        }

        // ========== توليد البصمة ==========
        function generateThumbprint() {
            const prefixes = {
                'reel': 'REL',
                'live': 'LIV',
                'tour': 'TOR'
            };
            
            const prefix = prefixes[selectedType] || 'REL';
            const date = new Date();
            const dateStr = `${date.getFullYear().toString().substring(2)}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}`;
            const timeStr = `${date.getHours().toString().padStart(2,'0')}${date.getMinutes().toString().padStart(2,'0')}`;
            const random = Math.random().toString(36).substring(2, 6).toUpperCase();
            
            const thumbprint = `${prefix}_${dateStr}_${timeStr}_${random}`;
            document.getElementById('thumbprintValue').textContent = thumbprint;
            
            return thumbprint;
        }

        // ========== إرسال إلى تلجرام ==========
        async function sendReelToTelegram() {
            const url = document.getElementById('reelUrl').value;
            const title = document.getElementById('reelTitle').value || 'Reel جديد';
            const channel = document.getElementById('reelChannel').value || 'غير معروف';
            
            if (!url) {
                showNotification('الرجاء إدخال رابط Reel', 'error');
                return;
            }

            showNotification('جاري الإرسال إلى تلجرام...', 'info');

            const thumbprint = generateThumbprint();
            
            // تحديد الأيقونة حسب النوع
            let icon = '🎬';
            if (selectedType === 'live') icon = '🔴';
            else if (selectedType === 'tour') icon = '🌍';

            // تكوين الرسالة
            const message = `${icon} #${selectedType} Reels

🆔 البصمة: ${thumbprint}
📌 العنوان: ${title}
👤 القناة: ${channel}
🔗 الرابط: ${url}
📅 التاريخ: ${new Date().toLocaleString('ar-EG')}

✅ تم الإرسال بواسطة: ${currentUser.name}`;

            try {
                // إرسال إلى تلجرام
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM.channelId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    showNotification(`✅ تم الإرسال بنجاح - البصمة: ${thumbprint}`, 'success');
                    
                    // إعادة تعيين النموذج
                    document.getElementById('reelUrl').value = '';
                    document.getElementById('reelTitle').value = '';
                    document.getElementById('reelChannel').value = '';
                    
                    // إغلاق النافذة بعد 2 ثانية
                    setTimeout(closeModal, 2000);
                } else {
                    showNotification('❌ فشل الإرسال: ' + data.description, 'error');
                }
            } catch (error) {
                console.error('خطأ:', error);
                showNotification('❌ فشل الاتصال بتلجرام', 'error');
            }
        }

        // ========== عرض الإشعارات ==========
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            
            let icon = 'ℹ️';
            if (type === 'success') icon = '✅';
            else if (type === 'error') icon = '❌';
            else if (type === 'info') icon = '🔄';
            
            notification.innerHTML = `${icon} ${message}`;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ========== إغلاق النافذة عند الضغط خارجها ==========
        window.onclick = function(event) {
            const modal = document.getElementById('reelModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // ========== تحديث البصمة كل ثانية ==========
        setInterval(generateThumbprint, 1000);

        // ========== محاكاة مستخدم ==========
        console.log('✅ العجلة السحرية جاهزة');
        console.log('👤 المستخدم: ضيف');
        console.log('🔄 اضغط على العجلة لإرسال Reel');
    </script>
</body>
</html>
