<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الصورة الناطقة - نص إلى كلام</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a0f2a, #2d1a4a);
            color: white;
            padding: 20px;
        }
        .container { max-width: 600px; margin: auto; }
        .card {
            background: rgba(255,255,255,0.1);
            border: 3px solid #ff6b6b;
            border-radius: 30px;
            padding: 30px;
            margin: 20px 0;
        }
        .btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        .textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #ff6b6b;
            border-radius: 15px;
            color: white;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #ff6b6b; text-align: center;">
            <i class="fas fa-robot"></i>
            الصورة الناطقة - بدون ميكروفون
        </h1>

        <div class="card">
            <!-- رفع الصورة -->
            <div style="border: 3px dashed #ff6b6b; border-radius: 20px; padding: 30px; text-align: center; cursor: pointer;" onclick="document.getElementById('imageFile').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 50px; color: #ff6b6b;"></i>
                <h3>اضغط لرفع الصورة</h3>
            </div>
            
            <input type="file" id="imageFile" accept="image/*" style="display: none;" onchange="previewImage(this)">

            <!-- معاينة الصورة -->
            <div id="imagePreview" style="display: none; margin: 20px 0;">
                <img id="preview" style="width: 100%; border-radius: 15px; border: 3px solid #ff6b6b;">
            </div>

            <!-- النص المراد تحويله لكلام -->
            <textarea id="speechText" class="textarea" rows="4" placeholder="اكتب هنا الكلمات التي تريد أن تنطقها الصورة..."></textarea>

            <!-- اختيار الصوت -->
            <select id="voiceSelect" class="textarea">
                <option value="ar-SA">عربي - سعودي</option>
                <option value="ar-EG">عربي - مصري</option>
                <option value="en-US">إنجليزي - أمريكي</option>
            </select>

            <!-- البصمة -->
            <div style="background: rgba(255,107,107,0.1); padding: 15px; border-radius: 10px; margin: 20px 0;">
                <i class="fas fa-fingerprint" style="color: #ff6b6b;"></i>
                بصمة: <span id="thumbprint">LIP_1002_260313_...</span>
                <button onclick="copyThumbprint()" style="background: none; border: 1px solid #ff6b6b; color: #ff6b6b; padding: 5px 10px; border-radius: 5px; margin-right: 10px;">
                    نسخ
                </button>
            </div>

            <!-- أزرار التحكم -->
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="testVoice()" style="flex: 1;">
                    <i class="fas fa-play"></i> اختبار الصوت
                </button>
                <button class="btn" onclick="sendToTelegram()" style="flex: 2;">
                    <i class="fas fa-paper-plane"></i> إرسال
                </button>
            </div>
        </div>
    </div>

    <script>
        // إعدادات تيليجرام
        const TELEGRAM = {
            botToken: '8576673096:AAEFKd-YSJcW_0d_wAHZBt-5nPg_VOjDX_0',
            channelId: '-1003822964890'
        };

        let selectedImage = null;
        let currentThumbprint = '';

        // توليد بصمة
        function generateThumbprint() {
            const date = new Date();
            const time = `${date.getHours()}${date.getMinutes()}${date.getSeconds()}`;
            currentThumbprint = `LIP_1002_${time}`;
            document.getElementById('thumbprint').textContent = currentThumbprint;
        }
        setInterval(generateThumbprint, 1000);

        // معاينة الصورة
        function previewImage(input) {
            if (input.files && input.files[0]) {
                selectedImage = input.files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                }
                reader.readAsDataURL(selectedImage);
            }
        }

        // اختبار الصوت (Text-to-Speech)
        function testVoice() {
            const text = document.getElementById('speechText').value;
            if (!text) {
                alert('اكتب نصاً أولاً');
                return;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = document.getElementById('voiceSelect').value;
            utterance.rate = 1;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
            
            // تفعيل حركة الفم (محاكاة)
            document.body.style.animation = 'none';
            setTimeout(() => {
                document.body.style.animation = 'pulse 1s infinite';
            }, 100);
        }

        // إرسال إلى تيليجرام
        async function sendToTelegram() {
            if (!selectedImage) {
                alert('الرجاء رفع صورة');
                return;
            }

            const text = document.getElementById('speechText').value;
            if (!text) {
                alert('الرجاء كتابة النص');
                return;
            }

            // إرسال الصورة
            const formData = new FormData();
            formData.append('chat_id', TELEGRAM.channelId);
            formData.append('photo', selectedImage);
            formData.append('caption', `🖼️ ${text}\n🔍 ${currentThumbprint}`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM.botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.ok) {
                    alert('✅ تم الإرسال بنجاح');
                } else {
                    alert('❌ فشل الإرسال: ' + data.description);
                }
            } catch (error) {
                alert('❌ خطأ في الاتصال');
            }
        }

        // نسخ البصمة
        function copyThumbprint() {
            navigator.clipboard.writeText(currentThumbprint);
            alert('تم النسخ');
        }
    </script>
</body>
</html>
